<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#FFFBF0">
    <title>Wave Solder Status</title>
    <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&display=swap">
    <style>
    :root {
        --bg: #FFFBF0;
        --surface: #FFFFFF;
        --surface2: #FFF8F0;
        --border: rgba(200,140,30,0.14);
        --accent: #D97706;
        --accent2: #F59E0B;
        --accent-bg: rgba(217,119,6,0.09);
        --text: #1C1810;
        --muted: #8A7050;
        --shadow: 0 2px 8px rgba(160,100,0,0.07);
        --shadow-md: 0 4px 20px rgba(160,100,0,0.12);
        --run: #059669;
        --run-bg: rgba(5,150,105,0.10);
        --stby: #D97706;
        --stby-bg: rgba(217,119,6,0.10);
        --repair: #DC2626;
        --repair-bg: rgba(220,38,38,0.10);
        --off: #94A3B8;
        --off-bg: rgba(100,116,139,0.10);
    }

    * { box-sizing: border-box; margin: 0; padding: 0;
        font-family: 'Pretendard', 'Noto Sans Thai', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }

    html, body { background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

    /* ── 배경 블롭 ── */
    .blob { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(48px); will-change: auto; }
    .blob-1 { width: 320px; height: 320px; background: #FDE68A; opacity: 0.22; top: -80px; right: -60px; }
    .blob-2 { width: 240px; height: 240px; background: #FED7AA; opacity: 0.18; bottom: 60px; left: -60px; }
    .blob-3 { width: 180px; height: 180px; background: #FEF3C7; opacity: 0.20; top: 45%; right: -40px; }

    /* ── 헤더 ── */
    header {
        position: sticky; top: 0; z-index: 200;
        background: rgba(255,251,240,0.92);
        backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        border-bottom: 1.5px solid var(--border);
    }
    .header-inner {
        display: flex; align-items: center; gap: 10px;
        max-width: 900px; margin: 0 auto;
        padding: 11px 16px;
    }
    .back-btn {
        display: flex; align-items: center; justify-content: center;
        width: 34px; height: 34px; border-radius: 10px;
        background: var(--surface); border: 1.5px solid var(--border);
        color: var(--text); text-decoration: none; font-size: 1.05em;
        box-shadow: var(--shadow); flex-shrink: 0;
        transition: background 0.15s;
    }
    .back-btn:active { background: var(--surface2); }
    .header-title { font-size: 1em; font-weight: 700; color: var(--text); flex: 1; }
    .header-shift {
        background: var(--accent-bg); color: var(--accent); border-radius: 999px;
        padding: 3px 10px; font-size: 0.75em; font-weight: 700;
        border: 1.5px solid rgba(217,119,6,0.18);
    }
    .header-time {
        font-size: 0.78em; color: var(--muted); font-weight: 600;
        font-variant-numeric: tabular-nums; letter-spacing: 0.02em;
    }

    /* ── 메인 ── */
    .shell {
        position: relative; z-index: 1;
        max-width: 900px; margin: 0 auto;
        padding: 18px 14px 64px;
        display: flex; flex-direction: column; gap: 14px;
    }

    /* ── 섹션 레이블 ── */
    .sec-label {
        font-size: 0.72em; font-weight: 700; text-transform: uppercase;
        letter-spacing: 0.08em; color: var(--accent); margin-bottom: -6px;
    }

    /* ── 팩토리 맵 ── */
    .factory-map-wrap {
        background: var(--surface); border-radius: 20px;
        border: 1.5px solid var(--border); box-shadow: var(--shadow-md);
        padding: 16px 14px;
    }
    .factory-map-hint {
        font-size: 0.72em; color: var(--muted); text-align: center;
        margin-bottom: 12px; font-weight: 500;
    }
    .factory-map {
        display: flex; flex-direction: row; justify-content: space-between; gap: 5px;
    }
    .map-node {
        flex: 1; height: 62px; border-radius: 13px;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        font-weight: 800; color: white; cursor: pointer;
        transition: transform 0.16s, box-shadow 0.16s;
        border: 2.5px solid transparent;
        text-shadow: 0 1px 3px rgba(0,0,0,0.3);
        gap: 2px;
    }
    .map-node .mn-id { font-size: 0.88em; line-height: 1; }
    .map-node .mn-st { font-size: 0.62em; opacity: 0.92; line-height: 1; }
    .map-node:active { transform: scale(0.95); }
    .map-node.selected {
        border-color: #fff;
        box-shadow: 0 0 0 3px var(--accent), 0 6px 18px rgba(0,0,0,0.2);
        transform: scale(1.07); z-index: 5;
    }

    /* ── 컨트롤 패널 ── */
    .control-wrap {
        background: var(--surface); border-radius: 20px;
        border: 1.5px solid var(--border); box-shadow: var(--shadow-md);
        padding: 16px 14px;
    }
    .control-header {
        font-size: 0.82em; color: var(--muted); font-weight: 600;
        margin-bottom: 12px; display: flex; align-items: center; gap: 6px;
    }
    .selected-line-tag {
        font-size: 1em; font-weight: 800; color: var(--accent);
        background: var(--accent-bg); border-radius: 7px;
        padding: 2px 9px; border: 1.5px solid rgba(217,119,6,0.22);
    }
    .status-button-group { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .btn-status {
        padding: 13px 10px; border: 1.5px solid transparent; border-radius: 14px;
        font-weight: 700; cursor: pointer; font-size: 0.84em;
        line-height: 1.45; transition: all 0.14s; font-family: inherit; text-align: center;
    }
    .btn-status:active { transform: scale(0.97); opacity: 0.85; }
    .btn-status.run {
        background: linear-gradient(135deg,#059669,#047857); color: white;
        box-shadow: 0 4px 14px rgba(5,150,105,0.32);
    }
    .btn-status.stby {
        background: linear-gradient(135deg,#D97706,#B45309); color: white;
        box-shadow: 0 4px 14px rgba(217,119,6,0.32);
    }
    .btn-status.repair {
        background: linear-gradient(135deg,#DC2626,#B91C1C); color: white;
        box-shadow: 0 4px 14px rgba(220,38,38,0.32);
    }
    .btn-status.off {
        background: var(--surface2); color: var(--text);
        border-color: var(--border); box-shadow: var(--shadow);
    }
    .btn-temp { font-weight: 500; font-size: 0.88em; display: block; margin-top: 2px; opacity: 0.88; }

    /* ── 대시보드 ── */
    .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .line-card {
        background: var(--surface); border-radius: 18px;
        border: 1.5px solid var(--border); box-shadow: var(--shadow);
        padding: 13px; display: flex; flex-direction: column; gap: 8px;
        border-left: 4px solid var(--off);
    }
    .line-card.status-run  { border-left-color: var(--run); }
    .line-card.status-stby { border-left-color: var(--stby); }
    .line-card.status-repair { border-left-color: var(--repair); }
    .line-card.status-off  { border-left-color: var(--off); }
    .lc-header { display: flex; justify-content: space-between; align-items: center; }
    .lc-title { font-weight: 800; font-size: 1em; }
    .lc-timer {
        font-size: 0.72em; font-variant-numeric: tabular-nums;
        background: var(--surface2); border: 1.5px solid var(--border);
        padding: 3px 7px; border-radius: 7px; color: var(--muted); font-weight: 700;
    }
    .heater-row { display: flex; gap: 5px; }
    .heater-chip {
        font-size: 0.7em; font-weight: 600; padding: 3px 7px; border-radius: 7px;
        background: var(--surface2); border: 1.5px solid var(--border); color: var(--muted);
    }
    .status-badge {
        display: inline-flex; align-items: center; gap: 5px;
        padding: 4px 10px; border-radius: 999px;
        font-size: 0.75em; font-weight: 700;
    }
    .status-dot {
        width: 6px; height: 6px; border-radius: 50%;
        background: currentColor; opacity: 0.75; flex-shrink: 0;
    }
    .bg-run    { background: var(--run-bg);    color: var(--run); }
    .bg-stby   { background: var(--stby-bg);   color: var(--stby); }
    .bg-repair { background: var(--repair-bg); color: var(--repair); }
    .bg-off    { background: var(--off-bg);    color: var(--off); }

    /* ── PC 뷰 오픈 버튼 ── */
    .pc-open-card {
        background: linear-gradient(135deg,#1C1811,#0D0B06);
        border-radius: 18px; padding: 13px;
        display: flex; flex-direction: column; justify-content: center; align-items: center;
        cursor: pointer; gap: 6px; border: 2px dashed rgba(245,158,11,0.45);
        box-shadow: 0 4px 16px rgba(0,0,0,0.2); transition: all 0.18s;
    }
    .pc-open-card:active { transform: scale(0.97); }
    .pc-open-icon { font-size: 1.7em; }
    .pc-open-card span { color: #F59E0B; font-size: 0.8em; font-weight: 700; line-height: 1.4; text-align: center; }

    /* ── 통계 ── */
    .stats-wrap {
        background: var(--surface); border-radius: 20px;
        border: 1.5px solid var(--border); box-shadow: var(--shadow-md);
        overflow: hidden;
    }
    .stats-topbar {
        padding: 13px 15px; border-bottom: 1.5px solid var(--border);
        display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .stats-title { font-weight: 700; font-size: 0.88em; flex: 1; }
    .stat-period-tabs { display: flex; gap: 4px; }
    .stat-tab {
        padding: 5px 11px; border-radius: 8px; font-size: 0.76em; font-weight: 700;
        border: 1.5px solid var(--border); background: var(--surface2);
        cursor: pointer; color: var(--muted); font-family: inherit; transition: all 0.14s;
    }
    .stat-tab.active {
        background: linear-gradient(135deg,#D97706,#B45309);
        color: white; border-color: transparent;
        box-shadow: 0 2px 8px rgba(217,119,6,0.3);
    }
    #stat-date-display { font-size: 0.8em; color: var(--accent); font-weight: 700; }
    .stats-table { width: 100%; border-collapse: collapse; font-size: 0.82em; text-align: center; }
    .stats-table th {
        background: var(--surface2); color: var(--muted); font-weight: 700;
        padding: 9px 6px; border-bottom: 1.5px solid var(--border);
        font-size: 0.84em; letter-spacing: 0.04em;
    }
    .stats-table td { padding: 9px 6px; border-bottom: 1px solid rgba(200,140,30,0.07); }
    .stats-table tr:last-child td { border-bottom: none; }
    .stats-table td:first-child { font-weight: 800; }
    .stats-run    { color: var(--run);    font-weight: 700; }
    .stats-stby   { color: var(--stby);   font-weight: 700; }
    .stats-repair { color: var(--repair); font-weight: 700; }
    .stats-off    { color: var(--off); }

    /* ── 로그 ── */
    .log-wrap {
        background: var(--surface); border-radius: 20px;
        border: 1.5px solid var(--border); box-shadow: var(--shadow-md);
        overflow: hidden;
    }
    .log-topbar {
        padding: 13px 15px; border-bottom: 1.5px solid var(--border);
        font-weight: 700; font-size: 0.88em;
    }
    .log-list { list-style: none; padding: 0; margin: 0; }
    .log-item {
        padding: 11px 15px; border-bottom: 1px solid rgba(200,140,30,0.07);
        transition: background 0.12s;
    }
    .log-item:last-child { border-bottom: none; }
    .log-item:active { background: var(--surface2); }
    .log-row1 { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
    .log-line-tag {
        font-weight: 800; font-size: 0.84em;
        background: var(--accent-bg); color: var(--accent);
        border-radius: 6px; padding: 2px 8px; border: 1.5px solid rgba(217,119,6,0.15);
    }
    .log-time { color: var(--muted); font-size: 0.75em; }
    .log-row2 { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; font-size: 0.82em; }
    .log-prev { font-weight: 700; }
    .log-arrow { color: var(--muted); font-size: 0.9em; }
    .log-next { font-weight: 700; }
    .log-dur {
        margin-left: auto; font-size: 0.76em; font-weight: 700;
        background: var(--accent-bg); color: var(--accent);
        padding: 2px 8px; border-radius: 6px; border: 1px solid rgba(217,119,6,0.18);
    }
    .pagination {
        display: flex; justify-content: center; gap: 5px;
        padding: 11px 14px; border-top: 1.5px solid var(--border); flex-wrap: wrap;
    }
    .page-btn {
        min-width: 32px; height: 32px; border: 1.5px solid var(--border);
        background: var(--surface2); border-radius: 8px; cursor: pointer;
        font-weight: 700; font-size: 0.8em; color: var(--muted); font-family: inherit;
        display: flex; align-items: center; justify-content: center; transition: all 0.14s;
    }
    .page-btn.active {
        background: linear-gradient(135deg,#D97706,#B45309);
        color: white; border-color: transparent;
        box-shadow: 0 2px 8px rgba(217,119,6,0.35);
    }

    /* ── PC 뷰 ── */
    #pc-view {
        display: none; position: fixed; inset: 0;
        background: #0C0A06; z-index: 2000;
        flex-direction: column; padding: 2vw; overflow: hidden;
    }
    .pc-header {
        display: flex; justify-content: space-between; align-items: flex-end;
        border-bottom: 1px solid #2a2510; padding-bottom: 1.2vw; margin-bottom: 2vw;
    }
    .pc-title { font-size: 2.8vw; font-weight: 900; color: #F59E0B; margin: 0; letter-spacing: 3px; }
    .pc-time-info { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .pc-clock { font-size: 2.2vw; font-variant-numeric: tabular-nums; font-weight: 800; color: #FDE68A; }
    .pc-date-shift { font-size: 1.1vw; color: #6B5A2E; }
    .pc-btn-close {
        background: transparent; color: #6B5A2E; border: 1px solid #2a2510;
        padding: 0.5vw 1.2vw; font-size: 0.9vw; border-radius: 0.5vw; cursor: pointer;
        margin-top: 4px; font-family: inherit; transition: color 0.15s;
    }
    .pc-btn-close:hover { color: #F59E0B; border-color: #F59E0B; }
    .pc-grid { display: flex; flex: 1; gap: 1.2vw; justify-content: space-between; align-items: stretch; }
    .pc-line-card {
        flex: 1; display: flex; flex-direction: column;
        background: #1A1408; border-radius: 1.2vw; border: 0.4vw solid #2a2510;
        overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: border-color 0.3s;
    }
    .pc-card-header {
        background: #221C0A; padding: 1.2vw 0; text-align: center;
        font-size: 2.3vw; font-weight: 900; color: #C99A20; letter-spacing: 2px;
    }
    .pc-card-status-box {
        flex: 1; display: flex; align-items: center; justify-content: center;
        font-size: 3.5vw; font-weight: 900; color: #3a3010;
        background: #141008; letter-spacing: 4px; text-align: center;
    }
    .pc-card-footer {
        background: #141008; padding: 1.5vw 1vw;
        display: flex; flex-direction: column; align-items: center; gap: 0.5vw;
        border-top: 1px solid #2a2510; text-align: center;
    }
    .pc-card-time { font-size: 3.8vw; font-variant-numeric: tabular-nums; font-weight: 800; color: #C99A20; }
    .pc-card-heater { font-size: 1.1vw; color: #5A4A1A; font-weight: 600; }
    .pc-status-run    { border-color: #00E676; }
    .pc-status-run    .pc-card-status-box { background: #00E676; color: #001A08; }
    .pc-status-run    .pc-card-time { color: #00E676; }
    .pc-status-stby   { border-color: #FF9100; }
    .pc-status-stby   .pc-card-status-box { background: #FF9100; color: #1A0800; }
    .pc-status-stby   .pc-card-time { color: #FF9100; }
    .pc-status-repair { border-color: #FF1744; }
    .pc-status-repair .pc-card-status-box { background: #FF1744; color: white; }
    .pc-status-repair .pc-card-time { color: #FF1744; }
    .pc-status-off    { border-color: #2a2510; }
    .pc-status-off    .pc-card-status-box { background: #0D0B06; color: #3a3010; }
    </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<header>
  <div class="header-inner">
    <a href="../index.html" class="back-btn">←</a>
    <span class="header-title">Wave Solder</span>
    <span class="header-shift" id="current-shift-badge">Day Shift</span>
    <span class="header-time" id="current-time-shift">--:--:--</span>

  </div>
</header>

<div class="shell" id="mobile-view">

  <div class="sec-label">Line Selection</div>
  <div class="factory-map-wrap">
    <div class="factory-map-hint">Factory Layout — Tap to select a line</div>
    <div class="factory-map" id="factory-map"></div>
  </div>

  <div class="sec-label">Status Control</div>
  <div class="control-wrap">
    <div class="control-header">
      Selected:&nbsp;<span class="selected-line-tag" id="display-selected-line">Line 1</span>
    </div>
    <div class="status-button-group">
      <button class="btn-status run" onclick="recordStatus('RUN')">▶ RUN<span class="btn-temp">260℃ / 160℃</span></button>
      <button class="btn-status stby" onclick="recordStatus('STBY')">⏸ STBY<span class="btn-temp">180℃ / OFF</span></button>
      <button class="btn-status repair" onclick="recordStatus('REPAIR')">🔧 REPAIR<span class="btn-temp">OFF / OFF</span></button>
      <button class="btn-status off" onclick="recordStatus('OFF')">■ OFF<span class="btn-temp">OFF / OFF</span></button>
    </div>
  </div>

  <div class="sec-label">Real-time Status</div>
  <div class="dashboard" id="dashboard"></div>

  <div class="sec-label">Statistics</div>
  <div class="stats-wrap">
    <div class="stats-topbar">
      <span class="stats-title">Operating Time Summary</span>
      <span id="stat-date-display">-</span>
      <div class="stat-period-tabs">
        <button class="stat-tab active" onclick="changeStatPeriod('day')"   id="btn-stat-day">Daily</button>
        <button class="stat-tab"        onclick="changeStatPeriod('week')"  id="btn-stat-week">Weekly</button>
        <button class="stat-tab"        onclick="changeStatPeriod('month')" id="btn-stat-month">Monthly</button>
      </div>
    </div>
    <div style="overflow-x:auto">
      <table class="stats-table">
        <thead>
          <tr><th>Line</th><th>RUN</th><th>STBY</th><th>REPAIR</th><th>OFF</th></tr>
        </thead>
        <tbody id="stats-tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="sec-label">Change Log</div>
  <div class="log-wrap">
    <div class="log-topbar">Status Change History</div>
    <ul class="log-list" id="log-list"></ul>
    <div class="pagination" id="pagination"></div>
  </div>

</div>

<div id="pc-view">
  <div class="pc-header">
    <h1 class="pc-title">WAVE SOLDER TIME CHECKER</h1>
    <div class="pc-time-info">
      <div class="pc-clock" id="pc-clock">00:00:00</div>
      <div class="pc-date-shift" id="pc-date-shift">Loading...</div>
      <button class="pc-btn-close" onclick="closePCView()">✕ Back to Mobile View</button>
    </div>
  </div>
  <div class="pc-grid" id="pc-grid"></div>
</div>

<script>
    const TUNNEL_DOMAIN = "server.samhwa.cloud";
    const ws = new WebSocket(`wss://${TUNNEL_DOMAIN}/ws/wave`);

    let lines = Array.from({length: 7}, (_, i) => ({ id: i+1, status: 'OFF', lastChanged: new Date().getTime() }));
    let logs = [];
    let currentShift = "";
    let currentPage = 1;
    const itemsPerPage = 10;
    let selectedLineId = 1;
    let currentStatPeriod = 'day';
    let lastDateChecked = new Date().getDate();

    ws.onmessage = (event) => {
        const message = JSON.parse(event.data);
        if (message.type === "INIT_STATUS") {
            Object.keys(message.data).forEach(id => {
                const index = lines.findIndex(l => l.id === parseInt(id));
                if (index !== -1) {
                    lines[index].status = message.data[id].status;
                    lines[index].lastChanged = message.data[id].lastChanged;
                }
            });
            renderUI();
        } else if (message.type === "INIT_LOGS") {
            logs = message.logs;
            renderLogs();
            updateStats();
        } else if (message.type === "STATUS_CHANGED") {
            const index = lines.findIndex(l => l.id === parseInt(message.lineId));
            if (index !== -1) {
                lines[index].status = message.status;
                lines[index].lastChanged = message.lastChanged;
            }
            logs.unshift(message.newLog);
            renderUI();
            renderLogs();
            updateStats();
        }
    };

    function formatDuration(ms) {
        if (ms < 0) ms = 0;
        const s = Math.floor(ms/1000);
        return `${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor((s%3600)/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
    }
    function formatDurationPC(ms) {
        if (ms < 0) ms = 0;
        const s = Math.floor(ms/1000);
        return `${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor((s%3600)/60)).padStart(2,'0')}`;
    }
    function getStatusName(status) {
        const m = { RUN:'RUN (Running)', STBY:'STBY (Standby)', REPAIR:'REPAIR (Under Repair)', OFF:'OFF (Stopped)' };
        return m[status] || status;
    }

    window.selectLine = function(id) {
        selectedLineId = id;
        document.getElementById('display-selected-line').innerText = `Line ${id}`;
        renderUI();
    };

    window.recordStatus = function(newStatus) {
        const lineId = selectedLineId;
        const nowMs = new Date().getTime();
        const line = lines[lineId - 1];
        if (line.status === newStatus) {
            alert(`Line ${lineId} is already in ${getStatusName(newStatus)} status.`);
            return;
        }
        const labelMap = { RUN:'RUN (260℃ / 160℃)', STBY:'STBY (180℃ / OFF)', REPAIR:'REPAIR (OFF / OFF)', OFF:'OFF' };
        if (!window.confirm(`Change Line ${lineId} status to "${labelMap[newStatus]}"?`)) return;

        const elapsedMs = nowMs - line.lastChanged;
        const now = new Date();
        ws.send(JSON.stringify({
            type: "UPDATE_STATUS",
            lineId: lineId,
            newStatus: newStatus,
            durationStr: formatDuration(elapsedMs),
            durationMs: elapsedMs,
            date: `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`,
            time: `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`,
            shift: currentShift,
            createdAt: nowMs
        }));
        currentPage = 1;
    };

    const MONTH = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    function updateStatDateDisplay() {
        const now = new Date();
        let s = "";
        if (currentStatPeriod === 'day') {
            s = `${MONTH[now.getMonth()]} ${now.getDate()}`;
        } else if (currentStatPeriod === 'week') {
            const d = now.getDay() || 7;
            const mon = new Date(now.getFullYear(), now.getMonth(), now.getDate()-d+1);
            const sun = new Date(now.getFullYear(), now.getMonth(), now.getDate()-d+7);
            s = `${MONTH[mon.getMonth()]} ${mon.getDate()} – ${MONTH[sun.getMonth()]} ${sun.getDate()}`;
        } else {
            s = `${MONTH[now.getMonth()]} ${now.getFullYear()}`;
        }
        document.getElementById('stat-date-display').innerText = s;
    }

    window.changeStatPeriod = function(period) {
        currentStatPeriod = period;
        ['day','week','month'].forEach(p => document.getElementById(`btn-stat-${p}`).classList.remove('active'));
        document.getElementById(`btn-stat-${period}`).classList.add('active');
        updateStatDateDisplay();
        updateStats();
    };

    function updateStats() {
        const tbody = document.getElementById('stats-tbody');
        if (!tbody) return;
        const now = new Date();
        let startTime = 0;
        if (currentStatPeriod === 'day') {
            startTime = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
        } else if (currentStatPeriod === 'week') {
            const d = now.getDay() || 7;
            startTime = new Date(now.getFullYear(), now.getMonth(), now.getDate()-d+1).getTime();
        } else {
            startTime = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
        }
        const stats = {};
        for (let i=1; i<=7; i++) stats[i] = { RUN:0, STBY:0, REPAIR:0, OFF:0 };
        const nowMs = Date.now();
        logs.forEach(log => {
            const ms = log.durationMs || 0;
            const overlap = Math.max(0, log.createdAt - Math.max(startTime, log.createdAt-ms));
            if (overlap > 0) {
                let key = 'OFF';
                if (log.prevStatus.includes('RUN')) key = 'RUN';
                else if (log.prevStatus.includes('STBY')) key = 'STBY';
                else if (log.prevStatus.includes('REPAIR')) key = 'REPAIR';
                if (stats[log.lineId]) stats[log.lineId][key] += overlap;
            }
        });
        lines.forEach(line => {
            const overlap = Math.max(0, nowMs - Math.max(startTime, line.lastChanged));
            if (overlap > 0 && stats[line.id]) stats[line.id][line.status] += overlap;
        });
        let html = '';
        for (let i=1; i<=7; i++) {
            html += `<tr>
                <td>L${i}</td>
                <td class="stats-run">${formatDuration(stats[i].RUN)}</td>
                <td class="stats-stby">${formatDuration(stats[i].STBY)}</td>
                <td class="stats-repair">${formatDuration(stats[i].REPAIR)}</td>
                <td class="stats-off">${formatDuration(stats[i].OFF)}</td>
            </tr>`;
        }
        tbody.innerHTML = html;
    }

    function updateTimeAndTimers() {
        const now = new Date();
        const h = now.getHours();
        currentShift = (h >= 8 && h < 20) ? "Day Shift" : "Night Shift";
        const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
        const timeStr = `${String(h).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;

        document.getElementById('current-time-shift').innerText = timeStr;
        document.getElementById('current-shift-badge').innerText = currentShift;
        document.getElementById('pc-clock').innerText = timeStr;
        document.getElementById('pc-date-shift').innerText = `${dateStr} | ${currentShift}`;

        const nowMs = now.getTime();
        lines.forEach(line => {
            const el = document.getElementById(`timer-${line.id}`);
            if (el) el.innerText = formatDuration(nowMs - line.lastChanged);
            const pcEl = document.getElementById(`pc-timer-${line.id}`);
            if (pcEl) pcEl.innerText = formatDurationPC(nowMs - line.lastChanged);
        });

        if (now.getDate() !== lastDateChecked) {
            lastDateChecked = now.getDate();
            updateStatDateDisplay();
        }
        updateStats();
    }

    const COLOR = { RUN:'#059669', STBY:'#D97706', REPAIR:'#DC2626', OFF:'#94A3B8' };
    const SHORT = { RUN:'RUN', STBY:'STBY', REPAIR:'REP', OFF:'OFF' };

    function getCardData(line) {
        const map = {
            RUN:    { badgeClass:'bg-run',    pcClass:'pc-status-run',    pcSt:'RUN',    st:'RUN',    heaterM:'260℃', heaterS:'160℃', pcHeat:'MAIN: 260℃ | SUB: 160℃' },
            STBY:   { badgeClass:'bg-stby',   pcClass:'pc-status-stby',   pcSt:'STBY',   st:'STBY',   heaterM:'180℃', heaterS:'OFF',  pcHeat:'MAIN: 180℃ | SUB: OFF' },
            REPAIR: { badgeClass:'bg-repair', pcClass:'pc-status-repair', pcSt:'REPAIR', st:'REPAIR', heaterM:'OFF',  heaterS:'OFF',  pcHeat:'HEATER OFF' },
            OFF:    { badgeClass:'bg-off',    pcClass:'pc-status-off',    pcSt:'OFF',    st:'OFF',    heaterM:'OFF',  heaterS:'OFF',  pcHeat:'HEATER OFF' }
        };

        return map[line.status] || map.OFF;
    }

    function renderUI() {
        const mapEl  = document.getElementById('factory-map');
        const dashEl = document.getElementById('dashboard');
        const pcEl   = document.getElementById('pc-grid');
        mapEl.innerHTML = ''; dashEl.innerHTML = ''; pcEl.innerHTML = '';

        const physOrder = [7,6,5,4,3,2,1];
        const logOrder  = [1,2,3,4,5,6,7];

        physOrder.forEach(id => {
            const line = lines[id-1];
            const el = document.createElement('div');
            el.className = `map-node${line.id === selectedLineId ? ' selected' : ''}`;
            el.style.background = COLOR[line.status];
            el.onclick = () => selectLine(line.id);
            el.innerHTML = `<span class="mn-id">L${line.id}</span><span class="mn-st">${SHORT[line.status]}</span>`;
            mapEl.appendChild(el);
        });

        logOrder.forEach(id => {
            const line = lines[id-1];
            const d = getCardData(line);
            const card = document.createElement('div');
            card.className = `line-card status-${line.status.toLowerCase()}`;
            card.innerHTML = `
                <div class="lc-header">
                    <span class="lc-title">Line ${line.id}</span>
                    <span class="lc-timer" id="timer-${line.id}">00:00:00</span>
                </div>
                <div class="heater-row">
                    <span class="heater-chip">M: ${d.heaterM}</span>
                    <span class="heater-chip">S: ${d.heaterS}</span>
                </div>
                <span class="status-badge ${d.badgeClass}"><span class="status-dot"></span>${d.st}</span>
            `;
            dashEl.appendChild(card);
        });

        const pcBtn = document.createElement('div');
        pcBtn.className = 'pc-open-card';
        pcBtn.onclick = window.openPCView;
        pcBtn.innerHTML = `<div class="pc-open-icon">🖥️</div><span>PC Dashboard<br>Full Screen</span>`;
        dashEl.appendChild(pcBtn);

        physOrder.forEach(id => {
            const line = lines[id-1];
            const d = getCardData(line);
            const card = document.createElement('div');
            card.className = `pc-line-card ${d.pcClass}`;
            card.innerHTML = `
                <div class="pc-card-header">LINE ${line.id}</div>
                <div class="pc-card-status-box">${d.pcSt}</div>
                <div class="pc-card-footer">
                    <div class="pc-card-time" id="pc-timer-${line.id}">00:00</div>
                    <div class="pc-card-heater">${d.pcHeat}</div>
                </div>
            `;
            pcEl.appendChild(card);
        });
    }

    function renderLogs() {
        const listEl = document.getElementById('log-list');
        const pageEl = document.getElementById('pagination');
        listEl.innerHTML = ''; pageEl.innerHTML = '';

        const total = Math.ceil(logs.length / itemsPerPage) || 1;
        if (currentPage > total) currentPage = total;
        const slice = logs.slice((currentPage-1)*itemsPerPage, currentPage*itemsPerPage);

        slice.forEach(log => {
            const li = document.createElement('li');
            li.className = 'log-item';
            const prevKey = Object.keys(COLOR).find(k => log.prevStatus.includes(k)) || 'OFF';
            const nextKey = Object.keys(COLOR).find(k => log.newStatus.includes(k)) || 'OFF';
            li.innerHTML = `
                <div class="log-row1">
                    <span class="log-line-tag">Line ${log.lineId}</span>
                    <span class="log-time">${log.date} ${log.time} · ${log.shift}</span>
                </div>
                <div class="log-row2">
                    <span class="log-prev" style="color:${COLOR[prevKey]}">${log.prevStatus}</span>
                    <span class="log-arrow">→</span>
                    <span class="log-next" style="color:${COLOR[nextKey]}">${log.newStatus}</span>
                    <span class="log-dur">⏱ ${log.durationStr}</span>
                </div>
            `;
            listEl.appendChild(li);
        });

        for (let i=1; i<=total; i++) {
            const btn = document.createElement('button');
            btn.className = `page-btn${i===currentPage ? ' active' : ''}`;
            btn.innerText = i;
            btn.onclick = () => { currentPage=i; renderLogs(); };
            pageEl.appendChild(btn);
        }
    }

    window.openPCView = function() {
        document.getElementById('pc-view').style.display = 'flex';
        if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});
    };
    window.closePCView = function() {
        document.getElementById('pc-view').style.display = 'none';
        if (document.fullscreenElement) document.exitFullscreen();
    };

    updateStatDateDisplay();
    setInterval(updateTimeAndTimers, 1000);
    renderUI();
</script>
</body>
</html>
