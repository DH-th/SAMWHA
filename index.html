<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>메인 화면</title>

<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

<style>

:root {
    --primary-color: #4A90E2; 
    --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    --text-main: #2c3e50;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;

    background:
        radial-gradient(circle at 20% 20%, rgba(74,144,226,0.25), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(120,200,180,0.25), transparent 40%),
        linear-gradient(135deg, #eef2f7, #d9e4f5);
}
/* 모바일 앱 화면 컨테이너 */
.app-container {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;

    background:
        radial-gradient(circle at 15% 20%, rgba(255,255,255,0.5), transparent 40%),
        radial-gradient(circle at 85% 80%, rgba(255,255,255,0.35), transparent 40%),
        var(--bg-gradient);

    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    position: relative;
    overflow: hidden;
}
/* 상단 헤더 */
header {
    width: 100%;
    overflow: hidden;
    border-bottom: 1px solid rgba(255,255,255,0.6);
}

/* 로고 */
.logo {
    width: 100%;
    height: auto;
    display: block;
}

/* 중간 버튼 영역 */
main {
    flex: 1;
    padding: 50px 20px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.grid-container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 80px 15px;
}

/* 버튼 */
.nav-button {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    transition: transform 0.2s;
}

.nav-button:active {
    transform: scale(0.92);
}

.nav-button img {
    width: 100px;
    height: 100px;
    object-fit: cover;
    border-radius: 22px;
    margin-bottom: 12px;
    box-shadow: 0 6px 14px rgba(0,0,0,0.12);
    background-color: #ffffff;
}

.nav-button span {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-main);
    text-align: center;
}

/* 푸터 */
footer {
    text-align: center;
    padding: 30px 20px 25px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid rgba(255,255,255,0.6);
    margin-top: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 15px;
}

.qr-code {
    width: 110px;
    height: 110px;
    object-fit: cover;
    background-color: #fff;
    padding: 5px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
}

.copyright {
    font-size: 12px;
    color: #7f8c8d;
    font-weight: 500;
}

</style>
</head>

<body>

<div class="app-container">

<header>
<img src="mainlogo.png" alt="COMPANY LOGO" class="logo">
</header>

<main>

<div class="grid-container">

<a href="./B-1. SAMHWA Checksheet/Index.html" class="nav-button">
<img src="icon_01.png" alt="">
<span>Checksheet</span>
</a>

<a href="./B-2. Maintence 알리미/Index.html" class="nav-button">
<img src="icon_02.png" alt="">
<span>Maintenance</span>
</a>

<a href="./button3/index.html" class="nav-button">
<img src="icon_03.png" alt="">
<span>Button_03</span>
</a>

<a href="./button4/index.html" class="nav-button">
<img src="icon_04.png" alt="">
<span>Button_04</span>
</a>

<a href="./button5/index.html" class="nav-button">
<img src="icon_05.png" alt="">
<span>Button_05</span>
</a>

<a href="./B-6. Spare parts/Index.html" class="nav-button">
<img src="icon_06.png" alt="">
<span>Spare Parts</span>
</a>

</div>

</main>

<footer>

<img src="qr_code.png" alt="" class="qr-code">

<div class="copyright">
Smart Factory System of SAMHWA
</div>

</footer>

</div>

</body>
</html>
