<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checksheet 현황</title>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
<script src="lang.js"></script>
<style>
:root{
  --bg:#F5F7FA;--surface:#FFFFFF;--s2:#F0F2F5;--s3:#E8ECF0;
  --border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.16);
  --text:#1A2430;--muted:#7A8896;
  --accent:#6366F1;--accent-bg:rgba(99,102,241,.10);
  --ok:#059669;--ok-bg:#ECFDF5;--ng:#DC2626;--ng-bg:#FEF2F2;--na:#9AA3AF;
  --amber:#D97706;--amber-bg:#FEF3C7;
  --sh:0 2px 8px rgba(0,0,0,.07);--shm:0 4px 16px rgba(0,0,0,.09);
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Pretendard',system-ui,sans-serif;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text);min-height:100vh;}
header{position:sticky;top:0;z-index:30;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);box-shadow:var(--sh);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.back{padding:5px 10px;border:1px solid var(--border);border-radius:8px;font-size:12px;font-weight:600;color:var(--muted);text-decoration:none;background:var(--s2);}
.h-title{font-size:16px;font-weight:900;cursor:pointer;user-select:none;}
.date-nav{display:flex;align-items:center;gap:4px;}
.date-nav button{padding:5px 9px;border:1px solid var(--border);border-radius:8px;background:var(--s2);color:var(--text);font-size:13px;cursor:pointer;}
#date-lbl{font-size:13px;font-weight:800;min-width:108px;text-align:center;}
.today-btn{background:var(--accent)!important;color:#fff!important;border-color:var(--accent)!important;font-size:11px!important;font-weight:700;}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.cpill{display:flex;align-items:center;gap:5px;padding:4px 9px;border:1px solid var(--border);border-radius:999px;font-size:11px;font-weight:600;color:var(--muted);background:var(--s2);}
.dot{width:6px;height:6px;border-radius:50%;background:var(--ng);}
.dot.on{background:var(--ok);}
.lnk{padding:6px 11px;border:1px solid var(--border);border-radius:8px;background:var(--s2);font-size:12px;font-weight:700;color:var(--text);text-decoration:none;cursor:pointer;}
.lnk.primary{background:var(--accent);color:#fff;border-color:var(--accent);}

.wrap{max-width:1200px;margin:0 auto;padding:14px 16px 40px;}
/* 요약 */
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
.sc{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:14px 16px;box-shadow:var(--sh);}
.sc-l{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px;}
.sc-v{font-size:28px;font-weight:900;letter-spacing:-.02em;line-height:1;}
.sc-pct{font-size:11px;color:var(--muted);margin-top:4px;font-weight:600;}
.sc.tot .sc-v{color:var(--text);} .sc.done .sc-v{color:var(--ok);} .sc.rem .sc-v{color:var(--ng);} .sc.ng .sc-v{color:var(--amber);}
.prog{height:8px;background:var(--s3);border-radius:5px;overflow:hidden;margin-top:8px;}
.prog>div{height:100%;background:linear-gradient(90deg,#6366F1,#818CF8);border-radius:5px;transition:width .5s;}

/* 현황표 */
.board-card{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;box-shadow:var(--shm);overflow:hidden;}
.board-ttl{font-size:14px;font-weight:900;padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.board-scroll{overflow-x:auto;}
table{border-collapse:collapse;width:100%;}
th,td{border-bottom:1px solid var(--border);border-right:1px solid var(--border);text-align:center;padding:8px 6px;font-size:12px;}
thead th{background:var(--s2);font-weight:800;color:var(--muted);white-space:nowrap;position:sticky;top:0;}
.col-line{position:sticky;left:0;background:var(--s2);text-align:left;font-weight:900;color:var(--text);min-width:64px;z-index:2;}
tbody .col-line{background:var(--surface);}
.cell{cursor:default;font-weight:800;}
.cell.has{cursor:pointer;}
.chip{display:inline-flex;align-items:center;justify-content:center;min-width:30px;height:26px;border-radius:7px;font-size:12px;font-weight:900;padding:0 6px;}
.chip.done{background:var(--ok-bg);color:var(--ok);}
.chip.ng{background:var(--amber-bg);color:var(--amber);}
.chip.pend{background:var(--ng-bg);color:var(--ng);}
.chip.na{background:var(--s2);color:var(--border2);}
.row-pct{font-size:11px;font-weight:800;color:var(--muted);}
.legend{display:flex;gap:14px;flex-wrap:wrap;padding:10px 16px;font-size:11px;color:var(--muted);font-weight:600;border-top:1px solid var(--border);background:var(--s2);}
.legend span{display:inline-flex;align-items:center;gap:5px;}
.lg-dot{width:11px;height:11px;border-radius:4px;}

/* 모달 */
.mb{position:fixed;inset:0;background:rgba(20,22,30,.5);z-index:100;display:none;align-items:center;justify-content:center;padding:14px;}
.mb.on{display:flex;}
.modal{background:var(--surface);border-radius:18px;width:min(520px,96vw);max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 12px 48px rgba(0,0,0,.3);}
.m-hd{display:flex;align-items:center;gap:10px;padding:15px 18px;border-bottom:1px solid var(--border);}
.m-title{font-size:15px;font-weight:900;flex:1;}
.m-x{width:30px;height:30px;border:1px solid var(--border);border-radius:8px;background:var(--s2);cursor:pointer;font-size:16px;color:var(--muted);}
.m-body{overflow-y:auto;padding:14px 18px;}
.m-meta{display:flex;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-bottom:12px;}
.m-meta b{color:var(--text);}
.mi{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);}
.mi-no{font-size:11px;font-weight:900;color:var(--muted);min-width:18px;}
.mi-desc{flex:1;font-size:13px;font-weight:600;}
.mi-st{font-size:12px;font-weight:900;padding:3px 9px;border-radius:6px;white-space:nowrap;}
.st-OK{background:var(--ok-bg);color:var(--ok);} .st-NG{background:var(--ng-bg);color:var(--ng);} .st-NA{background:var(--s2);color:var(--na);}
.st-val{background:var(--accent-bg);color:var(--accent);}
.m-del{margin-top:14px;padding:11px;width:100%;border:1px solid var(--ng);border-radius:10px;background:var(--ng-bg);color:var(--ng);font-size:13px;font-weight:800;cursor:pointer;}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:13px;}
#ov{position:fixed;inset:0;background:rgba(245,247,250,.9);z-index:300;display:flex;align-items:center;justify-content:center;}
#ov.h{display:none;}
.sp{width:30px;height:30px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:700;z-index:400;opacity:0;transition:opacity .25s;pointer-events:none;}
#toast.s{opacity:1;}
@media(max-width:560px){.summary{grid-template-columns:repeat(2,1fr);} .sc-v{font-size:24px;}}
</style>
</head>
<body>
<div id="ov"><div class="sp"></div></div>
<header>
  <a href="../index.html" class="back" data-i18n="home">← หน้าหลัก</a>
  <span class="h-title" data-i18n="title" data-lang-trigger onclick="cycleLang()">เช็คชีท</span>
  <div class="date-nav">
    <button onclick="moveDate(-1)">◀</button>
    <span id="date-lbl">-</span>
    <button onclick="moveDate(1)">▶</button>
    <button class="today-btn" onclick="goToday()" data-i18n="today">วันนี้</button>
  </div>
  <div class="hdr-r">
    <div class="cpill"><span class="dot" id="cdot"></span><span id="ctxt" data-i18n="connecting">กำลังเชื่อมต่อ</span></div>
    <a href="input.html" class="lnk primary" data-i18n="inputBtn">✏️ บันทึกการตรวจ</a>
    <button class="lnk" onclick="openExport()">📄 Excel</button>
    <a href="print-qr.html" class="lnk">🖨️ QR</a>
    <a href="admin.html" class="lnk" data-i18n="adminBtn">⚙ ตั้งค่า</a>
  </div>
</header>

<div class="wrap">
  <div class="summary" id="summary"></div>
  <div class="board-card">
    <div class="board-ttl" id="board-ttl">📊 <span data-i18n="statusBoard">สถานะตามไลน์</span></div>
    <div class="board-scroll"><table id="board"></table></div>
    <div class="legend">
      <span><span class="lg-dot" style="background:var(--ok)"></span><span data-i18n="done">เสร็จ</span></span>
      <span><span class="lg-dot" style="background:var(--amber)"></span>NG</span>
      <span><span class="lg-dot" style="background:var(--ng)"></span><span data-i18n="pending">ค้าง</span></span>
      <span><span class="lg-dot" style="background:var(--s3)"></span>N/A</span>
    </div>
  </div>
</div>

<div class="mb" id="mb-export" onclick="if(event.target===this)closeExport()">
  <div class="modal" style="width:min(420px,96vw)">
    <div class="m-hd"><span class="m-title">📄 Excel <span data-i18n="title">เช็คชีท</span></span><button class="m-x" onclick="closeExport()">✕</button></div>
    <div class="m-body">
      <div style="font-size:12px;color:var(--muted);margin-bottom:12px">원본 양식 그대로 채워서 내려받습니다 (월 단위).</div>
      <div style="display:flex;flex-direction:column;gap:12px">
        <label style="font-size:12px;font-weight:800"><span data-i18n="line">ไลน์</span>
          <select id="exp-line" style="width:100%;margin-top:5px;padding:9px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;font-family:inherit"></select></label>
        <label style="font-size:12px;font-weight:800">Month
          <input type="month" id="exp-month" style="width:100%;margin-top:5px;padding:9px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;font-family:inherit"></label>
        <button class="lnk primary" style="padding:13px;font-size:14px;border-radius:11px" onclick="doExport()">⬇ <span data-i18n="result">ดาวน์โหลด</span> Excel</button>
      </div>
    </div>
  </div>
</div>

<div class="mb" id="mb" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="m-hd"><span class="m-title" id="m-title">-</span><button class="m-x" onclick="closeModal()">✕</button></div>
    <div class="m-body" id="m-body"></div>
  </div>
</div>
<div id="toast"></div>

<script>
const TUNNEL='server.samhwa.cloud';
let ws, templates=[], records=[], viewDate='';
const p2=n=>String(n).padStart(2,'0');
const fmtD=d=>`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
viewDate=fmtD(new Date());

function allLines(){const s=new Set();templates.forEach(t=>(t.lines||[]).forEach(l=>s.add(l)));return [...s].sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));}
function sheetsForLine(line){return templates.filter(t=>(t.lines||[]).includes(line)).sort((a,b)=>(a.code||'').localeCompare(b.code||''));}
function recsFor(line,tmplId){return records.filter(r=>r.date===viewDate&&r.line===line&&r.templateId===tmplId);}

function moveDate(d){const dt=new Date(viewDate+'T12:00:00');dt.setDate(dt.getDate()+d);viewDate=fmtD(dt);fetchLog();}
function goToday(){viewDate=fmtD(new Date());fetchLog();}
function fetchLog(){
  document.getElementById('date-lbl').textContent=viewDate;
  fetch(`https://${TUNNEL}/api/checksheet/log?date=${viewDate}`).then(r=>r.json())
    .then(j=>{records=j.records||[];renderAll();}).catch(()=>{records=[];renderAll();});
}

function renderAll(){
  document.getElementById('date-lbl').textContent=viewDate;
  const lines=allLines();
  // 셀 단위 집계: 각 (line, template) = 1 칸
  let total=0,done=0,ng=0;
  lines.forEach(l=>sheetsForLine(l).forEach(tp=>{
    total++;
    const rs=recsFor(l,tp.id);
    if(rs.length){done++; if(rs.some(r=>r.result==='NG'))ng++;}
  }));
  const pct=total>0?Math.round(done/total*100):0;
  document.getElementById('summary').innerHTML=`
    <div class="sc tot"><div class="sc-l" data-i18n="totalSheets">${t('totalSheets')}</div><div class="sc-v">${total}</div></div>
    <div class="sc done"><div class="sc-l">${t('completed')}</div><div class="sc-v">${done}</div><div class="prog"><div style="width:${pct}%"></div></div><div class="sc-pct">${pct}%</div></div>
    <div class="sc rem"><div class="sc-l">${t('remain')}</div><div class="sc-v">${total-done}</div></div>
    <div class="sc ng"><div class="sc-l">${t('ngCount')}</div><div class="sc-v">${ng}</div></div>`;
  renderBoard(lines);
}

function renderBoard(lines){
  const board=document.getElementById('board');
  if(!templates.length||!lines.length){board.innerHTML=`<tbody><tr><td class="empty">${t('noRecords')}</td></tr></tbody>`;return;}
  const cols=[...templates].sort((a,b)=>(a.code||'').localeCompare(b.code||''));
  let html=`<thead><tr><th class="col-line">${t('line')}</th>`;
  cols.forEach(c=>{html+=`<th title="${c.name||''}">${c.code||c.name||'?'}</th>`;});
  html+=`<th>${t('progress')}</th></tr></thead><tbody>`;
  lines.forEach(l=>{
    html+=`<tr><td class="col-line">${l}</td>`;
    let lt=0,ld=0;
    cols.forEach(c=>{
      const applies=(c.lines||[]).includes(l);
      if(!applies){html+=`<td><span class="chip na">·</span></td>`;return;}
      lt++;
      const rs=recsFor(l,c.id);
      if(!rs.length){html+=`<td class="cell"><span class="chip pend">${t('pending')==='ค้าง'?'✕':'✕'}</span></td>`;return;}
      ld++;
      const anyNG=rs.some(r=>r.result==='NG');
      const cls=anyNG?'ng':'done';
      const label=anyNG?'NG':'✓';
      html+=`<td class="cell has" onclick="openDetail('${l}','${c.id}')"><span class="chip ${cls}">${label}${rs.length>1?'·'+rs.length:''}</span></td>`;
    });
    const lp=lt>0?Math.round(ld/lt*100):0;
    html+=`<td class="row-pct">${lt>0?lp+'%':'-'}</td></tr>`;
  });
  html+=`</tbody>`;
  board.innerHTML=html;
}

function openDetail(line,tmplId){
  const tp=templates.find(t=>t.id===tmplId); if(!tp)return;
  const rs=recsFor(line,tmplId);
  document.getElementById('m-title').textContent=`${line} · ${tp.code} ${tp.name}`;
  const body=document.getElementById('m-body');
  if(!rs.length){body.innerHTML=`<div class="empty">${t('noRecords')}</div>`;}
  else{
    body.innerHTML=rs.map(rec=>{
      const items=(rec.items||[]).map(it=>{
        let st;
        if(it.type==='number') st=`<span class="mi-st st-val">${it.value}${tpUnit(tp,it.itemId)}</span>`;
        else st=`<span class="mi-st st-${it.status||'NA'}">${it.status||'-'}</span>`;
        return `<div class="mi"><span class="mi-no">${it.no||''}</span><span class="mi-desc">${it.desc||''}</span>${st}</div>`;
      }).join('');
      return `<div class="m-meta">
        ${rec.shift?`<span>${t('shift')}: <b>${rec.shift==='day'?t('day'):t('night')}</b></span>`:''}
        <span>${t('result')}: <b style="color:${rec.result==='NG'?'var(--ng)':'var(--ok)'}">${rec.result||'-'}</b></span>
        <span>${t('checkedBy')}: <b>${rec.checkedBy||'-'}</b></span>
        ${rec.remark?`<span>${t('remark')}: <b>${rec.remark}</b></span>`:''}
      </div>${items}
      <button class="m-del" onclick="delRec('${rec.id}')">🗑 ${t('del')}</button>
      <hr style="border:none;border-top:1px dashed var(--border);margin:14px 0">`;
    }).join('');
  }
  document.getElementById('mb').classList.add('on');
}
function tpUnit(tp,itemId){const it=(tp.items||[]).find(x=>x.id===itemId);return it&&it.unit?(' '+it.unit):'';}
function closeModal(){document.getElementById('mb').classList.remove('on');}
function delRec(id){
  if(!confirm(t('confirmDel')))return;
  ws.send(JSON.stringify({type:'DELETE_CHECK',id,date:viewDate}));
  records=records.filter(r=>r.id!==id);
  closeModal();renderAll();toast(t('deleted'));
}

/* ── Excel 출력 (원본 양식 채우기) ── */
function openExport(){
  const lines=allLines();
  const sel=document.getElementById('exp-line');
  sel.innerHTML=lines.map(l=>`<option value="${l}">${l}</option>`).join('');
  document.getElementById('exp-month').value=viewDate.slice(0,7);
  document.getElementById('mb-export').classList.add('on');
}
function closeExport(){document.getElementById('mb-export').classList.remove('on');}
function doExport(){
  const line=document.getElementById('exp-line').value;
  const month=document.getElementById('exp-month').value;
  if(!line||!month){toast('?');return;}
  const url=`https://${TUNNEL}/api/checksheet/export?line=${encodeURIComponent(line)}&month=${month}`;
  window.open(url,'_blank');
  closeExport();
}

function connect(){
  ws=new WebSocket(`wss://${TUNNEL}/ws/checksheet`);
  ws.onopen=()=>{document.getElementById('ov').classList.add('h');document.getElementById('cdot').className='dot on';document.getElementById('ctxt').textContent=t('connected');};
  ws.onmessage=e=>{
    const m=JSON.parse(e.data);
    if(m.type==='INIT_CS_TEMPLATES'){templates=m.data||[];renderAll();}
    else if(m.type==='INIT_CS_RECORDS'){if((m.csDate||'')===viewDate){records=m.data||[];}renderAll();}
    else if(m.type==='CHECK_ADDED'){if(m.record.date===viewDate){const i=records.findIndex(r=>r.id===m.record.id);if(i>-1)records[i]=m.record;else records.push(m.record);renderAll();}}
    else if(m.type==='CHECK_DELETED'){if(m.csDate===viewDate){records=records.filter(r=>r.id!==m.id);renderAll();}}
    else if(m.type==='CS_TEMPLATES_UPDATED'){templates=m.data||[];renderAll();}
  };
  ws.onclose=()=>{document.getElementById('cdot').className='dot';document.getElementById('ctxt').textContent=t('disconnected');setTimeout(connect,3000);};
  ws.onerror=()=>ws.close();
}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('s');setTimeout(()=>el.classList.remove('s'),1800);}
window.onLangChange=()=>{document.getElementById('date-lbl').textContent=viewDate;renderAll();};
document.getElementById('date-lbl').textContent=viewDate;
connect();
// 날짜가 오늘이 아닐 때를 대비해 REST로도 로드
fetchLog();
</script>
</body>
</html>
