<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>점검 입력 — Checksheet</title>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
<script src="lang.js"></script>
<style>
:root{
  --bg:#F5F7FA;--surface:#FFFFFF;--s2:#F0F2F5;--s3:#E8ECF0;
  --border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.16);
  --text:#1A2430;--muted:#7A8896;
  --accent:#6366F1;--accent-bg:rgba(99,102,241,.10);
  --ok:#059669;--ok-bg:#ECFDF5;--ng:#DC2626;--ng-bg:#FEF2F2;--na:#9AA3AF;--na-bg:#F1F3F5;
  --sh:0 2px 8px rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Pretendard',system-ui,sans-serif;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text);min-height:100vh;max-width:560px;margin:0 auto;}
header{position:sticky;top:0;z-index:20;background:var(--surface);border-bottom:1px solid var(--border);
  box-shadow:var(--sh);padding:calc(10px + env(safe-area-inset-top)) 14px 10px;display:flex;align-items:center;gap:10px;}
.h-title{font-size:16px;font-weight:900;cursor:pointer;user-select:none;}
.conn{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);font-weight:600;}
.cdot{width:7px;height:7px;border-radius:50%;background:var(--ok);}
.cdot.off{background:var(--ng);}
.crumb{padding:10px 14px 0;font-size:12px;color:var(--muted);font-weight:700;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.crumb b{color:var(--accent);}
.wrap{padding:12px 14px 120px;}
.sec-ttl{font-size:13px;font-weight:800;color:var(--muted);letter-spacing:.04em;margin:6px 2px 10px;text-transform:uppercase;}

/* 라인 그리드 */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:9px;}
.tile{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:16px 10px;
  font-size:16px;font-weight:800;text-align:center;cursor:pointer;box-shadow:var(--sh);transition:transform .08s;}
.tile:active{transform:scale(.95);background:var(--accent-bg);}

/* 체크시트 카드 */
.sheet-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:14px;
  margin-bottom:10px;cursor:pointer;box-shadow:var(--sh);display:flex;align-items:center;gap:12px;transition:transform .08s;}
.sheet-card:active{transform:scale(.99);}
.sc-icon{width:42px;height:42px;border-radius:12px;background:var(--accent-bg);color:var(--accent);
  display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;flex-shrink:0;}
.sc-body{flex:1;min-width:0;}
.sc-code{font-size:11px;color:var(--muted);font-weight:700;}
.sc-name{font-size:15px;font-weight:800;line-height:1.25;}
.sc-badge{font-size:11px;font-weight:800;padding:5px 11px;border-radius:999px;flex-shrink:0;white-space:nowrap;}
.b-pend{background:var(--ng-bg);color:var(--ng);}
.b-done{background:var(--ok-bg);color:var(--ok);}
.b-ng{background:#FEF3C7;color:#B45309;}

/* 항목 입력 */
.item-row{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:11px 12px;margin-bottom:8px;box-shadow:var(--sh);}
.ir-top{display:flex;align-items:flex-start;gap:8px;}
.ir-no{font-size:12px;font-weight:900;color:var(--muted);min-width:20px;}
.ir-desc{flex:1;font-size:13.5px;font-weight:600;line-height:1.35;}
.ir-spec{font-size:10px;color:var(--accent);font-weight:700;margin-top:2px;}
.ir-ctrl{display:flex;gap:6px;margin-top:9px;}
.ox{flex:1;padding:9px 0;border:1.5px solid var(--border);border-radius:9px;background:var(--s2);
  font-size:13px;font-weight:800;color:var(--muted);cursor:pointer;text-align:center;user-select:none;}
.ox.ok.on{background:var(--ok);color:#fff;border-color:var(--ok);}
.ox.ng.on{background:var(--ng);color:#fff;border-color:var(--ng);}
.ox.na.on{background:var(--na);color:#fff;border-color:var(--na);}
.num-in{width:100%;margin-top:9px;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;
  font-size:15px;font-family:inherit;outline:none;background:var(--surface);color:var(--text);}
.num-in:focus{border-color:var(--accent);}
.foot{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:560px;
  background:var(--bg);border-top:1px solid var(--border);padding:10px 14px calc(10px + env(safe-area-inset-bottom));
  display:flex;flex-direction:column;gap:8px;z-index:20;}
.meta-row{display:flex;gap:8px;}
.meta-row input{flex:1;padding:11px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:inherit;outline:none;background:var(--surface);color:var(--text);}
.meta-row input:focus{border-color:var(--accent);}
.btn-row{display:flex;gap:8px;}
.btn{flex:1;padding:15px;border-radius:13px;font-size:15px;font-weight:900;cursor:pointer;border:none;font-family:inherit;}
.btn-cancel{flex:0 0 90px;background:var(--s2);color:var(--muted);border:1px solid var(--border);}
.btn-submit{background:linear-gradient(135deg,#6366F1,#4F46E5);color:#fff;box-shadow:0 4px 14px rgba(99,102,241,.35);}
.btn-submit:disabled{background:var(--border);color:var(--muted);box-shadow:none;}
.shift-sel{display:flex;gap:6px;}
.shift-sel button{flex:1;padding:9px;border:1.5px solid var(--border);border-radius:9px;background:var(--s2);font-size:12px;font-weight:800;color:var(--muted);cursor:pointer;font-family:inherit;}
.shift-sel button.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.empty{text-align:center;padding:40px 16px;color:var(--muted);font-size:13px;}
.note{font-size:11px;color:var(--muted);text-align:center;}
#toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:700;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none;}
#toast.s{opacity:1;}
.back-lnk{font-size:13px;font-weight:700;color:var(--accent);background:none;border:none;cursor:pointer;padding:0;}
</style>
</head>
<body>
<header>
  <span class="h-title" data-i18n="title" data-lang-trigger onclick="cycleLang()">เช็คชีท</span>
  <div class="conn"><span class="cdot off" id="cdot"></span><span id="ctxt" data-i18n="connecting">กำลังเชื่อมต่อ</span></div>
</header>

<div class="crumb" id="crumb"></div>
<div class="wrap" id="wrap"></div>

<div class="foot" id="foot" style="display:none">
  <div class="shift-sel" id="shift-sel">
    <button id="sh-day" onclick="setShift('day')" data-i18n="day">กลางวัน</button>
    <button id="sh-night" onclick="setShift('night')" data-i18n="night">กลางคืน</button>
  </div>
  <div class="meta-row">
    <input id="in-by" data-i18n="enterName" placeholder="ชื่อผู้ตรวจ" autocomplete="off">
    <input id="in-remark" data-i18n="remarkOpt" placeholder="หมายเหตุ (ไม่บังคับ)" autocomplete="off">
  </div>
  <div class="btn-row">
    <button class="btn btn-cancel" onclick="backToSheets()" data-i18n="cancel">ยกเลิก</button>
    <button class="btn btn-submit" id="btn-submit" onclick="submitCheck()" data-i18n="submit">ส่งบันทึก</button>
  </div>
</div>

<div id="toast"></div>

<script>
const TUNNEL='server.samhwa.cloud';
const BY_KEY='cs_last_by';
let ws, templates=[], records=[], csDate='';
const params=new URLSearchParams(location.search);
let selLine=params.get('line')||'', selTmpl=null, selShift='day', editingId=null;
let answers={}; // itemId -> {status, value}

const todayStr=()=>{const d=new Date();const p=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;};
csDate=todayStr();

function allLines(){
  const s=new Set();
  templates.forEach(t=>(t.lines||[]).forEach(l=>s.add(l)));
  return [...s].sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));
}
function sheetsForLine(line){
  return templates.filter(t=>(t.lines||[]).includes(line))
    .sort((a,b)=>(a.code||'').localeCompare(b.code||''));
}
function recordFor(line,tmplId,shift){
  return records.find(r=>r.date===csDate&&r.line===line&&r.templateId===tmplId&&(r.shift||'')===(shift||''));
}

/* ── 렌더 라우팅 ── */
function render(){
  if(!selLine){ renderLines(); return; }
  if(!selTmpl){ renderSheets(); return; }
  renderItems();
}
function renderCrumb(){
  const c=document.getElementById('crumb');
  let h=`<button class="back-lnk" onclick="goHome()">${t('home')}</button>`;
  if(selLine) h+=` · <b>${selLine}</b>`;
  if(selTmpl) h+=` · ${selTmpl.code||''}`;
  c.innerHTML=h;
}
function goHome(){ selLine=''; selTmpl=null; render(); }

function renderLines(){
  document.getElementById('foot').style.display='none';
  renderCrumb();
  const lines=allLines();
  const wrap=document.getElementById('wrap');
  if(!lines.length){wrap.innerHTML=`<div class="empty">${t('noSheets')}</div>`;return;}
  wrap.innerHTML=`<div class="sec-ttl">${t('selectLine')}</div>
    <div class="grid">${lines.map(l=>`<div class="tile" onclick="pickLine('${l}')">${l}</div>`).join('')}</div>`;
}
function pickLine(l){ selLine=l; selTmpl=null; render(); }

function renderSheets(){
  document.getElementById('foot').style.display='none';
  renderCrumb();
  const sheets=sheetsForLine(selLine);
  const wrap=document.getElementById('wrap');
  if(!sheets.length){wrap.innerHTML=`<div class="empty">${t('noSheets')}</div>`;return;}
  wrap.innerHTML=`<div class="sec-ttl">${t('selectSheet')}</div>`+sheets.map(tp=>{
    const recD=recordFor(selLine,tp.id,'day'), recN=recordFor(selLine,tp.id,'night');
    let badge=`<span class="sc-badge b-pend">${t('pending')}</span>`;
    const recs=[recD,recN].filter(Boolean);
    if(recs.length){
      const anyNG=recs.some(r=>r.result==='NG');
      badge=anyNG?`<span class="sc-badge b-ng">${t('ng')}</span>`:`<span class="sc-badge b-done">${t('done')} ${recs.length>1?'2':''}</span>`;
    }
    return `<div class="sheet-card" onclick="pickSheet('${tp.id}')">
      <div class="sc-icon">${(tp.code||'?').slice(-2)}</div>
      <div class="sc-body"><div class="sc-code">${tp.code||''}</div><div class="sc-name">${tp.name||''}</div></div>
      ${badge}
    </div>`;
  }).join('');
}
function pickSheet(id){
  selTmpl=templates.find(t=>t.id===id);
  if(!selTmpl)return;
  selShift='day'; editingId=null; answers={};
  loadExisting();
  render();
}
function loadExisting(){
  const rec=recordFor(selLine,selTmpl.id,selShift);
  answers={};
  if(rec){
    editingId=rec.id;
    (rec.items||[]).forEach(it=>{answers[it.itemId]={status:it.status||'',value:it.value||'',remark:it.remark||''};});
    document.getElementById('in-by').value=rec.checkedBy||'';
    document.getElementById('in-remark').value=rec.remark||'';
  }else{
    editingId=null;
    document.getElementById('in-by').value=localStorage.getItem(BY_KEY)||'';
    document.getElementById('in-remark').value='';
  }
}
function setShift(s){ selShift=s; loadExisting(); renderItems(); }

function renderItems(){
  renderCrumb();
  document.getElementById('foot').style.display='flex';
  document.getElementById('sh-day').className=selShift==='day'?'on':'';
  document.getElementById('sh-night').className=selShift==='night'?'on':'';
  const wrap=document.getElementById('wrap');
  const items=selTmpl.items||[];
  wrap.innerHTML=`<div class="sec-ttl">${selTmpl.code} · ${selTmpl.name}</div>`+items.map(it=>{
    const a=answers[it.id]||{};
    if(it.type==='number'){
      return `<div class="item-row">
        <div class="ir-top"><span class="ir-no">${it.no||''}</span>
          <div class="ir-desc">${it.desc}${it.spec?`<div class="ir-spec">${t('spec')}: ${it.spec}${it.unit?' '+it.unit:''}</div>`:''}</div></div>
        <input class="num-in" type="text" inputmode="decimal" value="${a.value!=null?a.value:''}"
          oninput="setVal('${it.id}',this.value)" placeholder="${t('value')}${it.unit?' ('+it.unit+')':''}">
      </div>`;
    }
    return `<div class="item-row">
      <div class="ir-top"><span class="ir-no">${it.no||''}</span><div class="ir-desc">${it.desc}</div></div>
      <div class="ir-ctrl">
        <div class="ox ok${a.status==='OK'?' on':''}" onclick="setStatus('${it.id}','OK')">${t('ok')}</div>
        <div class="ox ng${a.status==='NG'?' on':''}" onclick="setStatus('${it.id}','NG')">${t('ng')}</div>
        <div class="ox na${a.status==='NA'?' on':''}" onclick="setStatus('${it.id}','NA')">${t('na')}</div>
      </div>
    </div>`;
  }).join('');
  updateSubmit();
}
function setStatus(id,s){
  answers[id]=answers[id]||{}; answers[id].status=(answers[id].status===s?'':s);
  renderItems();
}
function setVal(id,v){ answers[id]=answers[id]||{}; answers[id].value=v; answers[id].status=v.trim()!==''?'OK':''; updateSubmit(); }
function updateSubmit(){
  const items=selTmpl.items||[];
  const allDone=items.every(it=>{const a=answers[it.id]||{};return it.type==='number'?(a.value!=null&&String(a.value).trim()!==''):!!a.status;});
  document.getElementById('btn-submit').disabled=!allDone;
}
function backToSheets(){ selTmpl=null; editingId=null; render(); }

function submitCheck(){
  if(!ws||ws.readyState!==1){toast(t('disconnected'));return;}
  const items=selTmpl.items||[];
  const itemRecs=items.map(it=>{
    const a=answers[it.id]||{};
    return {itemId:it.id,no:it.no,desc:it.desc,type:it.type,
      status:a.status||'',value:(a.value!=null?a.value:''),remark:a.remark||''};
  });
  if(!itemRecs.every(r=>r.type==='number'?String(r.value).trim()!=='':!!r.status)){toast(t('fillAll'));return;}
  const anyNG=itemRecs.some(r=>r.status==='NG');
  const by=document.getElementById('in-by').value.trim();
  localStorage.setItem(BY_KEY,by);
  const rec={
    id: editingId || (crypto.randomUUID?crypto.randomUUID():Date.now().toString(36)+Math.random().toString(36).slice(2)),
    date:csDate, line:selLine, templateId:selTmpl.id, templateCode:selTmpl.code, templateName:selTmpl.name,
    shift:selShift, items:itemRecs, result:anyNG?'NG':'OK',
    checkedBy:by, remark:document.getElementById('in-remark').value.trim(),
    createdAt:new Date().toISOString()
  };
  ws.send(JSON.stringify({type:'ADD_CHECK',record:rec}));
  const i=records.findIndex(r=>r.id===rec.id);
  if(i>-1)records[i]=rec;else records.push(rec);
  toast(t('saved'));
  selTmpl=null; editingId=null; render();
}

/* ── WS ── */
function connect(){
  ws=new WebSocket(`wss://${TUNNEL}/ws/checksheet`);
  ws.onopen=()=>{document.getElementById('cdot').className='cdot';document.getElementById('ctxt').textContent=t('connected');};
  ws.onmessage=e=>{
    const m=JSON.parse(e.data);
    if(m.type==='INIT_CS_TEMPLATES'){templates=m.data||[];render();}
    else if(m.type==='INIT_CS_RECORDS'){records=m.data||[];csDate=m.csDate||csDate;render();}
    else if(m.type==='CHECK_ADDED'){const i=records.findIndex(r=>r.id===m.record.id);if(i>-1)records[i]=m.record;else records.push(m.record);if(!selTmpl)render();}
    else if(m.type==='CHECK_DELETED'){records=records.filter(r=>r.id!==m.id);if(!selTmpl)render();}
    else if(m.type==='CS_TEMPLATES_UPDATED'){templates=m.data||[];if(!selTmpl)render();}
  };
  ws.onclose=()=>{document.getElementById('cdot').className='cdot off';document.getElementById('ctxt').textContent=t('disconnected');setTimeout(connect,3000);};
  ws.onerror=()=>ws.close();
}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('s');setTimeout(()=>el.classList.remove('s'),1800);}
window.onLangChange=()=>render();
connect();
</script>
</body>
</html>
