<script>
        // ========================================================
        // 서버 연결 주소 설정
        // ========================================================
        const CLOUD_URL = 'https://여기에-본인의-클라우드플레어-주소.trycloudflare.com'; // 수정해주세요!
        const CATEGORY = 'C'; // B-3 폴더
        const BASE_IMAGE_URL = CLOUD_URL;
        const SERVER_URL = `${CLOUD_URL}/api/${CATEGORY}/parts`;
        // ========================================================

        const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        let partsData = [];
        let currentDept = 'MI';
        let selectedPartId = null;

        // DB 불러오기
        async function fetchPartsData() {
            try {
                const response = await fetch(SERVER_URL);
                if (!response.ok) throw new Error("서버 접속 실패");
                
                partsData = await response.json();
                partsData.forEach(part => {
                    if (part.imageUrl && !part.imageUrl.startsWith('http')) {
                        part.imageUrl = BASE_IMAGE_URL + part.imageUrl;
                    }
                });
                window.updateMachineDropdown();
                window.renderParts();
            } catch (error) {
                console.error("Fetch Error:", error);
                document.getElementById('partsContainer').innerHTML = `<p style="text-align:center; padding:40px; color:red;">서버와 연결할 수 없습니다. 주소나 상태를 확인하세요.</p>`;
            }
        }
        fetchPartsData();

        // [안전성 강화] 이미지 압축 함수
        function compressImage(file, maxWidth = 800, quality = 0.7) {
            return new Promise((resolve, reject) => {
                if (!file) { resolve(null); return; }
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        try {
                            const canvas = document.createElement('canvas');
                            let width = img.width;
                            let height = img.height;
                            if (width > maxWidth) {
                                height = Math.round((height * maxWidth) / width);
                                width = maxWidth;
                            }
                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            const compressedDataUrl = canvas.toDataURL('image/jpeg', quality);
                            resolve(compressedDataUrl);
                        } catch(e) {
                            reject(new Error("이미지 압축 중 오류 발생"));
                        }
                    };
                    img.onerror = () => reject(new Error("이미지 파일을 읽을 수 없습니다."));
                };
                reader.onerror = () => reject(new Error("파일 로드 실패"));
            });
        }

        window.setDepartment = function(dept) {
            currentDept = dept;
            document.getElementById('tab-MI').classList.remove('active');
            document.getElementById('tab-REPAIR').classList.remove('active');
            document.getElementById('tab-' + dept).classList.add('active');
            window.updateMachineDropdown();
            window.renderParts();
        };

        window.updateMachineDropdown = function() {
            const filterSelect = document.getElementById('machineFilter');
            filterSelect.innerHTML = '<option value="ALL">All Machines</option>';
            const machines = ["Flux Machine", "Wave Solder", "Conveyor", "I-COP", "ICT", "FPT", "DPT", "FT", "ETC"];
            machines.forEach(m => filterSelect.innerHTML += `<option value="${m}">${m}</option>`);
        };

        window.renderParts = function() {
            const container = document.getElementById('partsContainer');
            container.innerHTML = ''; 
            const selectedMachine = document.getElementById('machineFilter').value;

            let filtered = partsData.filter(p => p.dept === currentDept);
            if (selectedMachine !== 'ALL') {
                filtered = filtered.filter(p => {
                    const mArray = Array.isArray(p.machine) ? p.machine : [p.machine];
                    return mArray.includes(selectedMachine);
                });
            }

            if(filtered.length === 0) {
                container.innerHTML = '<p style="text-align:center; padding: 40px 20px; color:#888;">No parts registered.</p>';
                return;
            }

            filtered.forEach(part => {
                const item = document.createElement('div');
                item.className = 'part-item';
                item.onclick = () => window.openDetailModal(part.id); 
                const imageContent = part.imageUrl ? `<img src="${part.imageUrl}" alt="${part.name}">` : 'No Img';
                const machineDisplay = Array.isArray(part.machine) ? part.machine.join(', ') : part.machine;

                item.innerHTML = `
                    <div class="part-image">${imageContent}</div>
                    <div class="part-info-container">
                        <div class="part-text">
                            <h3>${part.name}</h3>
                            <p style="margin-bottom: 3px;">Machine: ${machineDisplay}</p>
                            <p>P/N: ${part.partNo}</p>
                        </div>
                        <div class="stock-badge">Stock: ${part.stock}</div>
                    </div>
                `;
                container.appendChild(item);
            });
        };

        window.openAddPartModal = function() {
            document.querySelectorAll('#newMachineGroup input[type="checkbox"]').forEach(cb => cb.checked = false);
            document.getElementById('newPartNo').value = '';
            document.getElementById('newPartName').value = '';
            document.getElementById('newStock').value = '0';
            document.getElementById('newPartImage').value = '';
            document.getElementById('addPartModal').style.display = 'flex';
        };

        // [에러 추적 강화] 부품 등록 함수
        window.registerNewPart = async function() {
            const btnSubmit = document.getElementById('btnRegisterSubmit');
            const partNo = document.getElementById('newPartNo').value.trim();
            const name = document.getElementById('newPartName').value.trim();
            const stock = parseInt(document.getElementById('newStock').value) || 0;
            const fileInput = document.getElementById('newPartImage');

            const checkedMachines = document.querySelectorAll('#newMachineGroup input[type="checkbox"]:checked');
            const machineArray = Array.from(checkedMachines).map(cb => cb.value);

            if(machineArray.length === 0) { alert("Please select at least one Machine."); return; }
            if(!partNo || !name) { alert("Please enter Part No. and Name."); return; }

            btnSubmit.disabled = true;

            try {
                let imageBase64 = null;
                const file = fileInput.files[0];
                
                // 1단계: 압축 상태 표시
                if (file) {
                    btnSubmit.innerText = "이미지 처리 중 (1/2)..."; 
                    imageBase64 = await compressImage(file, 800, 0.7);
                }

                const newPartData = {
                    dept: document.getElementById('newDept').value,
                    machine: machineArray, 
                    partNo: partNo,
                    name: name,
                    stock: stock,
                    imageBase64: imageBase64, 
                    history: []
                };

                if(stock > 0) {
                    const currentMonth = monthNames[new Date().getMonth()];
                    newPartData.history = [{ date: currentMonth, type: 'IN', line: '-', qty: stock, desc: 'Initial IN' }];
                }

                // 2단계: 서버 전송 상태 표시
                btnSubmit.innerText = "서버로 전송 중 (2/2)..."; 

                const response = await fetch(SERVER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newPartData)
                });

                // 에러 발생 시 명확하게 팝업 띄우기
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`[상태코드: ${response.status}] 서버 거부: ${errorText}`);
                }

                window.closeModal('addPartModal');
                window.setDepartment(newPartData.dept); 
                alert("성공적으로 등록되었습니다.");
                fetchPartsData(); 

            } catch (error) {
                console.error("Upload Error: ", error);
                alert("❌ 등록 실패\n\n원인: " + error.message);
            } finally {
                btnSubmit.innerText = "Register";
                btnSubmit.disabled = false;
            }
        };

        window.openDetailModal = function(id) {
            selectedPartId = id;
            const part = partsData.find(p => p.id === id);
            if(!part) return;
            const machineDisplay = Array.isArray(part.machine) ? part.machine.join(', ') : part.machine;
            document.getElementById('modalPartName').innerText = part.name;
            document.getElementById('modalMachineInfo').innerHTML = `Machine: ${machineDisplay} <br> P/N: ${part.partNo}`;
            document.getElementById('modalCurrentStock').innerText = part.stock;
            window.renderHistoryTable(part);
            document.getElementById('detailModal').style.display = 'flex';
        };

        window.renderHistoryTable = function(part) {
            const body = document.getElementById('modalHistoryBody');
            body.innerHTML = '';
            if(!part.history || part.history.length === 0) {
                body.innerHTML = '<tr><td colspan="5" style="padding:20px;">No history available.</td></tr>';
                return;
            }
            [...part.history].reverse().forEach(h => {
                const typeLabel = h.type === 'IN' ? 'IN' : 'OUT';
                body.innerHTML += `
                    <tr>
                        <td>${h.date}</td>
                        <td class="${h.type === 'IN' ? 'in-text' : 'out-text'}">${typeLabel}</td>
                        <td>${h.line}</td>
                        <td style="font-weight:bold;">${h.type === 'IN' ? '+' : '-'}${h.qty}</td>
                        <td style="text-align:left;">${h.desc}</td>
                    </tr>
                `;
            });
        };

        window.processTransaction = async function(type) {
            const part = partsData.find(p => p.id === selectedPartId);
            if(!part) return;
            const currentMonth = monthNames[new Date().getMonth()];
            let newQty = 0;
            let newHistoryObj = {};

            if (type === 'IN') {
                newQty = parseInt(document.getElementById('inQty').value);
                if(!newQty || newQty <= 0) return;
                newHistoryObj = { date: currentMonth, type: 'IN', line: '-', qty: newQty, desc: '-' };
                part.stock += newQty;
                document.getElementById('inQty').value = '';
            } else {
                newQty = parseInt(document.getElementById('outQty').value);
                const line = document.getElementById('outLine').value;
                const desc = document.getElementById('outDesc').value.trim();
                if(!newQty || !desc) { alert("Please enter Qty and Reason."); return; }
                if(part.stock < newQty) { alert("Not enough stock!"); return; }
                newHistoryObj = { date: currentMonth, type: 'OUT', line: line, qty: newQty, desc: desc };
                part.stock -= newQty;
                document.getElementById('outQty').value = '';
                document.getElementById('outDesc').value = '';
            }

            if(!part.history) part.history = [];
            part.history.push(newHistoryObj);

            try {
                const response = await fetch(`${SERVER_URL}/${part.id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ stock: part.stock, history: part.history })
                });
                if (!response.ok) throw new Error("서버 재고 업데이트 실패");
                document.getElementById('modalCurrentStock').innerText = part.stock;
                window.renderHistoryTable(part);
                fetchPartsData(); 
            } catch(e) {
                alert("재고 반영 오류: " + e.message);
            }
        };

        window.openEditModal = function() {
            const select = document.getElementById('editPartSelect');
            select.innerHTML = '<option value="">-- Select a part to edit --</option>';
            const currentDeptParts = partsData.filter(p => p.dept === currentDept);
            
            if(currentDeptParts.length === 0) {
                select.innerHTML = '<option value="">No parts available</option>';
            } else {
                currentDeptParts.forEach(part => {
                    const mDisplay = Array.isArray(part.machine) ? part.machine[0] + (part.machine.length>1?'...':'') : part.machine;
                    select.innerHTML += `<option value="${part.id}">[${mDisplay}] ${part.name} (P/N: ${part.partNo})</option>`;
                });
            }
            document.getElementById('editFields').style.display = 'none'; 
            document.getElementById('editModal').style.display = 'flex';
        };

        window.loadPartForEdit = function() {
            const partId = document.getElementById('editPartSelect').value;
            if(!partId) {
                document.getElementById('editFields').style.display = 'none';
                return;
            }
            const part = partsData.find(p => p.id === partId);
            if(part) {
                document.getElementById('editDept').value = part.dept;
                document.getElementById('editPartNo').value = part.partNo;
                document.getElementById('editPartName').value = part.name;
                const machineArray = Array.isArray(part.machine) ? part.machine : [part.machine];
                document.querySelectorAll('#editMachineGroup input[type="checkbox"]').forEach(cb => {
                    cb.checked = machineArray.includes(cb.value);
                });
                document.getElementById('editPartImage').value = '';
                document.getElementById('editFields').style.display = 'block'; 
            }
        };

        // [에러 추적 강화] 부품 수정 함수
        window.executeEdit = async function() {
            const partId = document.getElementById('editPartSelect').value;
            if(!partId) return;

            const newDept = document.getElementById('editDept').value;
            const newPartNo = document.getElementById('editPartNo').value.trim();
            const newPartName = document.getElementById('editPartName').value.trim();
            const fileInput = document.getElementById('editPartImage');

            const checkedMachines = document.querySelectorAll('#editMachineGroup input[type="checkbox"]:checked');
            const newMachineArray = Array.from(checkedMachines).map(cb => cb.value);

            if(newMachineArray.length === 0) { alert("Please select at least one Machine."); return; }
            if(!newPartNo || !newPartName) { alert("Please enter Part No. and Name."); return; }

            const btnSubmit = document.querySelector('#editFields .btn-submit');
            const originalBtnText = btnSubmit.innerText;
            btnSubmit.disabled = true;

            try {
                let updateData = { dept: newDept, machine: newMachineArray, partNo: newPartNo, name: newPartName };
                const file = fileInput.files[0];
                
                if (file) {
                    btnSubmit.innerText = "이미지 처리 중 (1/2)...";
                    updateData.imageBase64 = await compressImage(file, 800, 0.7);
                }

                btnSubmit.innerText = "서버 전송 중 (2/2)...";
                const response = await fetch(`${SERVER_URL}/${partId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updateData)
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`[상태코드: ${response.status}] 서버 거부: ${errorText}`);
                }

                window.closeModal('editModal');
                if(newDept !== currentDept) window.setDepartment(newDept);
                alert("수정 성공.");
                fetchPartsData();

            } catch (error) {
                console.error("Update Error: ", error);
                alert("❌ 수정 실패\n\n원인: " + error.message);
            } finally {
                btnSubmit.innerText = originalBtnText;
                btnSubmit.disabled = false;
            }
        };

        window.openDeleteModal = function() {
            const select = document.getElementById('deletePartSelect');
            select.innerHTML = '<option value="">-- Select a part to delete --</option>';
            const currentDeptParts = partsData.filter(p => p.dept === currentDept);
            if(currentDeptParts.length === 0) {
                select.innerHTML = '<option value="">No parts available</option>';
            } else {
                currentDeptParts.forEach(part => {
                    const mDisplay = Array.isArray(part.machine) ? part.machine[0] + (part.machine.length>1?'...':'') : part.machine;
                    select.innerHTML += `<option value="${part.id}">[${mDisplay}] ${part.name} (P/N: ${part.partNo})</option>`;
                });
            }
            document.getElementById('deleteModal').style.display = 'flex';
        };

        window.executeDelete = async function() {
            const select = document.getElementById('deletePartSelect');
            const partId = select.value;
            if(!partId) { alert("Please select a part to delete."); return; }
            if (confirm("정말 이 부품을 삭제하시겠습니까?")) {
                try {
                    const response = await fetch(`${SERVER_URL}/${partId}`, { method: 'DELETE' });
                    if (!response.ok) throw new Error("서버 삭제 실패");
                    window.closeModal('deleteModal');
                    alert("삭제 성공");
                    fetchPartsData(); 
                } catch(e) {
                    alert("삭제 오류: " + e.message);
                }
            }
        };

        window.openStatsModal = function() {
            const currentMonth = monthNames[new Date().getMonth()];
            document.getElementById('statsMonthSelect').value = currentMonth;
            window.renderStatsTable();
            document.getElementById('statsModal').style.display = 'flex';
        };

        window.renderStatsTable = function() {
            const selectedMonth = document.getElementById('statsMonthSelect').value;
            const selectedMachine = document.getElementById('machineFilter').value; 
            const tbody = document.getElementById('statsTableBody');
            tbody.innerHTML = '';
            const statsTitle = document.getElementById('statsTitle');
            const machineText = selectedMachine === 'ALL' ? 'All Machines' : selectedMachine;
            statsTitle.innerText = `📊 Monthly Stats (${currentDept} - ${machineText})`;

            let hasData = false;
            let filteredParts = partsData.filter(p => p.dept === currentDept);
            if (selectedMachine !== 'ALL') {
                filteredParts = filteredParts.filter(p => {
                    const mArray = Array.isArray(p.machine) ? p.machine : [p.machine];
                    return mArray.includes(selectedMachine);
                });
            }

            filteredParts.forEach(part => {
                let inSum = 0; let outSum = 0;
                if(part.history) {
                    part.history.forEach(h => {
                        if (h.date === selectedMonth) {
                            if (h.type === 'IN') inSum += h.qty;
                            if (h.type === 'OUT') outSum += h.qty;
                        }
                    });
                }
                if (inSum > 0 || outSum > 0) {
                    hasData = true;
                    const machineDisplay = Array.isArray(part.machine) ? part.machine.join(', ') : part.machine;
                    tbody.innerHTML += `
                        <tr>
                            <td>${part.dept}</td><td>${machineDisplay}</td><td>${part.partNo}</td>
                            <td style="text-align:left; font-weight:bold;">${part.name}</td>
                            <td class="in-text">${inSum > 0 ? '+' + inSum : '0'}</td>
                            <td class="out-text">${outSum > 0 ? '-' + outSum : '0'}</td>
                            <td><strong>${part.stock}</strong></td>
                        </tr>
                    `;
                }
            });

            if (!hasData) {
                tbody.innerHTML = `<tr><td colspan="7" style="color:#888; padding:30px;">No IN/OUT history for ${selectedMonth}.</td></tr>`;
            }
        };

        window.closeModal = function(id) { document.getElementById(id).style.display = 'none'; };
        window.updateMachineDropdown();
    </script>
