<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>생산 입력</title>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
<style>
:root{
  --bg:#F0EBE1; --surface:#FFFFFF; --s2:#F7F3EC; --s3:#EDE8DF;
  --border:#DDD7CB; --border2:#C4BDB0;
  --text:#1A1610; --text2:#3A342C; --muted:#8A8278;
  --accent:#2558D4; --accent-bg:#EBF0FD;
  --teal:#1A8C87; --teal-bg:#E6F7F7;
  --green:#146D38; --green-bg:#E6F4ED;
  --amber:#A8530A;
  --red:#B91C1C;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Pretendard',system-ui,sans-serif;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;}

/* ── header ── */
.top{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:14px 16px 12px;
  padding-top:calc(14px + env(safe-area-inset-top));
  box-shadow:var(--sh);
}
.top-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.line-tag{
  display:inline-flex;align-items:center;
  background:var(--accent-bg);border:1px solid var(--accent);
  border-radius:8px;padding:4px 10px;
  font-size:11px;font-weight:800;color:var(--accent);letter-spacing:.06em;
}
.line-proc{
  font-size:11px;font-weight:700;color:var(--muted);
  background:var(--s2);border:1px solid var(--border);
  border-radius:6px;padding:3px 9px;
}
.line-big{font-size:22px;font-weight:900;letter-spacing:-.02em;color:var(--text);}
.conn-row{display:flex;align-items:center;gap:6px;margin-top:4px;}
.cdot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0;}
.cdot.off{background:var(--red);animation:none;}
.ctxt{font-size:11px;color:var(--muted);font-weight:600;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── production summary bar ── */
.prod-summary{
  display:flex;gap:0;
  background:var(--surface);border-bottom:1px solid var(--border);
}
.ps-item{
  flex:1;padding:10px 14px;border-right:1px solid var(--border);
  display:flex;flex-direction:column;gap:2px;
}
.ps-item:last-child{border-right:none;}
.ps-lbl{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;}
.ps-val{font-size:18px;font-weight:900;color:var(--text);letter-spacing:-.02em;line-height:1.1;}
.ps-val.s2{color:var(--teal);}
.ps-sub{font-size:9px;color:var(--muted);font-weight:600;}

/* ── model selector ── */
.model-bar{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .15s;
}
.model-bar:active{background:var(--s2);}
.mb-left{display:flex;flex-direction:column;gap:2px;}
.mb-plant{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.04em;text-transform:uppercase;}
.mb-model{font-size:15px;font-weight:800;color:var(--text);}
.mb-model.empty{color:var(--muted);font-style:italic;font-size:13px;font-weight:600;}
.mb-arrow{font-size:20px;color:var(--border2);}

/* ── qty section ── */
.qty-section{padding:16px 16px 10px;}
.qty-display{
  text-align:center;margin-bottom:14px;
  background:var(--surface);border:1.5px solid var(--border);border-radius:16px;
  padding:18px 16px;box-shadow:var(--sh);
}
.qty-num{font-size:60px;font-weight:900;letter-spacing:-.04em;line-height:1;font-variant-numeric:tabular-nums;color:var(--text);}
.qty-num.zero{color:var(--border2);}
.qty-unit{font-size:12px;color:var(--muted);margin-top:4px;font-weight:700;letter-spacing:.1em;}

/* ── numpad ── */
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.nk{
  padding:17px 0;border:1px solid var(--border);border-radius:12px;
  background:var(--surface);font-size:22px;font-weight:700;color:var(--text);
  cursor:pointer;text-align:center;transition:background .1s,transform .08s;user-select:none;
  box-shadow:var(--sh);
}
.nk:active{background:var(--s3);transform:scale(.94);}
.nk.del{font-size:18px;color:var(--muted);}
.nk.clr{font-size:13px;font-weight:800;color:var(--red);border-color:rgba(185,28,28,.2);}

/* ── submit ── */
.submit-wrap{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;
  padding:10px 16px calc(10px + env(safe-area-inset-bottom));
  background:var(--bg);border-top:1px solid var(--border);
}
.submit-btn{
  width:100%;padding:17px;background:var(--accent);color:#fff;
  border:none;border-radius:14px;font-size:17px;font-weight:900;
  cursor:pointer;transition:background .15s;letter-spacing:-.01em;
}
.submit-btn:active{background:#1D4ED8;}
.submit-btn:disabled{background:var(--border);color:var(--muted);cursor:not-allowed;}

/* ── bottom sheet ── */
.sheet-bg{
  position:fixed;inset:0;background:rgba(26,22,16,.4);z-index:100;
  display:none;align-items:flex-end;justify-content:center;
}
.sheet-bg.open{display:flex;}
.sheet{
  background:var(--surface);border-radius:20px 20px 0 0;
  width:100%;max-width:480px;max-height:80vh;
  display:flex;flex-direction:column;
  box-shadow:0 -6px 30px rgba(0,0,0,.1);
  padding-bottom:env(safe-area-inset-bottom);
}
.sheet-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px 12px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.sheet-title{font-size:15px;font-weight:800;color:var(--text);}
.sheet-x{background:var(--s2);border:1px solid var(--border);border-radius:8px;
  color:var(--muted);font-size:15px;cursor:pointer;padding:5px 11px;font-weight:700;}
.sheet-body{overflow-y:auto;flex:1;padding:8px 12px 12px;}
.plant-group{margin-bottom:4px;}
.plant-label{
  font-size:10px;font-weight:800;color:var(--teal);letter-spacing:.08em;text-transform:uppercase;
  padding:10px 8px 4px;
}
.model-opt{
  display:flex;align-items:center;gap:10px;padding:12px;
  border-radius:10px;cursor:pointer;transition:background .12s;border:1px solid transparent;
}
.model-opt:active{background:var(--accent-bg);}
.model-opt.selected{background:var(--accent-bg);border-color:var(--accent);}
.model-dot{width:8px;height:8px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;}
.model-opt.selected .model-dot{background:var(--accent);border-color:var(--accent);}
.model-opt-name{font-size:14px;font-weight:700;color:var(--text);}
.no-plants{text-align:center;padding:30px;color:var(--muted);font-size:13px;}

/* ── confirm sheet ── */
.cf-sheet{
  background:var(--surface);border-radius:20px 20px 0 0;
  width:100%;max-width:480px;padding:20px 20px calc(20px + env(safe-area-inset-bottom));
  box-shadow:0 -6px 30px rgba(0,0,0,.1);
}
.cf-title{font-size:17px;font-weight:900;margin-bottom:3px;color:var(--text);}
.cf-sub{font-size:12px;color:var(--muted);margin-bottom:16px;}
.cf-rows{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.cf-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 13px;background:var(--s2);border:1px solid var(--border);border-radius:10px;
}
.cf-lbl{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.04em;text-transform:uppercase;}
.cf-val{font-size:13px;font-weight:800;color:var(--text);}
.slot-sel{
  background:var(--accent-bg);border:1.5px solid var(--accent);border-radius:7px;
  padding:5px 8px;color:var(--accent);font-size:13px;font-weight:800;outline:none;
  font-family:inherit;cursor:pointer;
}
.cf-btns{display:flex;gap:8px;}
.cf-cancel{flex:1;padding:14px;border:1px solid var(--border);border-radius:12px;
  background:var(--s2);font-size:14px;font-weight:700;color:var(--muted);cursor:pointer;}
.cf-ok{flex:2;padding:14px;background:var(--accent);color:#fff;border:none;
  border-radius:12px;font-size:14px;font-weight:900;cursor:pointer;}
.cf-ok:active{background:#1D4ED8;}

/* ── success ── */
#success{display:none;padding:50px 20px 120px;text-align:center;}
.ok-icon{font-size:56px;margin-bottom:12px;}
.ok-title{font-size:21px;font-weight:900;margin-bottom:6px;color:var(--text);}
.ok-sub{font-size:13px;color:var(--muted);line-height:1.8;margin-bottom:28px;}
.again-btn{padding:15px 36px;background:var(--accent);color:#fff;border:none;
  border-radius:12px;font-size:15px;font-weight:900;cursor:pointer;}

/* offline */
#offline{
  display:none;position:fixed;top:0;left:0;right:0;z-index:200;
  background:var(--red);color:#fff;text-align:center;font-size:12px;font-weight:700;
  padding:8px;padding-top:calc(8px + env(safe-area-inset-top));
}
</style>
</head>
<body>

<div id="offline">서버 연결 끊김 — 재연결 중...</div>

<!-- 헤더 -->
<div class="top">
  <div class="top-row1">
    <div class="line-tag" id="line-tag">라인</div>
    <div class="line-proc" id="line-proc"></div>
  </div>
  <div class="line-big" id="line-big">-</div>
  <div class="conn-row">
    <span class="cdot" id="cdot"></span>
    <span class="ctxt" id="ctxt">연결 중</span>
  </div>
</div>

<!-- 생산 요약 -->
<div class="prod-summary">
  <div class="ps-item">
    <div class="ps-lbl">S1</div>
    <div class="ps-val" id="ps-s1">—</div>
    <div class="ps-sub">PCS</div>
  </div>
  <div class="ps-item">
    <div class="ps-lbl">S2</div>
    <div class="ps-val s2" id="ps-s2">—</div>
    <div class="ps-sub">PCS</div>
  </div>
  <div class="ps-item">
    <div class="ps-lbl">1H 평균 (S2)</div>
    <div class="ps-val" id="ps-avg">—</div>
    <div class="ps-sub">PCS / h</div>
  </div>
</div>

<!-- 모델 선택 바 -->
<div class="model-bar" id="model-bar" onclick="openSheet()">
  <div class="mb-left">
    <div class="mb-plant" id="mb-plant">Plant</div>
    <div class="mb-model empty" id="mb-model">모델을 선택하세요 →</div>
  </div>
  <div class="mb-arrow">›</div>
</div>

<!-- 수량 입력 -->
<div class="qty-section" id="main-area">
  <div class="qty-display">
    <div class="qty-num zero" id="qty-disp">0</div>
    <div class="qty-unit">PCS</div>
  </div>
  <div class="numpad">
    <div class="nk" onclick="n('1')">1</div>
    <div class="nk" onclick="n('2')">2</div>
    <div class="nk" onclick="n('3')">3</div>
    <div class="nk" onclick="n('4')">4</div>
    <div class="nk" onclick="n('5')">5</div>
    <div class="nk" onclick="n('6')">6</div>
    <div class="nk" onclick="n('7')">7</div>
    <div class="nk" onclick="n('8')">8</div>
    <div class="nk" onclick="n('9')">9</div>
    <div class="nk clr" onclick="clr()">초기화</div>
    <div class="nk" onclick="n('0')">0</div>
    <div class="nk del" onclick="del()">⌫</div>
  </div>
</div>

<!-- 성공 화면 -->
<div id="success">
  <div class="ok-icon">✅</div>
  <div class="ok-title">등록 완료!</div>
  <div class="ok-sub" id="ok-sub"></div>
  <button class="again-btn" onclick="reset()">다시 입력</button>
</div>

<!-- 하단 등록 버튼 -->
<div class="submit-wrap" id="submit-wrap">
  <button class="submit-btn" id="submit-btn" onclick="openConfirm()" disabled>등록하기</button>
</div>

<!-- 모델 선택 시트 -->
<div class="sheet-bg" id="sheet-bg" onclick="onSheetBg(event)">
  <div class="sheet">
    <div class="sheet-head">
      <div class="sheet-title">Plant / 모델 선택</div>
      <button class="sheet-x" onclick="closeSheet()">✕</button>
    </div>
    <div class="sheet-body" id="sheet-body"></div>
  </div>
</div>

<!-- 확인 시트 -->
<div class="sheet-bg" id="cf-bg" onclick="onCfBg(event)">
  <div class="cf-sheet">
    <div class="cf-title">등록 확인</div>
    <div class="cf-sub">시간대를 확인하고 등록하세요.</div>
    <div class="cf-rows">
      <div class="cf-row"><span class="cf-lbl">라인 / 공정</span><span class="cf-val" id="cf-line">-</span></div>
      <div class="cf-row"><span class="cf-lbl">시간대</span><select class="slot-sel" id="cf-slot"></select></div>
      <div class="cf-row"><span class="cf-lbl">교대</span><span class="cf-val" id="cf-shift">-</span></div>
      <div class="cf-row"><span class="cf-lbl">모델</span><span class="cf-val" id="cf-model">-</span></div>
      <div class="cf-row"><span class="cf-lbl">수량</span><span class="cf-val" style="font-size:18px;color:var(--teal)" id="cf-qty">-</span></div>
    </div>
    <div class="cf-btns">
      <button class="cf-cancel" onclick="closeConfirm()">취소</button>
      <button class="cf-ok" onclick="submit()">등록</button>
    </div>
  </div>
</div>

<script>
const TUNNEL='server.samhwa.cloud';
const DAY_SLOTS  =['08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00'];
const NIGHT_SLOTS=['20:00','21:00','22:00','23:00','00:00','01:00','02:00','03:00','04:00','05:00','06:00','07:00'];
const LS_KEY='prod_last_sel';

const params=new URLSearchParams(location.search);
const LINE=params.get('line')||'', PROC=params.get('process')||'';

document.getElementById('line-tag').textContent=`라인  ${LINE}`;
document.getElementById('line-proc').textContent=PROC||'공정';
document.getElementById('line-big').textContent=LINE+(PROC?` — ${PROC}`:'');

let ws, plants=[], selPlant=null, selModel=null, qtyStr='0';
let records=[], viewDate='';

/* ── 숫자 ── */
function n(d){if(qtyStr==='0')qtyStr=d;else if(qtyStr.length<6)qtyStr+=d;render();}
function del(){qtyStr=qtyStr.length<=1?'0':qtyStr.slice(0,-1);render();}
function clr(){qtyStr='0';render();}
function render(){
  const v=parseInt(qtyStr);
  const el=document.getElementById('qty-disp');
  el.textContent=v.toLocaleString();
  el.className='qty-num'+(v===0?' zero':'');
  document.getElementById('submit-btn').disabled=!(selModel&&v>0);
}

/* ── utils ── */
const p2=x=>String(x).padStart(2,'0');
const fmtD=d=>`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
function calcDS(d){
  const h=d.getHours();
  if(h>=8&&h<20)return{date:fmtD(d),shift:'day',slots:DAY_SLOTS};
  if(h>=20)return{date:fmtD(d),shift:'night',slots:NIGHT_SLOTS};
  const y=new Date(d);y.setDate(y.getDate()-1);
  return{date:fmtD(y),shift:'night',slots:NIGHT_SLOTS};
}
function autoSlot(now,slots){
  const h=now.getHours(),m=now.getMinutes();
  const cur=p2(h)+':00',prev=p2(h===0?23:h-1)+':00';
  return(m<=10&&slots.includes(prev))?prev:(slots.includes(cur)?cur:slots[slots.length-1]);
}
function elapsed(){
  const now=new Date();
  const{date,shift}=calcDS(now);
  if(viewDate!==date)return 12;
  const h=now.getHours();
  if(shift==='day'){if(h<8)return 0;if(h>=20)return 12;return Math.max(1,h-8+1);}
  else{if(h>=20)return Math.max(1,h-20+1);if(h<8)return Math.max(1,4+h+1);return 12;}
}

/* ── production summary ── */
function updateSummary(){
  const lineRecs=records.filter(r=>r.line===LINE&&r.prodDate===viewDate);
  const s1=lineRecs.filter(r=>r.process==='S1').reduce((s,r)=>s+(r.qty||0),0);
  const s2=lineRecs.filter(r=>r.process==='S2').reduce((s,r)=>s+(r.qty||0),0);
  const el=elapsed();
  const avg=el>0?Math.round(s2/el):0;
  document.getElementById('ps-s2').textContent=s2>0?s2.toLocaleString():'—';
  document.getElementById('ps-s1').textContent=s1>0?s1.toLocaleString():'—';
  document.getElementById('ps-avg').textContent=avg>0?avg.toLocaleString():'—';
}

/* ── 모델 시트 ── */
function openSheet(){renderSheet();document.getElementById('sheet-bg').classList.add('open');}
function closeSheet(){document.getElementById('sheet-bg').classList.remove('open');}
function onSheetBg(e){if(e.target===document.getElementById('sheet-bg'))closeSheet();}

function renderSheet(){
  const body=document.getElementById('sheet-body');
  if(!plants.length){body.innerHTML='<div class="no-plants">등록된 Plant가 없습니다.<br>관리자에게 문의하세요.</div>';return;}
  body.innerHTML=plants.map(pl=>`
    <div class="plant-group">
      <div class="plant-label">${pl.name}</div>
      ${(pl.models||[]).map(m=>`
        <div class="model-opt${selModel?.id===m.id?' selected':''}" onclick="pickModel('${pl.id}','${m.id}')">
          <div class="model-dot"></div>
          <div class="model-opt-name">${m.name}</div>
        </div>`).join('')}
      ${!(pl.models||[]).length?`<div style="padding:8px 12px;font-size:12px;color:var(--muted)">모델 없음</div>`:''}
    </div>`).join('');
}

function pickModel(pid,mid){
  selPlant=plants.find(pl=>pl.id===pid);
  selModel=selPlant?.models?.find(m=>m.id===mid);
  if(selPlant&&selModel){
    localStorage.setItem(LS_KEY,JSON.stringify({plantId:selPlant.id,modelId:selModel.id}));
    document.getElementById('mb-plant').textContent=selPlant.name;
    const mEl=document.getElementById('mb-model');
    mEl.textContent=selModel.name;mEl.className='mb-model';
  }
  closeSheet();render();
}

/* ── 확인 시트 ── */
function openConfirm(){
  const now=new Date();
  const{date,shift,slots}=calcDS(now);
  const sl=autoSlot(now,slots);
  document.getElementById('cf-line').textContent=`${LINE}${PROC?' / '+PROC:''}`;
  document.getElementById('cf-shift').textContent=shift==='day'?'주간 ☀':'야간 🌙';
  document.getElementById('cf-model').textContent=`${selPlant.name} › ${selModel.name}`;
  document.getElementById('cf-qty').textContent=parseInt(qtyStr).toLocaleString()+' PCS';
  const sel=document.getElementById('cf-slot');
  sel.innerHTML=slots.map(s=>{
    const nh=(parseInt(s)+1)%24;
    return`<option value="${s}"${s===sl?' selected':''}>${s} ~ ${p2(nh)}:00</option>`;
  }).join('');
  document.getElementById('cf-bg').classList.add('open');
}
function closeConfirm(){document.getElementById('cf-bg').classList.remove('open');}
function onCfBg(e){if(e.target===document.getElementById('cf-bg'))closeConfirm();}

/* ── 전송 ── */
function submit(){
  if(!ws||ws.readyState!==1){alert('서버 연결이 끊겼습니다.');return;}
  const now=new Date();
  const{date,shift}=calcDS(now);
  const slot=document.getElementById('cf-slot').value;
  const rec={
    id:crypto.randomUUID?crypto.randomUUID():Date.now().toString(36)+Math.random().toString(36).slice(2),
    prodDate:date,shift,slot,
    line:LINE,process:PROC,
    plantId:selPlant.id,plantName:selPlant.name,
    modelId:selModel.id,modelName:selModel.name,
    qty:parseInt(qtyStr),createdAt:now.toISOString(),
  };
  ws.send(JSON.stringify({type:'ADD_PRODUCTION',record:rec}));
  records.push(rec);
  updateSummary();
  closeConfirm();
  const nh=(parseInt(slot)+1)%24;
  document.getElementById('ok-sub').innerHTML=
    `<b>${LINE}${PROC?' / '+PROC:''}</b><br>${slot} ~ ${p2(nh)}:00 실적<br><b>${selModel.name}</b> — ${rec.qty.toLocaleString()} PCS`;
  document.getElementById('main-area').style.display='none';
  document.getElementById('submit-wrap').style.display='none';
  document.getElementById('success').style.display='';
}

function reset(){
  qtyStr='0';
  document.getElementById('main-area').style.display='';
  document.getElementById('submit-wrap').style.display='';
  document.getElementById('success').style.display='none';
  render();
}

/* ── WS ── */
function connect(){
  ws=new WebSocket(`wss://${TUNNEL}/ws/production`);
  ws.onopen=()=>{
    document.getElementById('offline').style.display='none';
    document.getElementById('cdot').className='cdot';
    document.getElementById('ctxt').textContent='연결됨';
  };
  ws.onmessage=(e)=>{
    const msg=JSON.parse(e.data);
    if(msg.type==='INIT_PLANTS'||msg.type==='PLANTS_UPDATED'){
      plants=msg.data;
      try{
        const saved=JSON.parse(localStorage.getItem(LS_KEY)||'{}');
        if(saved.plantId&&saved.modelId){
          const sp=plants.find(pl=>pl.id===saved.plantId);
          const sm=sp?.models?.find(m=>m.id===saved.modelId);
          if(sp&&sm){
            selPlant=sp;selModel=sm;
            document.getElementById('mb-plant').textContent=sp.name;
            const mEl=document.getElementById('mb-model');
            mEl.textContent=sm.name;mEl.className='mb-model';
            render();
          }
        }
      }catch(_){}
    }
    else if(msg.type==='INIT_PRODUCTION'){
      records=msg.data||[];
      viewDate=msg.prodDate||'';
      updateSummary();
    }
    else if(msg.type==='PRODUCTION_ADDED'){
      const i=records.findIndex(r=>r.id===msg.record.id);
      if(i>-1)records[i]=msg.record;else records.push(msg.record);
      updateSummary();
    }
    else if(msg.type==='PRODUCTION_DELETED'){
      records=records.filter(r=>r.id!==msg.id);
      updateSummary();
    }
  };
  ws.onclose=()=>{
    document.getElementById('offline').style.display='';
    document.getElementById('cdot').className='cdot off';
    document.getElementById('ctxt').textContent='연결 끊김';
    setTimeout(connect,3000);
  };
  ws.onerror=()=>ws.close();
}

render();connect();
</script>
</body>
</html>
