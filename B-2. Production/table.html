<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Production</title>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
<style>
:root{
  --bg:#F5F7FA;
  --surface:#FFFFFF;
  --surface2:#F0F2F5;
  --surface3:#E8ECF0;
  --border:rgba(0,0,0,.09);
  --border2:rgba(0,0,0,.16);
  --text:#1A2430;
  --text2:#2D3A46;
  --muted:#7A8896;
  --accent:#0D9488;
  --accent-bg:rgba(13,148,136,.09);
  --green:#059669;
  --green-bg:rgba(5,150,105,.09);
  --teal:#0D9488;
  --teal-bg:rgba(13,148,136,.09);
  --amber:#D97706;
  --amber-bg:#FEF9EC;
  --cur:#F0FDFB;
  --cur-border:#0D9488;
  --sh:0 2px 8px rgba(0,0,0,.07),0 1px 3px rgba(0,0,0,.04);
  --shm:0 4px 16px rgba(0,0,0,.09),0 2px 6px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Pretendard',system-ui,sans-serif;}
html,body{background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ── header ── */
header{
  background:rgba(255,255,255,.92);border-bottom:1px solid var(--border);
  box-shadow:var(--sh);padding:10px 14px;
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  position:sticky;top:0;z-index:50;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
}
.back{
  padding:5px 10px;border:1px solid var(--border);border-radius:9px;
  font-size:12px;font-weight:600;color:var(--muted);text-decoration:none;
  background:var(--surface2);white-space:nowrap;
}
.ptitle{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-.02em;}
.date-nav{display:flex;align-items:center;gap:4px;}
.date-nav button{
  padding:5px 8px;border:1px solid var(--border);border-radius:8px;
  background:var(--surface2);color:var(--text2);font-size:12px;cursor:pointer;
}
#date-lbl{font-size:12px;font-weight:700;min-width:86px;text-align:center;}
.today-btn{background:var(--accent)!important;color:#fff!important;border-color:var(--accent)!important;font-size:11px!important;box-shadow:0 2px 8px rgba(13,148,136,.30)!important;}
.shift-tabs{display:flex;gap:4px;}
.stab{
  padding:5px 10px;border:1px solid var(--border);border-radius:8px;
  background:var(--surface2);color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;
}
.stab.d{background:var(--amber-bg);border-color:var(--amber);color:var(--amber);}
.stab.n{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);}
.hdr{margin-left:auto;display:flex;align-items:center;gap:8px;}
.cpill{
  display:flex;align-items:center;gap:5px;padding:4px 9px;
  border:1px solid var(--border);border-radius:999px;
  font-size:11px;font-weight:600;color:var(--muted);background:var(--surface2);
}
.dot{width:6px;height:6px;border-radius:50%;}
.dot-on{background:var(--green);box-shadow:0 0 4px var(--green);animation:pulse 2s infinite;}
.dot-off{background:#B01C1C;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#clock{font-size:12px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;white-space:nowrap;}
.adm{
  padding:5px 10px;border:1px solid var(--border);border-radius:6px;
  background:var(--surface2);font-size:11px;font-weight:600;color:var(--muted);text-decoration:none;
}

/* ── summary ── */
.sumbar{display:flex;gap:8px;padding:12px 14px 0;flex-wrap:wrap;}
.sc{
  flex:1;min-width:80px;
  background:var(--surface);border:1.5px solid var(--border);border-radius:14px;
  padding:10px 12px;box-shadow:var(--sh);
}
.sc-tot{border-color:var(--border2);}
.sc-s1{background:var(--accent-bg);border-color:var(--accent);}
.sc-s1 .sc-l,.sc-s1 .sc-v{color:var(--accent);}
.sc-s2{background:var(--teal-bg);border-color:var(--teal);}
.sc-s2 .sc-l,.sc-s2 .sc-v{color:var(--teal);}
.sc-l{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:3px;}
.sc-v{font-size:20px;font-weight:900;letter-spacing:-.02em;}
.sc-s{font-size:10px;color:var(--muted);margin-top:1px;}

/* ── slide card ── */
.slide-wrap{padding:12px 14px 20px;}
.slide-card{
  background:var(--surface);border:1.5px solid var(--border);border-radius:18px;
  box-shadow:var(--shm);overflow:hidden;
}

/* ── slide nav bar ── */
.slide-nav{
  display:flex;align-items:center;
  padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);
  gap:10px;
}
.snav-btn{
  width:36px;height:36px;border:1.5px solid var(--border);border-radius:10px;
  background:var(--surface);color:var(--text2);font-size:20px;font-weight:300;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .1s;line-height:1;
  user-select:none;-webkit-user-select:none;
}
.snav-btn:hover{background:var(--surface3);}
.snav-btn:disabled{opacity:.25;cursor:default;}
.slide-info{flex:1;text-align:center;}
.slide-title{font-size:14px;font-weight:800;color:var(--text);}
.slide-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.slide-dots{display:flex;gap:7px;align-items:center;flex-shrink:0;}
.sdot{
  width:9px;height:9px;border-radius:50%;background:var(--border2);
  cursor:pointer;transition:background .25s,transform .25s;
}
.sdot.on{background:var(--accent);transform:scale(1.3);}

/* ── viewport / track ── */
.slide-viewport{overflow:hidden;}
.slide-track{
  display:flex;
  transition:transform .35s cubic-bezier(.4,0,.2,1);
  will-change:transform;
}
.slide-panel{
  flex:0 0 100%;width:100%;
  overflow-x:auto;-webkit-overflow-scrolling:touch;
}

/* ── table ── */
table{border-collapse:collapse;width:100%;min-width:340px;}
thead th{
  padding:7px 4px;font-size:10px;font-weight:700;color:var(--muted);
  letter-spacing:.04em;text-align:center;background:var(--surface2);
  border-bottom:2px solid var(--border2);white-space:nowrap;
  position:sticky;top:0;z-index:10;
}
.col-line{
  position:sticky;left:0;z-index:12!important;
  background:var(--surface2)!important;
  width:70px;min-width:70px;max-width:70px;
  text-align:left!important;padding-left:10px!important;
  border-right:2px solid var(--border2)!important;
}
thead .col-line{z-index:22!important;}
.sh{min-width:54px;}
.col-tot{
  min-width:56px;width:56px;
  border-left:2px solid var(--border2)!important;
  font-weight:800!important;color:var(--text2)!important;
}
td{
  padding:0;text-align:center;
  border-bottom:1px solid var(--border);
  border-right:1px solid var(--border);
  vertical-align:middle;
}
.ln-cell{padding:7px 8px;text-align:left;vertical-align:middle;}
.ln-name{font-size:12px;font-weight:800;color:var(--text);display:block;line-height:1.2;}
.ln-model{font-size:9px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:62px;display:block;}
.sv{height:46px;cursor:default;transition:background .1s;}
.sv:hover{background:var(--surface3)!important;}
.sv-inner{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:1px;padding:3px 2px;
}
.sv-total{font-size:13px;font-weight:800;color:var(--text);line-height:1;}
.sv-detail{font-size:9px;color:var(--muted);line-height:1.2;white-space:nowrap;}
.sv-empty{font-size:14px;color:var(--border);}
.tv{padding:6px 4px;font-size:13px;font-weight:900;color:var(--text);}
.tv.z{color:var(--border2);font-size:12px;font-weight:400;}
.odd .sv,.odd .tv{background:var(--surface);}
.even .sv,.even .tv{background:var(--surface2);}
/* ── 공정 탭 ── */
.proc-tabs{display:flex;gap:4px;}
.ptab{
  padding:5px 14px;border:1.5px solid var(--border);border-radius:8px;
  background:var(--surface2);color:var(--muted);font-size:12px;font-weight:800;cursor:pointer;
  transition:background .15s,color .15s,border-color .15s;
}
.ptab.s1{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);}
.ptab.s2{background:var(--teal-bg);border-color:var(--teal);color:var(--teal);}
/* 자동 전환 표시 */
.proc-auto{
  font-size:10px;font-weight:700;color:var(--muted);
  display:flex;align-items:center;gap:4px;white-space:nowrap;
}
.proc-auto .bar-bg{width:32px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.proc-auto .bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 1s linear;}
/* ── data cells ── */
.col-avg{min-width:52px;width:52px;border-left:1px solid var(--border)!important;font-weight:700!important;}
.sum-row td{
  background:var(--surface3);border-top:2px solid var(--border2);
  font-size:11px;font-weight:700;padding:5px 3px;color:var(--text2);
}
.sum-row .col-line{font-size:11px;font-weight:800;}
.sum-val{font-weight:900!important;}
.sum-avg{font-weight:900!important;}
/* ── 그룹 테두리 ── */
.g-start td{border-top:2px solid var(--border2)!important;}
.g-end td{border-bottom:2px solid var(--border2)!important;}
tr.g-start td:first-child,tr.g-mid td:first-child,tr.g-end td:first-child{border-left:2px solid var(--border2)!important;}
tr.g-start td:last-child,tr.g-mid td:last-child,tr.g-end td:last-child{border-right:2px solid var(--border2)!important;}

/* ── 모델 컬럼 ── */
.col-model{min-width:100px;width:120px;text-align:left;padding:6px 8px;font-size:13px;color:var(--text);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;vertical-align:middle;cursor:pointer;}
.col-model:hover{background:var(--surface2);}
/* ── 라인 모달 ── */
.lm-backdrop{position:fixed;inset:0;background:rgba(26,22,16,.45);z-index:200;display:none;}
.lm-backdrop.on{display:block;}
.lm-box{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--surface);border-radius:20px;box-shadow:0 8px 40px rgba(13,148,136,.18);width:min(400px,90vw);max-height:80vh;display:none;flex-direction:column;overflow:hidden;z-index:201;}
.lm-hd{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 12px;border-bottom:1px solid var(--border);}
.lm-title{font-size:16px;font-weight:900;}
.lm-cls{width:28px;height:28px;border:1px solid var(--border);border-radius:7px;background:var(--surface2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--muted);}
.lm-body{overflow-y:auto;padding:14px 18px 20px;}
/* ── Excel 미리보기 모달 ── */
#xp-backdrop{position:fixed;inset:0;background:rgba(26,22,16,.5);z-index:300;display:none;}
#xp-backdrop.on{display:block;}
#xp-modal{position:fixed;inset:20px;background:var(--surface);border-radius:20px;box-shadow:0 12px 48px rgba(13,148,136,.18);display:none;flex-direction:column;overflow:hidden;z-index:301;}
#xp-modal.on{display:flex;}
#xp-hd{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0;}
#xp-title{font-size:15px;font-weight:900;flex:1;}
#xp-line-sel{padding:5px 10px;border:1px solid var(--border);border-radius:7px;font-size:12px;font-weight:600;background:var(--s2);color:var(--text);}
#xp-dl{padding:7px 16px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;}
#xp-cls{width:28px;height:28px;border:1px solid var(--border);border-radius:7px;background:var(--surface2);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--muted);flex-shrink:0;}
#xp-wrap{overflow:auto;flex:1;}
#xp-tbl{width:100%;border-collapse:collapse;font-size:12px;}
#xp-tbl th{background:var(--accent);color:#fff;font-weight:700;font-size:11px;padding:8px 10px;white-space:nowrap;position:sticky;top:0;z-index:2;text-align:left;}
#xp-tbl td{padding:7px 10px;border-bottom:1px solid var(--border);white-space:nowrap;vertical-align:middle;}
#xp-tbl tr:nth-child(even) td{background:var(--s2);}
#xp-empty{padding:40px;text-align:center;color:var(--muted);font-size:13px;}
.lm-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);}
.lm-row:last-child{border-bottom:none;}
.lm-model{font-size:13px;font-weight:700;color:var(--text);}
.lm-qty{font-size:14px;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums;}
.lm-empty{text-align:center;padding:24px;color:var(--muted);font-size:13px;}
/* ── swipe hint ── */
.swipe-hint{
  text-align:center;padding:7px;
  font-size:10px;color:var(--muted);letter-spacing:.02em;
  border-top:1px solid var(--border);background:var(--surface2);
}

/* ── overlay ── */
#ov{
  position:fixed;inset:0;background:rgba(245,247,250,.93);z-index:300;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;
}
.sp{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#ov p{font-size:13px;color:var(--muted);font-weight:600;}
#ov.h{display:none;}
#toast{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  background:var(--text);color:#fff;border-radius:8px;
  padding:8px 16px;font-size:12px;font-weight:600;z-index:200;
  opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;
}
#toast.s{opacity:1;}

@media(max-width:480px){
  .sumbar{gap:6px;padding:10px 10px 0;}
  .sc{padding:8px 10px;min-width:80px;}
  .sc-v{font-size:17px;}
  .slide-wrap{padding:10px 10px 16px;}
  .col-line{width:62px;min-width:62px;max-width:62px;}
  .sh{min-width:46px;}
}

/* ── PC full table ── */
#pc-wrap{display:none;padding:10px 16px 16px;}
.pc-card{
  background:var(--surface);border:1.5px solid var(--border);border-radius:18px;box-shadow:var(--shm);
  overflow:hidden;
}
.pc-card table{border-collapse:collapse;width:100%;table-layout:fixed;height:100%;}
.pc-card thead th{
  padding:10px 6px;font-size:12px;font-weight:700;color:var(--muted);
  letter-spacing:.04em;text-align:center;background:var(--surface2);
  border-bottom:2px solid var(--border2);white-space:nowrap;
}
.pc-card .col-line{
  position:sticky;left:0;z-index:12!important;background:var(--surface2)!important;
  width:5%;
  text-align:left!important;padding-left:10px!important;
  border-right:2px solid var(--border2)!important;
}
.pc-card .col-tot{width:3%;border-left:2px solid var(--border2)!important;font-weight:800!important;}
.pc-card .col-avg{width:3%;}
.pc-card th{padding:3px 2px!important;font-size:10px!important;}
.pc-card td{padding:0;text-align:center;border-bottom:1px solid var(--border);border-right:1px solid var(--border);vertical-align:middle;}
.pc-card .ln-cell{padding:6px 8px;text-align:left;}
.pc-card .ln-cell .ln-name{font-size:13px;font-weight:800;color:var(--text);display:block;line-height:1.2;}
.pc-card .ln-cell .ln-model{font-size:9px;color:var(--muted);white-space:nowrap;max-width:70px;overflow:hidden;text-overflow:ellipsis;display:block;margin-top:1px;}
.pc-card .sv{height:42px;}
.pc-card .sv-inner{padding:2px 2px;}
.pc-card .sv-total{font-size:22px;font-weight:800;color:var(--text);}
.pc-card .sv-empty{font-size:12px;color:var(--border2);}
.pc-card .tv{padding:6px 4px;font-size:14px;font-weight:900;color:var(--text);}
.pc-card .tv.z{color:var(--border2);font-size:12px;font-weight:400;}
.pc-card .odd .sv,.pc-card .odd .tv{background:var(--surface);}
.pc-card .even .sv,.pc-card .even .tv{background:var(--surface2);}
.pc-card .odd .s2-td,.pc-card .even .s2-td{background:rgba(26,140,135,.06)!important;}
.pc-card .sum-row td{background:var(--surface3);border-top:2px solid var(--border2);font-size:12px;font-weight:700;padding:5px 4px;color:var(--text2);}
.pc-card .sum-row .col-line{font-size:12px;font-weight:800;}
.pc-card .sum-val{font-weight:900!important;font-size:14px!important;}
.pc-card .sum-avg{font-weight:900!important;font-size:14px!important;}

@media(min-width:768px){
  html,body{height:100%;}
  body{display:flex;flex-direction:column;}
  .slide-wrap{display:none;}
  #pc-wrap{display:flex;flex-direction:column;flex:1;min-height:0;}
  .pc-card{flex:1;min-height:0;overflow:hidden;}
  .pc-card .sv{height:auto!important;}
  .sumbar{padding:14px 20px 0;}
  .sc{padding:12px 18px;}
  .sc-v{font-size:26px;}
}
</style>
</head>
<body>
<div id="ov"><div class="sp"></div><p>서버 연결 중...</p></div>

<header>
  <a href="../index.html" class="back">← 홈</a>
  <span class="ptitle">Production</span>
  <div class="date-nav">
    <button onclick="changeDate(-1)">◀</button>
    <span id="date-lbl">-</span>
    <button onclick="changeDate(1)">▶</button>
    <button class="today-btn" onclick="goToday()">오늘</button>
  </div>
  <div class="shift-tabs">
    <button class="stab" id="td" onclick="setShift('day')">☀ 주간</button>
    <button class="stab" id="tn" onclick="setShift('night')">🌙 야간</button>
  </div>
  <div class="proc-tabs">
    <button class="ptab" id="pp1" onclick="setProc('S1')">S1</button>
    <button class="ptab" id="pp2" onclick="setProc('S2')">S2</button>
  </div>
  <div class="proc-auto" id="proc-auto">
    <span id="proc-timer-lbl">자동</span>
    <div class="bar-bg"><div class="bar-fill" id="proc-bar" style="width:100%"></div></div>
  </div>
  <div class="hdr">
    <div class="cpill"><span class="dot dot-on" id="cdot"></span><span id="ctxt">연결중</span></div>
    <span id="clock"></span>
    <a href="print-qr.html" class="adm">🖨️ QR</a>
    <button onclick="exportExcel()" class="adm" style="border:1px solid var(--border);background:var(--surface2);cursor:pointer">📥 Excel</button>
    <a href="stats.html" class="adm">📊 통계</a>
    <a href="admin.html" class="adm">⚙ 관리</a>
  </div>
</header>

<div class="sumbar">
  <div class="sc sc-tot"><div class="sc-l">총 생산</div><div class="sc-v" id="s-tot">0</div><div class="sc-s">PCS</div></div>
  <div class="sc sc-s1">
    <div class="sc-l">S1 합계</div>
    <div class="sc-v" id="s-s1">0</div>
    <div class="sc-s">PCS &nbsp;·&nbsp; 평균 <span id="s-a1" style="font-weight:800">0</span>/h</div>
  </div>
  <div class="sc sc-s2">
    <div class="sc-l">S2 합계</div>
    <div class="sc-v" id="s-s2">0</div>
    <div class="sc-s">PCS &nbsp;·&nbsp; 평균 <span id="s-a2" style="font-weight:800">0</span>/h</div>
  </div>
</div>

<div class="slide-wrap">
  <div class="slide-card">
    <div class="slide-nav">
      <button class="snav-btn" id="btn-prev" onclick="goSlide(0)" disabled>‹</button>
      <div class="slide-info">
        <div class="slide-title" id="slide-title">오전 08:00 ~ 14:00</div>
        <div class="slide-sub" id="slide-sub"></div>
      </div>
      <div class="slide-dots">
        <div class="sdot on" id="dot0" onclick="goSlide(0)"></div>
        <div class="sdot" id="dot1" onclick="goSlide(1)"></div>
      </div>
      <button class="snav-btn" id="btn-next" onclick="goSlide(1)">›</button>
    </div>

    <div class="slide-viewport" id="vp">
      <div class="slide-track" id="track">
        <div class="slide-panel">
          <table><thead id="th0"></thead><tbody id="tb0"></tbody></table>
        </div>
        <div class="slide-panel">
          <table><thead id="th1"></thead><tbody id="tb1"></tbody></table>
        </div>
      </div>
    </div>

    <div class="swipe-hint" id="shint">→ 슬라이드하여 오후 시간대 보기</div>
  </div>
</div>

<div id="pc-wrap">
  <div class="pc-card">
    <table><thead id="pc-th"></thead><tbody id="pc-tb"></tbody></table>
  </div>
</div>

<div id="toast"></div>

<!-- Excel 미리보기 모달 -->
<div id="xp-backdrop" onclick="closeXP()"></div>
<div id="xp-modal">
  <div id="xp-hd">
    <span id="xp-title">Excel 미리보기</span>
    <select id="xp-line-sel" onchange="renderXPTable()"><option value="">전체 라인</option></select>
    <button id="xp-dl" onclick="downloadExcel()">⬇ 다운로드</button>
    <div id="xp-cls" onclick="closeXP()">✕</div>
  </div>
  <div id="xp-wrap">
    <div id="xp-empty" style="display:none">기록이 없습니다.</div>
    <table id="xp-tbl">
      <thead><tr>
        <th>Record</th><th>Line</th><th>Time</th><th>Shift</th>
        <th>Section</th><th>Plant</th><th>Model</th><th>Q'ty</th><th>Remark</th>
      </tr></thead>
      <tbody id="xp-tbody"></tbody>
    </table>
  </div>
</div>

<!-- 라인 모달 -->
<div class="lm-backdrop" id="lm-backdrop" onclick="closeLineModal()"></div>
<div class="lm-box" id="lm-box">
  <div class="lm-hd">
    <span class="lm-title" id="lm-title">—</span>
    <div class="lm-cls" onclick="closeLineModal()">✕</div>
  </div>
  <div class="lm-body" id="lm-body"></div>
</div>

<script>
const TUNNEL='server.samhwa.cloud';
const LINES=['L.1','L.2','L.3','L.4','L.5','L.6','L.7','L.9','L.8_IN','L.8_OUT'];
const DAY_SLOTS  =['08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00'];
const NIGHT_SLOTS=['20:00','21:00','22:00','23:00','00:00','01:00','02:00','03:00','04:00','05:00','06:00','07:00'];

let ws,records=[],plants=[];
let viewDate='',viewShift='day',viewProc='S1',curSlideIdx=0;

const p2=n=>String(n).padStart(2,'0');
const fmtD=d=>`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
function calcDS(d){
  const h=d.getHours();
  if(h>=8&&h<20)return{date:fmtD(d),shift:'day'};
  if(h>=20)return{date:fmtD(d),shift:'night'};
  const y=new Date(d);y.setDate(y.getDate()-1);
  return{date:fmtD(y),shift:'night'};
}
function slotLbl(s){const h=parseInt(s);return`${p2(h)}~${p2((h+1)%24)}`;}
function curSlot(){
  const h=new Date().getHours();
  const s=p2(h)+':00';
  const all=viewShift==='day'?DAY_SLOTS:NIGHT_SLOTS;
  return all.includes(s)?s:null;
}
function elapsed(){
  const now=new Date();
  const{date,shift}=calcDS(now);
  if(viewDate!==date||viewShift!==shift)return 12;
  const h=now.getHours();
  if(viewShift==='day'){
    if(h<8)return 0;if(h>=20)return 12;return Math.max(1,h-8+1);
  }else{
    if(h>=20)return Math.max(1,h-20+1);
    if(h<8)return Math.max(1,4+h+1);
    return 12;
  }
}

/* ── slide ── */
function goSlide(idx){
  curSlideIdx=idx;
  document.getElementById('track').style.transform=`translateX(-${idx*100}%)`;
  document.getElementById('dot0').className='sdot'+(idx===0?' on':'');
  document.getElementById('dot1').className='sdot'+(idx===1?' on':'');
  document.getElementById('btn-prev').disabled=(idx===0);
  document.getElementById('btn-next').disabled=(idx===1);
  refreshSlideLabel();
}
function refreshSlideLabel(){
  const titles=viewShift==='day'
    ?['오전  08:00 ~ 14:00','오후  14:00 ~ 20:00']
    :['전반  20:00 ~ 02:00','후반  02:00 ~ 08:00'];
  document.getElementById('slide-title').textContent=titles[curSlideIdx];
  const all=viewShift==='day'?DAY_SLOTS:NIGHT_SLOTS;
  const sec=curSlideIdx===0?all.slice(0,6):all.slice(6);
  const tot=LINES.reduce((s,l)=>s+lineTotal(l,sec),0);
  document.getElementById('slide-sub').textContent=tot>0?`소계 ${tot.toLocaleString()} PCS`:'';
  document.getElementById('shint').textContent=
    curSlideIdx===0?'→ 슬라이드하여 오후 시간대 보기':'← 슬라이드하여 오전 시간대 보기';
}

/* ── touch swipe ── */
let tx0=null;
const vp=document.getElementById('vp');
vp.addEventListener('touchstart',e=>{tx0=e.touches[0].clientX;},{passive:true});
vp.addEventListener('touchend',e=>{
  if(tx0===null)return;
  const dx=e.changedTouches[0].clientX-tx0;tx0=null;
  if(Math.abs(dx)<40)return;
  if(dx<0&&curSlideIdx===0)goSlide(1);
  else if(dx>0&&curSlideIdx===1)goSlide(0);
},{passive:true});

/* ── data ── */
function sr(){return records.filter(r=>r.prodDate===viewDate&&r.shift===viewShift);}
function adr(){return records.filter(r=>r.prodDate===viewDate);}  // all-day records (both shifts)
function slotQty(line,proc,slot){return sr().filter(r=>r.line===line&&r.process===proc&&r.slot===slot).reduce((s,r)=>s+(r.qty||0),0);}
function lineSlotQty(line,slot){return['S1','S2'].reduce((s,p)=>s+slotQty(line,p,slot),0);}
function lineSlotBreakdown(line,slot){return['S1','S2'].map(p=>({p,q:slotQty(line,p,slot)})).filter(x=>x.q>0);}
function lineTotal(line,slots){return slots.reduce((s,slot)=>s+lineSlotQty(line,slot),0);}
function lineTotalAll(line){return adr().filter(r=>r.line===line).reduce((s,r)=>s+(r.qty||0),0);}
function grandTotalAll(){return LINES.reduce((s,l)=>s+lineTotalAll(l),0);}
function slotFact(slot){return LINES.reduce((s,l)=>s+lineSlotQty(l,slot),0);}
function lastModel(line){
  const recs=adr().filter(r=>r.line===line&&r.modelName);
  if(!recs.length)return'';
  return recs.sort((a,b)=>a.slot>b.slot?1:-1).at(-1).modelName;
}

/* ── nav ── */
function changeDate(d){
  const dt=new Date(viewDate+'T12:00:00');dt.setDate(dt.getDate()+d);
  viewDate=fmtD(dt);document.getElementById('date-lbl').textContent=viewDate;fetchLog();
}
function goToday(){
  const{date,shift}=calcDS(new Date());
  viewDate=date;viewShift=shift;
  document.getElementById('date-lbl').textContent=viewDate;
  renderTabs();fetchLog();
}
function setShift(s){viewShift=s;renderTabs();renderAll();}
function renderTabs(){
  document.getElementById('td').className='stab'+(viewShift==='day'?' d':'');
  document.getElementById('tn').className='stab'+(viewShift==='night'?' n':'');
}
function fetchLog(){
  fetch(`https://${TUNNEL}/api/production/log?date=${viewDate}`)
    .then(r=>r.json()).then(j=>{records=j.records||[];renderAll();});
}

/* ── 공정 전환 ── */
const PROC_INTERVAL=5*60; // seconds
let procTimer=PROC_INTERVAL;
let procTimerHandle=null;

function setProc(p,resetTimer=true){
  viewProc=p;
  renderProc();
  renderAll();
  if(resetTimer){procTimer=PROC_INTERVAL;updateProcBar();}
}
function renderProc(){
  document.getElementById('pp1').className='ptab'+(viewProc==='S1'?' s1':'');
  document.getElementById('pp2').className='ptab'+(viewProc==='S2'?' s2':'');
}
function updateProcBar(){
  const pct=Math.round((procTimer/PROC_INTERVAL)*100);
  document.getElementById('proc-bar').style.width=pct+'%';
  const color=viewProc==='S1'?'var(--accent)':'var(--teal)';
  document.getElementById('proc-bar').style.background=color;
  const m=Math.floor(procTimer/60),s=procTimer%60;
  document.getElementById('proc-timer-lbl').textContent=`자동 ${m}:${String(s).padStart(2,'0')}`;
}
function startProcTimer(){
  if(procTimerHandle)clearInterval(procTimerHandle);
  procTimerHandle=setInterval(()=>{
    procTimer--;
    if(procTimer<=0){
      procTimer=PROC_INTERVAL;
      setProc(viewProc==='S1'?'S2':'S1',false);
    }
    updateProcBar();
  },1000);
}

/* ── render ── */
function renderAll(){
  const el=elapsed();
  const all=viewShift==='day'?DAY_SLOTS:NIGHT_SLOTS;
  const cur=curSlot();
  const allRec=adr();
  const s1tot=allRec.filter(r=>LINES.includes(r.line)&&r.process==='S1').reduce((s,r)=>s+(r.qty||0),0);
  const s2tot=allRec.filter(r=>LINES.includes(r.line)&&r.process==='S2').reduce((s,r)=>s+(r.qty||0),0);
  const total=s1tot+s2tot;
  const curRec=sr();
  const s1cur=curRec.filter(r=>LINES.includes(r.line)&&r.process==='S1').reduce((s,r)=>s+(r.qty||0),0);
  const s2cur=curRec.filter(r=>LINES.includes(r.line)&&r.process==='S2').reduce((s,r)=>s+(r.qty||0),0);
  document.getElementById('s-tot').textContent=total.toLocaleString();
  document.getElementById('s-s1').textContent=s1tot.toLocaleString();
  document.getElementById('s-s2').textContent=s2tot.toLocaleString();
  const s1Filled=new Set(curRec.filter(r=>LINES.includes(r.line)&&r.process==='S1'&&(r.qty||0)>0).map(r=>r.slot)).size;
  const s2Filled=new Set(curRec.filter(r=>LINES.includes(r.line)&&r.process==='S2'&&(r.qty||0)>0).map(r=>r.slot)).size;
  document.getElementById('s-a1').textContent=(s1Filled>0?Math.round(s1cur/s1Filled):0).toLocaleString();
  document.getElementById('s-a2').textContent=(s2Filled>0?Math.round(s2cur/s2Filled):0).toLocaleString();
  snapQty=Object.assign({},prevQty);
  buildSlide('th0','tb0',all.slice(0,6),cur);
  buildSlide('th1','tb1',all.slice(6),cur);
  buildPC(all,cur);
  refreshSlideLabel();
}

const MAIN_LINES=LINES.filter(l=>l!=='L.8_IN'&&l!=='L.8_OUT');
const EXTRA_LINES=['L.8_IN','L.8_OUT'];

function buildLineRow(line,li,slots,cur){
  const cls=li%2===0?'odd':'even';
  const model=lastModel(line);
  const tot=adr().filter(r=>r.line===line&&r.process===viewProc).reduce((s,r)=>s+(r.qty||0),0);
  const curTot=sr().filter(r=>r.line===line&&r.process===viewProc).reduce((s,r)=>s+(r.qty||0),0);
  const filledSlots=new Set(sr().filter(r=>r.line===line&&r.process===viewProc&&(r.qty||0)>0).map(r=>r.slot)).size;
  const avg=filledSlots>0?Math.round(curTot/filledSlots):0;
  let row=`<tr class="${cls}">
    <td class="col-line ln-cell" onclick="openLineModal('${line}')" style="cursor:pointer">
      <span class="ln-name">${line}</span>
    </td>
    <td class="col-model" onclick="openLineModal('${line}')">${model?`<span style="color:var(--text);font-weight:700">${model}</span>`:'<span style="color:var(--border2)">—</span>'}</td>`;
  slots.forEach(slot=>{
    const q=slotQty(line,viewProc,slot);const isCur=slot===cur;
    const key=`${line}|${slot}|${viewProc}`;
    const prev=snapQty[key]||0;
    prevQty[key]=q;
    row+=`<td class="sv${isCur?' cur':''}"${q>0?` onclick="openSlotModal('${line}','${slot}')" style="cursor:pointer"`:''}><div class="sv-inner">${q>0?`<span class="sv-total" data-val="${q}" data-from="${prev}">${q.toLocaleString()}</span>`:`<span class="sv-empty">·</span>`}</div></td>`;
  });
  row+=`<td class="col-tot tv${tot===0?' z':''}">${tot>0?tot.toLocaleString():'—'}</td>`;
  row+=`<td class="col-avg tv${avg===0?' z':''}">${avg>0?avg.toLocaleString():'—'}</td>`;
  row+=`</tr>`;
  return row;
}

function addGroupClass(row,gc){return row.replace(/^<tr class="([^"]*)">/,`<tr class="$1 ${gc}">`);}

function buildTableRows(slots,cur){
  const rows=[];
  // 그룹1: L.1~L.9 + Total
  MAIN_LINES.forEach((line,li)=>{
    let r=buildLineRow(line,li,slots,cur);
    const gc=li===0?'g-start':'g-mid';
    rows.push(addGroupClass(r,gc));
  });
  // 그룹2: L.8_IN / L.8_OUT
  EXTRA_LINES.forEach((line,li)=>{
    let r=buildLineRow(line,li,slots,cur);
    const gc=li===0?'g-start':(li===EXTRA_LINES.length-1?'g-end':'g-mid');
    rows.push(addGroupClass(r,gc));
  });
  return rows.join('');
}

const HDR_THEAD=(slots,cur)=>`<tr>
  <th class="col-line">라인</th>
  <th class="col-model" style="text-align:left">모델</th>
  ${slots.map(s=>`<th class="sh">${slotLbl(s)}</th>`).join('')}
  <th class="col-tot">일일 합계</th>
  <th class="col-avg">평균/h</th>
</tr>`;

const prevQty={};
let snapQty={};

function countUp(el,from,to,duration=600){
  let startTime=null;
  function step(ts){
    if(!startTime) startTime=ts;
    const progress=Math.min((ts-startTime)/duration,1);
    const eased=1-Math.pow(1-progress,3);
    el.textContent=Math.round(from+(to-from)*eased).toLocaleString();
    if(progress<1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function animateCounters(tbId){
  document.getElementById(tbId).querySelectorAll('.sv-total[data-val]').forEach(el=>{
    const to=parseInt(el.dataset.val);
    const from=parseInt(el.dataset.from||'0');
    if(from!==to) countUp(el,from,to);
  });
}

function buildSlide(thId,tbId,slots,cur){
  document.getElementById(thId).innerHTML=HDR_THEAD(slots,cur);
  document.getElementById(tbId).innerHTML=buildTableRows(slots,cur);
  animateCounters(tbId);
}

function buildPC(slots,cur){
  document.getElementById('pc-th').innerHTML=HDR_THEAD(slots,cur);
  document.getElementById('pc-tb').innerHTML=buildTableRows(slots,cur);
  animateCounters('pc-tb');
  requestAnimationFrame(equalizeRows);
}
function equalizeRows(){
  const card=document.querySelector('.pc-card');
  const thead=document.getElementById('pc-th')?.closest('thead');
  const tbody=document.getElementById('pc-tb');
  if(!card||!thead||!tbody)return;
  const rows=[...tbody.querySelectorAll('tr')];
  if(!rows.length)return;
  rows.forEach(r=>r.style.height='');
  const rowH=Math.floor((card.clientHeight-thead.offsetHeight)/rows.length);
  rows.forEach(r=>r.style.height=rowH+'px');
}
window.addEventListener('resize',equalizeRows);

/* ── WS ── */
function connect(){
  ws=new WebSocket(`wss://${TUNNEL}/ws/production`);
  ws.onopen=()=>{
    document.getElementById('ov').classList.add('h');
    document.getElementById('cdot').className='dot dot-on';
    document.getElementById('ctxt').textContent='연결됨';
  };
  ws.onmessage=e=>{
    const msg=JSON.parse(e.data);
    if(msg.type==='INIT_PLANTS'){plants=msg.data;}
    else if(msg.type==='INIT_PRODUCTION'){
      records=msg.data;viewDate=msg.prodDate;viewShift=msg.shift;
      document.getElementById('date-lbl').textContent=viewDate;
      renderTabs();renderAll();
      const cur=curSlot();
      if(cur){
        const all=viewShift==='day'?DAY_SLOTS:NIGHT_SLOTS;
        goSlide(all.indexOf(cur)>=6?1:0);
      }
    }
    else if(msg.type==='PRODUCTION_ADDED'){
      const i=records.findIndex(r=>r.id===msg.record.id);
      if(i>-1)records[i]=msg.record;else records.push(msg.record);
      renderAll();toast('✓ 생산 기록 추가');
    }
    else if(msg.type==='PRODUCTION_DELETED'){
      records=records.filter(r=>r.id!==msg.id);renderAll();
    }
    else if(msg.type==='PLANTS_UPDATED'){plants=msg.data;}
  };
  ws.onclose=()=>{
    document.getElementById('ov').classList.remove('h');
    document.getElementById('cdot').className='dot dot-off';
    document.getElementById('ctxt').textContent='연결 끊김';
    setTimeout(connect,3000);
  };
  ws.onerror=()=>ws.close();
}
function fmtRecTime(iso){
  if(!iso)return'';
  try{
    if(iso.endsWith('Z')||iso.includes('+')){
      // createdAt: UTC → KST +9
      const d=new Date(new Date(iso).getTime()+9*3600*1000);
      const s=d.toISOString();
      return`${s.slice(5,7)}-${s.slice(8,10)} ${s.slice(11,16)}`;
    }
    // serverCreatedAt: 이미 KST 문자열 "YYYY-MM-DDTHH:MM:SS"
    return`${iso.slice(5,7)}-${iso.slice(8,10)} ${iso.slice(11,16)}`;
  }catch{return'';}
}
function openSlotModal(line, slot){
  const recs = sr().filter(r=>r.line===line&&r.slot===slot&&r.process===viewProc&&r.modelName);
  const sorted = [...recs].sort((a,b)=>(a.serverCreatedAt||a.createdAt||'').localeCompare(b.serverCreatedAt||b.createdAt||''));
  const h = parseInt(slot);
  const slotLabel = `${slot} ~ ${String((h+1)%24).padStart(2,'0')}:00`;
  document.getElementById('lm-title').textContent = `${line}  ${slotLabel}  ·  ${viewProc}`;
  document.getElementById('lm-body').innerHTML = sorted.length
    ? sorted.map(r=>`<div class="lm-row">
        <span style="font-size:11px;color:var(--muted);font-weight:600;min-width:60px">${fmtRecTime(r.serverCreatedAt||r.createdAt)}</span>
        <span class="lm-model">${r.modelName}</span>
        <span class="lm-qty">${(r.qty||0).toLocaleString()} <span style="font-size:11px;font-weight:600;color:var(--muted)">PCS</span></span>
      </div>`).join('')
    : `<div class="lm-empty">기록 없음</div>`;
  document.getElementById('lm-backdrop').classList.add('on');
  document.getElementById('lm-box').style.display='flex';
  document.getElementById('lm-box').style.flexDirection='column';
}
function openLineModal(line){
  const recs=adr().filter(r=>r.line===line&&r.modelName);
  const sorted=[...recs].sort((a,b)=>(a.serverCreatedAt||a.createdAt||'').localeCompare(b.serverCreatedAt||b.createdAt||''));
  document.getElementById('lm-title').textContent=line;
  document.getElementById('lm-body').innerHTML=sorted.length
    ?sorted.map(r=>`<div class="lm-row">
        <span style="font-size:11px;color:var(--muted);font-weight:600;min-width:60px">${fmtRecTime(r.serverCreatedAt||r.createdAt)}</span>
        <span class="lm-model">${r.modelName}</span>
        <span class="lm-qty">${(r.qty||0).toLocaleString()} <span style="font-size:11px;font-weight:600;color:var(--muted)">PCS</span></span>
      </div>`).join('')
    :`<div class="lm-empty">금일 생산 기록 없음</div>`;
  document.getElementById('lm-backdrop').classList.add('on');
  document.getElementById('lm-box').style.display='flex';
  document.getElementById('lm-box').style.flexDirection='column';
}
function closeLineModal(){
  document.getElementById('lm-backdrop').classList.remove('on');
  document.getElementById('lm-box').style.display='none';
}
let xpRows=[];
async function exportExcel(){
  document.getElementById('xp-backdrop').classList.add('on');
  document.getElementById('xp-modal').classList.add('on');
  document.getElementById('xp-title').textContent=`Excel 미리보기 — ${viewDate}`;
  document.getElementById('xp-tbody').innerHTML='<tr><td colspan="9" style="text-align:center;padding:30px;color:var(--muted)">불러오는 중...</td></tr>';
  try{
    const res=await fetch(`https://${TUNNEL}/api/production/preview?date=${viewDate}`);
    const j=await res.json();
    xpRows=j.rows||[];
    // 라인 목록 채우기
    const lines=[...new Set(xpRows.map(r=>r.line))].sort();
    const sel=document.getElementById('xp-line-sel');
    sel.innerHTML='<option value="">전체 라인</option>'+lines.map(l=>`<option value="${l}">${l}</option>`).join('');
    renderXPTable();
  }catch(e){
    document.getElementById('xp-tbody').innerHTML=`<tr><td colspan="9" style="text-align:center;padding:30px;color:var(--muted)">오류: ${e.message}</td></tr>`;
  }
}
function renderXPTable(){
  const line=document.getElementById('xp-line-sel').value;
  const rows=line?xpRows.filter(r=>r.line===line):xpRows;
  if(!rows.length){
    document.getElementById('xp-tbl').style.display='none';
    document.getElementById('xp-empty').style.display='block';
    return;
  }
  document.getElementById('xp-tbl').style.display='';
  document.getElementById('xp-empty').style.display='none';
  const totalQty=rows.reduce((s,r)=>s+(r.qty||0),0);
  document.getElementById('xp-tbody').innerHTML=rows.map(r=>`<tr>
    <td>${r.record}</td><td>${r.line}</td><td>${r.time}</td><td>${r.shift}</td>
    <td>${r.section}</td><td>${r.plant}</td><td>${r.model}</td>
    <td style="text-align:right;font-weight:700">${(r.qty||0).toLocaleString()}</td>
    <td>${r.remark||''}</td>
  </tr>`).join('')+`<tr style="background:var(--accent-bg);font-weight:900;">
    <td colspan="7" style="text-align:right;padding:8px 10px;font-size:12px;color:var(--muted)">Total</td>
    <td style="text-align:right;padding:8px 10px;font-size:13px;color:var(--accent)">${totalQty.toLocaleString()}</td>
    <td></td>
  </tr>`;
}
function downloadExcel(){
  const a=document.createElement('a');
  a.href=`https://${TUNNEL}/api/production/export?date=${viewDate}`;
  a.download='';a.click();
}
function closeXP(){
  document.getElementById('xp-backdrop').classList.remove('on');
  document.getElementById('xp-modal').classList.remove('on');
}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('s');setTimeout(()=>t.classList.remove('s'),2000);}
function tick(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});}
setInterval(tick,1000);tick();

function autoShiftCheck(){
  const now=new Date();
  const h=now.getHours(),m=now.getMinutes();
  let newShift,newDate;
  if(h>20||(h===20&&m>=45)){
    newShift='night';newDate=fmtD(now);
  } else if(h<8||(h===8&&m<45)){
    const prev=new Date(now);prev.setDate(prev.getDate()-1);
    newShift='night';newDate=fmtD(prev);
  } else {
    newShift='day';newDate=fmtD(now);
  }
  if(newShift!==viewShift||newDate!==viewDate){
    viewShift=newShift;viewDate=newDate;
    document.getElementById('date-lbl').textContent=viewDate;
    renderTabs();fetchLog();
  }
}

const{date,shift}=calcDS(new Date());
viewDate=date;viewShift=shift;
document.getElementById('date-lbl').textContent=viewDate;
renderTabs();renderProc();connect();startProcTimer();
setInterval(renderAll,60000);
setInterval(autoShiftCheck,60000);
autoShiftCheck();
</script>
