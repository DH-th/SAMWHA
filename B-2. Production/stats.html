<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>생산 통계 — Production</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
<script src="lang.js"></script>
<style>
:root{
  --bg:#F5F7FA;--surface:#FFFFFF;--s2:#F0F2F5;--s3:#E8ECF0;
  --border:rgba(0,0,0,.09);--border2:rgba(0,0,0,.16);
  --text:#1A2430;--text2:#2D3A46;--muted:#7A8896;
  --accent:#0D9488;--accent-bg:rgba(13,148,136,.09);
  --sh:0 2px 8px rgba(0,0,0,.07),0 1px 3px rgba(0,0,0,.04);
  --shm:0 4px 16px rgba(0,0,0,.09);
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Pretendard',system-ui,sans-serif;}
html,body{background:var(--bg);color:var(--text);min-height:100vh;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;
  display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;}
.back{padding:5px 10px;border:1px solid var(--border);border-radius:7px;font-size:12px;
  font-weight:600;color:var(--muted);text-decoration:none;background:var(--s2);}
h1{font-size:16px;font-weight:900;}

/* ── 컨트롤 바 ── */
.ctrl{background:var(--surface);border-bottom:1px solid var(--border);
  padding:9px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.ptab{padding:5px 14px;border:1px solid var(--border);border-radius:6px;
  background:var(--s2);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;}
.ptab.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.dnbtn{padding:5px 8px;border:1px solid var(--border);border-radius:6px;
  background:var(--s2);font-size:12px;cursor:pointer;color:var(--text2);}
.dnbtn.today{background:var(--accent);color:#fff;border-color:var(--accent);}
#range-lbl{font-size:12px;font-weight:700;min-width:160px;text-align:center;}

/* ── 뷰 탭 ── */
.view-tabs{background:var(--surface);border-bottom:1px solid var(--border);
  padding:0 16px;display:flex;gap:0;}
.vtab{padding:10px 18px;font-size:13px;font-weight:700;color:var(--muted);
  border-bottom:2px solid transparent;cursor:pointer;}
.vtab.on{color:var(--accent);border-bottom-color:var(--accent);}

/* ── 요약 ── */
.summary{display:flex;gap:12px;padding:14px 16px;flex-wrap:wrap;align-items:flex-start;}
.sum-total{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;
  padding:11px 16px;box-shadow:var(--sh);flex-shrink:0;min-width:110px;}
.sum-lbl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px;}
.sum-val{font-size:22px;font-weight:900;letter-spacing:-.02em;line-height:1.1;}
.sum-sub{font-size:10px;color:var(--muted);margin-top:3px;}
.sum-top10{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;
  padding:11px 16px;box-shadow:var(--sh);flex:1;min-width:260px;}
.sum-top10-lbl{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;}
.top10-list{display:flex;flex-direction:column;gap:4px;}
.top10-row{display:flex;align-items:center;gap:7px;}
.top10-rank{font-size:10px;font-weight:800;color:var(--muted);width:16px;text-align:center;flex-shrink:0;}
.top10-name{font-size:12px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.top10-qty{font-size:12px;font-weight:800;color:var(--accent);min-width:50px;text-align:right;}

/* ── 뷰 콘텐츠 ── */
.view{display:none;padding:0 16px 32px;}
.view.on{display:block;}

/* ── 전체 뷰 ── */
.overall-wrap{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap;}
.overall-chart-card{background:var(--surface);border:1.5px solid var(--border);
  border-radius:18px;padding:18px;box-shadow:var(--shm);flex:1;min-width:300px;}
.oc-title{font-size:15px;font-weight:900;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.oc-badge{font-size:10px;font-weight:800;padding:3px 9px;border-radius:999px;}
.s1-badge{background:rgba(13,148,136,.12);color:#0D9488;}
.s2-badge{background:rgba(13,148,136,.20);color:#0A7A70;}
.oc-chart{width:100%;max-width:280px;margin:0 auto 16px;}
.oc-legend{display:flex;flex-direction:column;gap:6px;}
.oc-leg-row{display:flex;align-items:center;gap:7px;}
.oc-leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.oc-leg-name{font-size:12px;font-weight:600;flex:1;min-width:0;word-break:break-all;line-height:1.3;}
.oc-leg-pct{font-size:13px;font-weight:800;color:var(--text2);min-width:42px;text-align:right;}
.oc-leg-qty{font-size:11px;color:var(--muted);min-width:55px;text-align:right;}
.oc-total{margin-top:12px;padding-top:10px;border-top:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;}
.oc-total-lbl{font-size:11px;color:var(--muted);}
.oc-total-val{font-size:16px;font-weight:900;}

/* ── 라인별 뷰 ── */
.line-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(420px,1fr));gap:12px;margin-top:14px;}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;padding:14px;box-shadow:var(--sh);}
.card-title{font-size:13px;font-weight:900;margin-bottom:10px;}
.card-empty{text-align:center;padding:20px;color:var(--muted);font-size:12px;}
.proc-sections{display:flex;gap:12px;}
.proc-section{flex:1;min-width:0;}
.proc-lbl{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.08em;
  text-transform:uppercase;margin-bottom:7px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.proc-inner{display:flex;gap:8px;align-items:flex-start;}
.chart-wrap{width:100px;height:100px;flex-shrink:0;}
.legend{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px;}
.leg-row{display:flex;align-items:flex-start;gap:5px;}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:2px;}
.leg-name{font-size:11px;font-weight:600;flex:1;min-width:0;word-break:break-all;line-height:1.35;}
.leg-right{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;}
.leg-pct{font-size:11px;font-weight:800;color:var(--text2);}
.leg-qty{font-size:10px;color:var(--muted);}
.proc-total{margin-top:5px;font-size:10px;color:var(--muted);text-align:right;}
.proc-total strong{color:var(--text);font-weight:800;}
.proc-empty{font-size:11px;color:var(--border2);padding:6px 0;}

/* ── 제품별 뷰 ── */
.product-grid{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
.prod-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  padding:14px;box-shadow:var(--sh);}
.prod-name{font-size:14px;font-weight:900;margin-bottom:10px;}
.prod-row{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.prod-proc-lbl{font-size:11px;font-weight:700;width:26px;color:var(--muted);}
.prod-bar-wrap{flex:1;height:18px;background:var(--s3);border-radius:5px;overflow:hidden;}
.prod-bar{height:100%;border-radius:5px;transition:width .4s;}
.prod-bar-s1{background:linear-gradient(90deg,#0D9488,#34D8CE);}
.prod-bar-s2{background:linear-gradient(90deg,#0A7A70,#27B09F);}
.prod-qty{font-size:12px;font-weight:800;min-width:55px;text-align:right;}
.prod-total{font-size:11px;color:var(--muted);margin-top:4px;text-align:right;}
.prod-total strong{color:var(--text);}

/* ── 로딩 ── */
#ov{position:fixed;inset:0;background:rgba(240,235,225,.9);z-index:300;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
.sp{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#ov.h{display:none;}

@media(max-width:600px){
  .line-grid{grid-template-columns:1fr;}
  .proc-sections{flex-direction:column;}
  .overall-wrap{flex-direction:column;}
}
.lang-sw{display:flex;gap:3px;}
.lang-btn{padding:3px 8px;border:1.5px solid var(--border);border-radius:7px;
  font-size:11px;font-weight:700;background:var(--s2,var(--surface));color:var(--muted);cursor:pointer;font-family:inherit;}
.lang-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
</style>
</head>
<body>
<div id="ov"><div class="sp"></div><p style="font-size:13px;color:var(--muted);font-weight:600" data-i18n="loading">กำลังโหลด...</p></div>

<header>
  <a href="table.html" class="back" data-i18n="backToProd">← การผลิต</a>
  <h1 data-i18n="statsTitle" data-lang-trigger onclick="cycleLang()" style="cursor:pointer;user-select:none">สถิติการผลิต</h1>
</header>

<div class="ctrl">
  <div style="display:flex;gap:4px" id="period-tabs">
    <button class="ptab on" onclick="setPeriod('day')" data-i18n="daily">รายวัน</button>
    <button class="ptab" onclick="setPeriod('week')" data-i18n="weekly">รายสัปดาห์</button>
    <button class="ptab" onclick="setPeriod('month')" data-i18n="monthly">รายเดือน</button>
  </div>
  <div style="display:flex;align-items:center;gap:4px">
    <button class="dnbtn" onclick="move(-1)">◀</button>
    <span id="range-lbl">—</span>
    <button class="dnbtn" onclick="move(1)">▶</button>
    <button class="dnbtn today" onclick="goToday()" data-i18n="today">วันนี้</button>
  </div>
</div>

<div class="view-tabs">
  <div class="vtab on" onclick="setView('overall')" data-i18n="viewAll">ภาพรวม (L.1–L.7)</div>
  <div class="vtab" onclick="setView('lines')" data-i18n="viewByLine">แยกตามไลน์</div>
  <div class="vtab" onclick="setView('products')" data-i18n="viewByProduct">แยกตามโมเดล</div>
</div>

<div class="summary" id="summary"></div>

<div class="view on" id="view-overall"></div>
<div class="view" id="view-lines"></div>
<div class="view" id="view-products"></div>

<script>
const TUNNEL     = 'server.samhwa.cloud';
const MAIN_LINES = ['L.1','L.2','L.3','L.4','L.5','L.6','L.7'];
const ALL_LINES  = ['L.1','L.2','L.3','L.4','L.5','L.6','L.7','L.9','L.8_IN','L.8_OUT'];
const PALETTE    = [
  '#2558D4','#F59E0B','#10B981','#EF4444','#8B5CF6',
  '#F97316','#5FD0C9','#EC4899','#6366F1','#84CC16',
  '#14B8A6','#F43F5E','#A855F7','#0EA5E9','#D97706','#BE185D','#059669',
];
const chartInstances = {};
const p2   = n => String(n).padStart(2,'0');
const fmtD = d => `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;
const addDays = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };

let period='day', anchor=new Date(), currentView='overall', allRecords=[];

/* ── 기간 ── */
function getDates(){
  const a=new Date(anchor.getFullYear(),anchor.getMonth(),anchor.getDate());
  if(period==='day') return[fmtD(a)];
  if(period==='week'){
    const dow=a.getDay()||7, mon=addDays(a,1-dow);
    return Array.from({length:7},(_,i)=>fmtD(addDays(mon,i)));
  }
  const y=a.getFullYear(),m=a.getMonth(),days=new Date(y,m+1,0).getDate();
  return Array.from({length:days},(_,i)=>fmtD(new Date(y,m,i+1)));
}
function getRangeLabel(){
  const d=getDates();
  if(period==='day') return d[0];
  if(period==='week') return`${d[0]} ~ ${d[6]}`;
  return`${anchor.getFullYear()} ${t('months')[anchor.getMonth()]}`;
}
function move(d){
  if(period==='day') anchor=addDays(anchor,d);
  else if(period==='week') anchor=addDays(anchor,d*7);
  else anchor=new Date(anchor.getFullYear(),anchor.getMonth()+d,1);
  load();
}
function goToday(){anchor=new Date();load();}
function setPeriod(p){
  period=p;
  document.querySelectorAll('#period-tabs .ptab').forEach((b,i)=>b.classList.toggle('on',['day','week','month'][i]===p));
  load();
}
function setView(v){
  currentView=v;
  document.querySelectorAll('.vtab').forEach((b,i)=>b.classList.toggle('on',['overall','lines','products'][i]===v));
  document.querySelectorAll('.view').forEach((el,i)=>el.classList.toggle('on',['overall','lines','products'][i]===v));
}

/* ── 로드 ── */
async function load(){
  document.getElementById('ov').classList.remove('h');
  document.getElementById('range-lbl').textContent=getRangeLabel();
  const dates=getDates();
  allRecords=[];
  await Promise.all(dates.map(async d=>{
    try{const r=await fetch(`https://${TUNNEL}/api/production/log?date=${d}`);
      const j=await r.json();(j.records||[]).forEach(rec=>allRecords.push(rec));}catch{}
  }));
  render(allRecords);
  document.getElementById('ov').classList.add('h');
}

/* ── 집계 헬퍼 ── */
function aggByModel(recs,proc){
  const map={};
  recs.filter(r=>!proc||r.process===proc).forEach(r=>{
    const m=r.modelName||'(미등록)';map[m]=(map[m]||0)+(r.qty||0);
  });
  return Object.entries(map).sort((a,b)=>b[1]-a[1]);
}

/* ── 차트 파기 ── */
function destroyCharts(){
  Object.values(chartInstances).forEach(c=>c.destroy());
  Object.keys(chartInstances).forEach(k=>delete chartInstances[k]);
}

/* ── 요약 ── */
function renderSummary(recs){
  const total=recs.reduce((s,r)=>s+(r.qty||0),0);
  const allModels=aggByModel(recs);
  const top5=allModels.slice(0,5);
  const bot5=allModels.length>5?allModels.slice(-5).reverse():[];
  const mkRows=(arr,color)=>arr.length
    ?arr.map(([m,q],i)=>`<div class="top10-row">
      <span class="top10-rank">${i+1}</span>
      <span class="top10-name" title="${m}">${m}</span>
      <span class="top10-qty" style="color:${color}">${q.toLocaleString()}</span>
    </div>`).join('')
    :`<span style="font-size:12px;color:var(--muted)">${t('noRecords')}</span>`;
  document.getElementById('summary').innerHTML=`
    <div class="sum-total">
      <div class="sum-lbl">${t('totalProd')}</div>
      <div class="sum-val">${total.toLocaleString()}</div>
      <div class="sum-sub">PCS</div>
    </div>
    <div class="sum-top10" style="display:flex;gap:12px;flex:1;min-width:0;">
      <div style="flex:1;min-width:0;">
        <div class="sum-top10-lbl">${t('top5most')}</div>
        <div class="top10-list">${mkRows(top5,'var(--accent)')}</div>
      </div>
      <div style="width:1px;background:var(--border);flex-shrink:0;"></div>
      <div style="flex:1;min-width:0;">
        <div class="sum-top10-lbl">${t('top5least')}</div>
        <div class="top10-list">${mkRows(bot5,'var(--muted)')}</div>
      </div>
    </div>
  `;
}

/* ── 파이차트 블록 ── */
function buildDonut(canvas, entries, cid){
  const total=entries.reduce((s,[,q])=>s+q,0);
  if(chartInstances[cid]) chartInstances[cid].destroy();
  chartInstances[cid]=new Chart(canvas,{
    type:'doughnut',
    data:{
      labels:entries.map(([m])=>m),
      datasets:[{data:entries.map(([,q])=>q),
        backgroundColor:entries.map((_,i)=>PALETTE[i%PALETTE.length]),
        borderWidth:1,borderColor:'#fff'}]
    },
    options:{plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>{
      const pct=total>0?((ctx.parsed/total)*100).toFixed(1):'0.0';
      return` ${ctx.label}: ${ctx.parsed.toLocaleString()} PCS (${pct}%)`;
    }}}},cutout:'52%',animation:{duration:300}}
  });
}

/* ── 전체(L.1-L.7) 뷰 ── */
function renderOverall(recs){
  const mainRecs=recs.filter(r=>MAIN_LINES.includes(r.line));
  const wrap=document.getElementById('view-overall');
  wrap.innerHTML='';
  const flex=document.createElement('div');
  flex.className='overall-wrap';

  ['S1','S2'].forEach(proc=>{
    const entries=aggByModel(mainRecs,proc);
    const total=entries.reduce((s,[,q])=>s+q,0);
    const card=document.createElement('div');
    card.className='overall-chart-card';

    const titleEl=document.createElement('div');
    titleEl.className='oc-title';
    titleEl.innerHTML=`L.1–L.7 ${t('total')} <span class="oc-badge ${proc==='S1'?'s1-badge':'s2-badge'}">${proc}</span>`;
    card.appendChild(titleEl);

    if(!entries.length){
      card.innerHTML+=`<div class="card-empty">${t('noRecords')}</div>`;
      flex.appendChild(card);return;
    }

    const cWrap=document.createElement('div');cWrap.className='oc-chart';
    const canvas=document.createElement('canvas');cWrap.appendChild(canvas);
    card.appendChild(cWrap);
    buildDonut(canvas,entries,`overall_${proc}`);

    const legend=document.createElement('div');legend.className='oc-legend';
    entries.forEach(([m,q],i)=>{
      const color=PALETTE[i%PALETTE.length];
      const pct=total>0?((q/total)*100).toFixed(1):'0.0';
      const row=document.createElement('div');row.className='oc-leg-row';
      row.innerHTML=`<div class="oc-leg-dot" style="background:${color}"></div>
        <span class="oc-leg-name">${m}</span>
        <span class="oc-leg-pct">${pct}%</span>
        <span class="oc-leg-qty">${q.toLocaleString()}</span>`;
      legend.appendChild(row);
    });
    card.appendChild(legend);

    const footer=document.createElement('div');footer.className='oc-total';
    footer.innerHTML=`<span class="oc-total-lbl">${t('total')}</span><span class="oc-total-val">${total.toLocaleString()} PCS</span>`;
    card.appendChild(footer);
    flex.appendChild(card);
  });

  wrap.appendChild(flex);
}

/* ── 라인별 뷰 ── */
function renderLines(recs){
  const wrap=document.getElementById('view-lines');
  wrap.innerHTML='';
  const grid=document.createElement('div');grid.className='line-grid';

  ALL_LINES.forEach(line=>{
    const lr=recs.filter(r=>r.line===line);
    const card=document.createElement('div');card.className='card';
    const titleEl=document.createElement('div');titleEl.className='card-title';titleEl.textContent=line;
    card.appendChild(titleEl);
    if(!lr.length){
      card.innerHTML+=`<div class="card-empty">${t('noRecords')}</div>`;
      grid.appendChild(card);return;
    }
    const sections=document.createElement('div');sections.className='proc-sections';
    ['S1','S2'].forEach(proc=>{
      const sec=document.createElement('div');sec.className='proc-section';
      const lbl=document.createElement('div');lbl.className='proc-lbl';lbl.textContent=proc;
      sec.appendChild(lbl);
      const entries=aggByModel(lr,proc);
      const total=entries.reduce((s,[,q])=>s+q,0);
      if(!entries.length){
        const e=document.createElement('div');e.className='proc-empty';e.textContent=t('noRecords');
        sec.appendChild(e);
      } else {
        const inner=document.createElement('div');inner.className='proc-inner';
        const cWrap=document.createElement('div');cWrap.className='chart-wrap';
        const canvas=document.createElement('canvas');cWrap.appendChild(canvas);
        buildDonut(canvas,entries,`line_${line}_${proc}`);
        const legend=document.createElement('div');legend.className='legend';
        entries.forEach(([m,q],i)=>{
          const color=PALETTE[i%PALETTE.length];
          const pct=total>0?((q/total)*100).toFixed(1):'0.0';
          const row=document.createElement('div');row.className='leg-row';
          row.innerHTML=`<div class="leg-dot" style="background:${color}"></div>
            <span class="leg-name">${m}</span>
            <div class="leg-right"><span class="leg-pct">${pct}%</span><span class="leg-qty">${q.toLocaleString()}</span></div>`;
          legend.appendChild(row);
        });
        inner.appendChild(cWrap);inner.appendChild(legend);
        sec.appendChild(inner);
        const ft=document.createElement('div');ft.className='proc-total';
        ft.innerHTML=`${t('total')} <strong>${total.toLocaleString()} PCS</strong>`;
        sec.appendChild(ft);
      }
      sections.appendChild(sec);
    });
    card.appendChild(sections);
    grid.appendChild(card);
  });
  wrap.appendChild(grid);
}

/* ── 제품별 뷰 ── */
function renderProducts(recs){
  const wrap=document.getElementById('view-products');
  wrap.innerHTML='';

  // 모델별 S1/S2 집계
  const map={};
  recs.forEach(r=>{
    const m=r.modelName||'(미등록)';
    if(!map[m])map[m]={s1:0,s2:0};
    if(r.process==='S1')map[m].s1+=(r.qty||0);
    if(r.process==='S2')map[m].s2+=(r.qty||0);
  });
  const entries=Object.entries(map)
    .map(([m,v])=>({model:m,...v,total:v.s1+v.s2}))
    .sort((a,b)=>b.total-a.total);

  if(!entries.length){
    wrap.innerHTML='<div class="card-empty" style="margin-top:20px">기록 없음</div>';return;
  }
  const maxQty=Math.max(...entries.map(e=>Math.max(e.s1,e.s2)),1);

  const grid=document.createElement('div');grid.className='product-grid';
  entries.forEach(e=>{
    const card=document.createElement('div');card.className='prod-card';
    const pct1=Math.round((e.s1/maxQty)*100);
    const pct2=Math.round((e.s2/maxQty)*100);
    card.innerHTML=`<div class="prod-name">${e.model}</div>
      <div class="prod-row">
        <span class="prod-proc-lbl">S1</span>
        <div class="prod-bar-wrap"><div class="prod-bar prod-bar-s1" style="width:${pct1}%"></div></div>
        <span class="prod-qty">${e.s1.toLocaleString()}</span>
      </div>
      <div class="prod-row">
        <span class="prod-proc-lbl">S2</span>
        <div class="prod-bar-wrap"><div class="prod-bar prod-bar-s2" style="width:${pct2}%"></div></div>
        <span class="prod-qty">${e.s2.toLocaleString()}</span>
      </div>
      <div class="prod-total">합계 <strong>${e.total.toLocaleString()} PCS</strong></div>`;
    grid.appendChild(card);
  });
  wrap.appendChild(grid);
}

function render(recs){
  destroyCharts();
  renderSummary(recs);
  renderOverall(recs);
  renderLines(recs);
  renderProducts(recs);
}

goToday();
window.onLangChange=()=>load();
</script>
</body>
</html>
