<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Production</title>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
<style>
:root {
  --bg:#0B1220; --panel:#131C2E; --panel2:#1A2438;
  --border:rgba(255,255,255,0.08); --accent:#2F6FED; --teal:#5FD0C9;
  --text:#E2E8F0; --muted:#8A98AC; --green:#34D399; --amber:#FBBF24; --red:#F87171;
  --grid:rgba(255,255,255,0.04);
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Pretendard',system-ui,sans-serif;}
html,body{background:var(--bg);color:var(--text);min-height:100vh;}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
  background-size:42px 42px;background-color:var(--bg);}
.bg-glow{position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 900px 500px at 10% -5%,rgba(47,111,237,.2),transparent 60%),
             radial-gradient(ellipse 600px 400px at 110% 10%,rgba(95,208,201,.1),transparent 60%);}

/* ── layout ── */
.shell{position:relative;z-index:1;max-width:1440px;margin:0 auto;padding:0 14px 40px;}

/* ── header ── */
header{display:flex;align-items:center;gap:10px;padding:16px 0 14px;
  border-bottom:1px solid var(--border);margin-bottom:14px;flex-wrap:wrap;}
.back-btn{padding:6px 11px;background:var(--panel2);border:1px solid var(--border);
  border-radius:7px;color:var(--muted);font-size:12px;text-decoration:none;transition:color .2s;}
.back-btn:hover{color:var(--text);}
.page-title{font-size:18px;font-weight:800;letter-spacing:-.02em;}
.hd-pills{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.pill{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:999px;
  border:1px solid var(--border);background:rgba(255,255,255,.04);font-size:11px;font-weight:600;color:var(--muted);}
.dot{width:7px;height:7px;border-radius:50%;}
.dot-day{background:var(--amber);box-shadow:0 0 5px var(--amber);}
.dot-night{background:var(--teal);box-shadow:0 0 5px var(--teal);}
.dot-on{background:var(--green);box-shadow:0 0 5px var(--green);animation:pulse 2s infinite;}
.dot-off{background:var(--red);}
#clock{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;}
.admin-link{padding:6px 12px;background:var(--panel2);border:1px solid var(--border);
  border-radius:7px;font-size:11px;font-weight:600;color:var(--muted);text-decoration:none;transition:color .2s;}
.admin-link:hover{color:var(--text);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── controls ── */
.controls{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.date-nav{display:flex;align-items:center;gap:6px;}
.date-nav button{background:var(--panel2);border:1px solid var(--border);border-radius:7px;
  color:var(--text);padding:5px 10px;cursor:pointer;font-size:13px;}
#date-label{font-size:13px;font-weight:700;min-width:95px;text-align:center;}
.today-btn{background:var(--accent)!important;border-color:var(--accent)!important;font-size:11px!important;padding:5px 9px!important;}
.shift-tabs{display:flex;gap:6px;}
.shift-tab{padding:6px 14px;border-radius:7px;border:1px solid var(--border);
  background:var(--panel2);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;}
.shift-tab.active-day{background:rgba(251,191,36,.12);border-color:var(--amber);color:var(--amber);}
.shift-tab.active-night{background:rgba(95,208,201,.12);border-color:var(--teal);color:var(--teal);}

/* ── summary ── */
.summary-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.sc{flex:1;min-width:100px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:10px 14px;}
.sc-lbl{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px;}
.sc-val{font-size:20px;font-weight:800;letter-spacing:-.02em;}
.sc-sub{font-size:11px;color:var(--muted);margin-top:2px;}

/* ── grid ── */
.line-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;}

/* ── card ── */
.line-card{background:var(--panel);border:1px solid var(--border);border-radius:13px;
  cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;overflow:hidden;}
.line-card::before{content:'';display:block;height:3px;
  background:linear-gradient(90deg,var(--accent),var(--teal));transform:scaleX(0);transform-origin:left;transition:transform .25s;}
.line-card:hover::before{transform:scaleX(1);}
.line-card:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.14);box-shadow:0 10px 24px rgba(0,0,0,.35);}
.line-card:active{transform:scale(.97);}

.card-head{display:flex;align-items:center;justify-content:space-between;padding:10px 12px 6px;}
.card-name{font-size:14px;font-weight:800;letter-spacing:-.01em;}
.card-total{font-size:13px;font-weight:800;color:var(--teal);}
.card-avg{font-size:10px;color:var(--muted);margin-top:1px;}

.proc-rows{padding:0 12px 10px;display:flex;flex-direction:column;gap:4px;}
.proc-row{display:flex;align-items:center;gap:7px;padding:5px 8px;
  background:var(--panel2);border-radius:7px;}
.proc-badge{font-size:10px;font-weight:700;padding:2px 5px;border-radius:4px;
  background:rgba(47,111,237,.18);color:#93B4F8;min-width:20px;text-align:center;}
.proc-model{font-size:12px;flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.proc-model.empty{color:var(--muted);font-style:italic;font-size:11px;}
.proc-qty{font-size:12px;font-weight:700;color:var(--teal);min-width:30px;text-align:right;}
.proc-qty.zero{color:var(--muted);}

/* ── modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;
  display:none;align-items:center;justify-content:center;padding:12px;}
.modal-bg.open{display:flex;}
.modal{background:var(--panel);border:1px solid var(--border);border-radius:16px;
  width:100%;max-width:720px;max-height:90vh;display:flex;flex-direction:column;
  box-shadow:0 20px 50px rgba(0,0,0,.5);}
.modal-head{padding:16px 20px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.modal-ttl{font-size:16px;font-weight:700;}
.modal-x{width:30px;height:30px;border-radius:7px;background:var(--panel2);
  border:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;}
.modal-body{padding:14px 20px 20px;overflow-y:auto;flex:1;}

/* hourly table in modal */
.htable{width:100%;border-collapse:collapse;font-size:12px;}
.htable th{padding:6px 8px;color:var(--muted);font-size:10px;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--border);text-align:left;}
.htable td{padding:7px 8px;border-bottom:1px solid rgba(255,255,255,.04);}
.htable tr:last-child td{border-bottom:none;}
.htable tr:hover td{background:rgba(255,255,255,.03);}
.slot-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;
  background:rgba(47,111,237,.15);color:#93B4F8;white-space:nowrap;}
.del-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:2px 5px;font-size:13px;}
.del-btn:hover{color:var(--red);}
.empty-msg{text-align:center;padding:32px;color:var(--muted);font-size:13px;}

/* modal summary */
.modal-sum{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.ms{flex:1;min-width:80px;background:var(--panel2);border-radius:8px;padding:8px 12px;}
.ms-lbl{font-size:10px;color:var(--muted);font-weight:600;margin-bottom:2px;}
.ms-val{font-size:16px;font-weight:800;}

/* ── ws overlay ── */
#ws-overlay{position:fixed;inset:0;background:rgba(11,18,32,.85);z-index:300;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
#ws-overlay .sp{width:32px;height:32px;border:3px solid rgba(255,255,255,.1);
  border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#ws-overlay p{color:var(--muted);font-size:13px;}
#ws-overlay.hidden{display:none;}

/* ── toast ── */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--panel2);border:1px solid var(--border);border-radius:9px;
  padding:9px 18px;font-size:13px;font-weight:600;z-index:200;
  opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}

/* ── mobile ── */
@media(max-width:600px){
  .line-grid{grid-template-columns:1fr 1fr;gap:8px;}
  .card-name{font-size:13px;}
  .sc-val{font-size:17px;}
  .summary-bar{gap:6px;}
  .sc{padding:8px 10px;}
  .controls{gap:6px;}
}
@media(max-width:400px){
  .line-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div id="ws-overlay">
  <div class="sp"></div>
  <p>서버 연결 중...</p>
</div>

<div class="shell">
  <header>
    <a href="../index.html" class="back-btn">← 홈</a>
    <div class="page-title">Production</div>
    <div class="hd-pills">
      <div class="pill"><span class="dot dot-on" id="cdot"></span><span id="ctxt">연결중</span></div>
      <div class="pill"><span class="dot" id="sdot"></span><span id="stxt">-</span></div>
      <span id="clock"></span>
      <a href="admin.html" class="admin-link">⚙ 관리</a>
    </div>
  </header>

  <div class="controls">
    <div class="date-nav">
      <button onclick="changeDate(-1)">◀</button>
      <span id="date-label">-</span>
      <button onclick="changeDate(1)">▶</button>
      <button class="today-btn" onclick="goToday()">오늘</button>
    </div>
    <div class="shift-tabs">
      <button class="shift-tab" id="tab-day"   onclick="setShift('day')">☀ 주간</button>
      <button class="shift-tab" id="tab-night" onclick="setShift('night')">🌙 야간</button>
    </div>
  </div>

  <div class="summary-bar">
    <div class="sc"><div class="sc-lbl">총 생산</div><div class="sc-val" id="s-total">0</div><div class="sc-sub">PCS</div></div>
    <div class="sc"><div class="sc-lbl">시간당 평균</div><div class="sc-val" id="s-avg">0</div><div class="sc-sub" id="s-avg-sub">PCS/h</div></div>
    <div class="sc"><div class="sc-lbl">가동 라인</div><div class="sc-val" id="s-lines">0</div><div class="sc-sub">/ 14</div></div>
    <div class="sc"><div class="sc-lbl">경과 시간</div><div class="sc-val" id="s-elapsed">0</div><div class="sc-sub">h</div></div>
  </div>

  <div class="line-grid" id="grid"></div>
</div>

<!-- 상세 모달 -->
<div class="modal-bg" id="modal" onclick="onBgClick(event)">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-ttl" id="m-title">-</div>
      <button class="modal-x" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-sum">
        <div class="ms"><div class="ms-lbl">합계</div><div class="ms-val" id="ms-total">0</div></div>
        <div class="ms"><div class="ms-lbl">S1</div><div class="ms-val" id="ms-s1">0</div></div>
        <div class="ms"><div class="ms-lbl">S2</div><div class="ms-val" id="ms-s2">0</div></div>
        <div class="ms"><div class="ms-lbl">시간당 평균</div><div class="ms-val" id="ms-avg">0</div></div>
      </div>
      <table class="htable">
        <thead><tr><th>시간대</th><th>공정</th><th>Plant</th><th>모델</th><th>수량</th><th>등록</th><th></th></tr></thead>
        <tbody id="m-body"></tbody>
      </table>
      <div class="empty-msg" id="m-empty" style="display:none">이 교대에 생산 기록이 없습니다.</div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const TUNNEL = 'server.samhwa.cloud';
const LINES  = ['L.1','L.2','L.3','L.4','L.5','L.6','L.7','L.7_Display','L.9','L.8_IN','L.8_OUT','FGA','Rotary','SDB'];
const PROCS  = ['S1','S2'];

let ws, records=[], plants=[];
let viewDate='', viewShift='day', modalLine=null;

/* ── 날짜/교대 ── */
function fmtD(d){return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function p2(n){return String(n).padStart(2,'0');}
function calcDS(d){
  const h=d.getHours();
  if(h>=8&&h<20) return{date:fmtD(d),shift:'day'};
  if(h>=20)      return{date:fmtD(d),shift:'night'};
  const y=new Date(d);y.setDate(y.getDate()-1);
  return{date:fmtD(y),shift:'night'};
}
function elapsedHours(shift,now){
  const h=now.getHours();
  if(viewDate!==fmtD(now)&&viewDate!==calcDS(now).date) return 12; // 과거 날짜는 12h
  if(shift==='day'){
    if(h<8) return 0;
    if(h>=20) return 12;
    return Math.max(1,h-8+1);
  } else {
    if(h>=20) return Math.max(1,h-20+1);
    if(h<8)   return Math.max(1,4+h+1);
    return 12;
  }
}

/* ── 시계 ── */
function tick(){
  const now=new Date();
  document.getElementById('clock').textContent=now.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const{shift}=calcDS(now);
  document.getElementById('sdot').className='dot '+(shift==='day'?'dot-day':'dot-night');
  document.getElementById('stxt').textContent=shift==='day'?'주간':'야간';
  renderGrid();
}
setInterval(tick,1000);

/* ── 날짜 네비 ── */
function changeDate(d){
  const dt=new Date(viewDate+'T12:00:00');dt.setDate(dt.getDate()+d);
  viewDate=fmtD(dt);
  document.getElementById('date-label').textContent=viewDate;
  fetchLog();
}
function goToday(){
  const{date,shift}=calcDS(new Date());
  viewDate=date;viewShift=shift;
  document.getElementById('date-label').textContent=viewDate;
  renderShiftTabs();fetchLog();
}
function setShift(s){viewShift=s;renderShiftTabs();renderGrid();}
function renderShiftTabs(){
  document.getElementById('tab-day').className  ='shift-tab'+(viewShift==='day'?' active-day':'');
  document.getElementById('tab-night').className='shift-tab'+(viewShift==='night'?' active-night':'');
}
function fetchLog(){
  fetch(`https://${TUNNEL}/api/production/log?date=${viewDate}`)
    .then(r=>r.json()).then(j=>{records=j.records||[];renderGrid();});
}

/* ── 필터 ── */
function shiftRecs(){return records.filter(r=>r.prodDate===viewDate&&r.shift===viewShift);}

/* ── 통계 ── */
function lineRecs(line){return shiftRecs().filter(r=>r.line===line);}
function lineQty(line){return lineRecs(line).reduce((s,r)=>s+(r.qty||0),0);}
function procQty(line,proc){return lineRecs(line).filter(r=>r.process===proc).reduce((s,r)=>s+(r.qty||0),0);}
function lastModel(line,proc){
  const recs=lineRecs(line).filter(r=>r.process===proc);
  if(!recs.length) return '';
  return recs.sort((a,b)=>a.slot>b.slot?1:-1).at(-1).modelName||'';
}

/* ── 그리드 렌더 ── */
function renderGrid(){
  const sr=shiftRecs();
  const total=sr.reduce((s,r)=>s+(r.qty||0),0);
  const elapsed=elapsedHours(viewShift,new Date());
  const avg=elapsed>0?Math.round(total/elapsed):0;
  const activeLines=new Set(sr.map(r=>r.line)).size;

  document.getElementById('s-total').textContent=total.toLocaleString();
  document.getElementById('s-avg').textContent=avg.toLocaleString();
  document.getElementById('s-lines').textContent=activeLines;
  document.getElementById('s-elapsed').textContent=elapsed;

  document.getElementById('grid').innerHTML=LINES.map(line=>{
    const tot=lineQty(line);
    const el2=elapsed>0?Math.round(tot/elapsed):0;
    const rows=PROCS.map(proc=>{
      const m=lastModel(line,proc);
      const q=procQty(line,proc);
      return`<div class="proc-row">
        <span class="proc-badge">${proc}</span>
        <span class="proc-model${m?'':' empty'}">${m||'미가동'}</span>
        <span class="proc-qty${q===0?' zero':''}">${q>0?q.toLocaleString():'-'}</span>
      </div>`;
    }).join('');
    return`<div class="line-card" onclick="openModal('${line}')">
      <div class="card-head">
        <span class="card-name">${line}</span>
        <div style="text-align:right">
          <div class="card-total">${tot>0?tot.toLocaleString()+' PCS':'-'}</div>
          ${tot>0?`<div class="card-avg">평균 ${el2}/h</div>`:''}
        </div>
      </div>
      <div class="proc-rows">${rows}</div>
    </div>`;
  }).join('');

  if(modalLine) renderModalBody(modalLine);
}

/* ── 모달 ── */
function openModal(line){
  modalLine=line;
  document.getElementById('m-title').textContent=`${line} — 상세`;
  renderModalBody(line);
  document.getElementById('modal').classList.add('open');
}
function renderModalBody(line){
  const recs=records.filter(r=>r.prodDate===viewDate&&r.line===line)
    .sort((a,b)=>a.shift!==b.shift?(a.shift==='day'?-1:1):(a.slot>b.slot?1:-1));
  const s1=recs.filter(r=>r.process==='S1').reduce((s,r)=>s+(r.qty||0),0);
  const s2=recs.filter(r=>r.process==='S2').reduce((s,r)=>s+(r.qty||0),0);
  const tot=s1+s2;
  const elapsed=elapsedHours(viewShift,new Date());
  const srRecs=recs.filter(r=>r.shift===viewShift);
  const srTot=srRecs.reduce((s,r)=>s+(r.qty||0),0);
  const avg=elapsed>0?Math.round(srTot/elapsed):0;

  document.getElementById('ms-total').textContent=tot.toLocaleString();
  document.getElementById('ms-s1').textContent=s1.toLocaleString();
  document.getElementById('ms-s2').textContent=s2.toLocaleString();
  document.getElementById('ms-avg').textContent=avg+'/h';

  const empty=document.getElementById('m-empty');
  const tbody=document.getElementById('m-body');
  if(!recs.length){tbody.innerHTML='';empty.style.display='';return;}
  empty.style.display='none';
  tbody.innerHTML=recs.map(r=>{
    const nh=(parseInt(r.slot)+1)%24;
    const shTag=r.shift==='day'?'☀':'🌙';
    return`<tr>
      <td><span class="slot-tag">${r.slot}~${p2(nh)}:00</span> <span style="font-size:10px;color:var(--muted)">${shTag}</span></td>
      <td><span style="font-size:10px;font-weight:700;padding:2px 5px;border-radius:4px;background:rgba(47,111,237,.18);color:#93B4F8">${r.process}</span></td>
      <td style="color:var(--muted)">${r.plantName||'-'}</td>
      <td>${r.modelName||'-'}</td>
      <td style="font-weight:700;color:var(--teal)">${(r.qty||0).toLocaleString()}</td>
      <td style="color:var(--muted);font-size:11px">${(r.serverCreatedAt||r.createdAt||'').slice(11,16)}</td>
      <td><button class="del-btn" onclick="delRec('${r.id}','${r.prodDate}')">🗑</button></td>
    </tr>`;
  }).join('');
}
function nextSlot(s){return p2((parseInt(s)+1)%24)+':00';}
function closeModal(){document.getElementById('modal').classList.remove('open');modalLine=null;}
function onBgClick(e){if(e.target===document.getElementById('modal'))closeModal();}
function delRec(id,pd){
  if(!confirm('이 기록을 삭제하시겠습니까?')) return;
  ws&&ws.readyState===1&&ws.send(JSON.stringify({type:'DELETE_PRODUCTION',id,prodDate:pd}));
}

/* ── WS ── */
function connect(){
  ws=new WebSocket(`wss://${TUNNEL}/ws/production`);
  ws.onopen=()=>{
    document.getElementById('ws-overlay').classList.add('hidden');
    document.getElementById('cdot').className='dot dot-on';
    document.getElementById('ctxt').textContent='연결됨';
  };
  ws.onmessage=(e)=>{
    const msg=JSON.parse(e.data);
    if(msg.type==='INIT_PLANTS'){plants=msg.data;}
    else if(msg.type==='INIT_PRODUCTION'){
      records=msg.data;
      viewDate=msg.prodDate;viewShift=msg.shift;
      document.getElementById('date-label').textContent=viewDate;
      renderShiftTabs();renderGrid();
    }
    else if(msg.type==='PRODUCTION_ADDED'){
      const i=records.findIndex(r=>r.id===msg.record.id);
      if(i>-1)records[i]=msg.record;else records.push(msg.record);
      renderGrid();toast('생산 기록 추가됨');
    }
    else if(msg.type==='PRODUCTION_DELETED'){
      records=records.filter(r=>r.id!==msg.id);renderGrid();toast('삭제됨');
    }
    else if(msg.type==='PLANTS_UPDATED'){plants=msg.data;}
  };
  ws.onclose=()=>{
    document.getElementById('ws-overlay').classList.remove('hidden');
    document.getElementById('cdot').className='dot dot-off';
    document.getElementById('ctxt').textContent='연결 끊김';
    setTimeout(connect,3000);
  };
  ws.onerror=()=>ws.close();
}
function toast(m){
  const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

/* init */
const{date,shift}=calcDS(new Date());
viewDate=date;viewShift=shift;
document.getElementById('date-label').textContent=viewDate;
renderShiftTabs();tick();connect();
</script>
