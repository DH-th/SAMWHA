<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Production Dashboard</title>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
<style>
:root{
  --bg:#F2EDE4;
  --surface:#FFFFFF;
  --surface2:#F7F3EC;
  --surface3:#EDE8DF;
  --border:#DDD7CB;
  --border2:#C4BDB0;
  --text:#1A1610;
  --text2:#3A342C;
  --muted:#8A8278;
  --accent:#2558D4;
  --accent-bg:#EBF0FD;
  --green:#146D38;
  --green-bg:#E8F5EE;
  --amber:#A8530A;
  --amber-bg:#FEF3C7;
  --red:#B91C1C;
  --sh:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shm:0 4px 14px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.04);
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Pretendard',system-ui,sans-serif;}
html,body{background:var(--bg);color:var(--text);min-height:100vh;}

/* ── header ── */
header{
  background:var(--surface);border-bottom:1px solid var(--border);
  box-shadow:var(--sh);padding:10px 14px;
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  position:sticky;top:0;z-index:50;
}
.back{padding:5px 10px;border:1px solid var(--border);border-radius:7px;
  font-size:12px;font-weight:600;color:var(--muted);text-decoration:none;background:var(--surface2);}
.ptitle{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-.02em;}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.cpill{display:flex;align-items:center;gap:5px;padding:4px 9px;
  border:1px solid var(--border);border-radius:999px;
  font-size:11px;font-weight:600;color:var(--muted);background:var(--surface2);}
.dot{width:6px;height:6px;border-radius:50%;}
.dot-on{background:var(--green);box-shadow:0 0 4px var(--green);animation:pulse 2s infinite;}
.dot-off{background:var(--red);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
#clock{font-size:12px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums;}
.tbl-btn{padding:5px 11px;border:1px solid var(--accent);border-radius:7px;
  font-size:11px;font-weight:700;color:var(--accent);background:var(--accent-bg);text-decoration:none;}
.adm{padding:5px 10px;border:1px solid var(--border);border-radius:7px;
  font-size:11px;font-weight:600;color:var(--muted);text-decoration:none;background:var(--surface2);}

/* ── ctrl bar ── */
.ctrl-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;
  background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.date-nav{display:flex;align-items:center;gap:4px;}
.dnbtn{padding:5px 8px;border:1px solid var(--border);border-radius:6px;
  background:var(--surface2);color:var(--text2);font-size:12px;cursor:pointer;}
.today-btn{background:var(--accent)!important;color:#fff!important;border-color:var(--accent)!important;font-size:11px;}
#date-lbl{font-size:12px;font-weight:700;min-width:86px;text-align:center;color:var(--text);}
.shift-tabs{display:flex;gap:4px;}
.stab{padding:5px 11px;border:1px solid var(--border);border-radius:6px;
  background:var(--surface2);color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;}
.stab.d{background:var(--amber-bg);border-color:var(--amber);color:var(--amber);}
.stab.n{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);}

/* ── summary ── */
.sumbar{display:flex;gap:8px;padding:12px 14px 0;flex-wrap:wrap;}
.sc{flex:1;min-width:90px;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;box-shadow:var(--sh);}
.sc-l{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:3px;}
.sc-v{font-size:20px;font-weight:900;letter-spacing:-.02em;}
.sc-s{font-size:10px;color:var(--muted);margin-top:1px;}

/* ── grid ── */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(155px,1fr));
  gap:10px;padding:12px 14px 28px;
}

/* ── line card ── */
.lcard{
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:14px 14px 13px;box-shadow:var(--sh);
  display:flex;flex-direction:column;gap:9px;
  position:relative;overflow:hidden;
  transition:box-shadow .18s,transform .18s;cursor:default;
}
.lcard:hover{box-shadow:var(--shm);transform:translateY(-2px);}
.lcard.active::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--accent),#5FD0C9);
}
.lcard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:6px;}
.lcard-name{font-size:15px;font-weight:900;letter-spacing:-.02em;color:var(--text);}
.lcard-badge{font-size:9px;font-weight:800;padding:2px 6px;border-radius:999px;white-space:nowrap;flex-shrink:0;margin-top:2px;}
.badge-on{background:var(--green-bg);color:var(--green);}
.badge-off{background:var(--surface3);color:var(--muted);}
.lcard-model{font-size:10px;color:var(--muted);font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-height:14px;}
.lcard-nums{display:flex;gap:8px;align-items:stretch;}
.nb{display:flex;flex-direction:column;gap:2px;flex:1;}
.nb-label{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;}
.nb-val{font-size:22px;font-weight:900;letter-spacing:-.03em;line-height:1;color:var(--text);}
.nb-val.dim{color:var(--border2);font-size:18px;}
.num-sep{width:1px;background:var(--border);align-self:stretch;}
.nb2{display:flex;flex-direction:column;gap:2px;align-items:flex-end;justify-content:center;}
.nb2-val{font-size:16px;font-weight:900;color:var(--accent);line-height:1;}
.nb2-label{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.04em;white-space:nowrap;}

/* ── overlay / toast ── */
#ov{position:fixed;inset:0;background:rgba(242,237,228,.9);z-index:300;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
.sp{width:32px;height:32px;border:3px solid var(--border2);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#ov p{font-size:13px;color:var(--muted);font-weight:600;}
#ov.h{display:none;}
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  background:var(--text);color:#fff;border-radius:8px;padding:8px 16px;font-size:12px;
  font-weight:600;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap;}
#toast.s{opacity:1;}

@media(max-width:480px){
  .grid{grid-template-columns:repeat(2,1fr);gap:8px;padding:10px 10px 20px;}
  .sumbar{gap:6px;padding:10px 10px 0;}
  .sc{padding:8px 10px;min-width:70px;}.sc-v{font-size:17px;}
  .lcard-name{font-size:13px;}
  .nb-val{font-size:19px;}.nb2-val{font-size:14px;}
}
@media(min-width:768px){
  header,ctrl-bar{padding:12px 20px;}
  .ctrl-bar{padding:10px 20px;}
  .sumbar{padding:14px 20px 0;}
  .grid{grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:12px;padding:14px 20px 28px;}
}
</style>
</head>
<body>
<div id="ov"><div class="sp"></div><p>서버 연결 중...</p></div>

<header>
  <a href="../index.html" class="back">← 홈</a>
  <span class="ptitle">Production</span>
  <div class="hdr-r">
    <div class="cpill"><span class="dot dot-on" id="cdot"></span><span id="ctxt">연결중</span></div>
    <span id="clock"></span>
    <a href="table.html" class="tbl-btn">📊 상세 현황</a>
    <a href="admin.html" class="adm">⚙ 관리</a>
  </div>
</header>

<div class="ctrl-bar">
  <div class="date-nav">
    <button class="dnbtn" onclick="changeDate(-1)">◀</button>
    <span id="date-lbl">-</span>
    <button class="dnbtn" onclick="changeDate(1)">▶</button>
    <button class="dnbtn today-btn" onclick="goToday()">오늘</button>
  </div>
  <div class="shift-tabs">
    <button class="stab" id="td" onclick="setShift('day')">☀ 주간</button>
    <button class="stab" id="tn" onclick="setShift('night')">🌙 야간</button>
  </div>
</div>

<div class="sumbar">
  <div class="sc"><div class="sc-l">총 생산</div><div class="sc-v" id="s-tot">0</div><div class="sc-s">PCS</div></div>
  <div class="sc"><div class="sc-l">시간당 평균</div><div class="sc-v" id="s-avg">0</div><div class="sc-s">PCS / h</div></div>
  <div class="sc"><div class="sc-l">가동 라인</div><div class="sc-v" id="s-lines">0</div><div class="sc-s">/ 14</div></div>
  <div class="sc"><div class="sc-l">경과 시간</div><div class="sc-v" id="s-el">0</div><div class="sc-s">h</div></div>
</div>

<div class="grid" id="grid"></div>
<div id="toast"></div>

<script>
const TUNNEL = 'server.samhwa.cloud';
const LINES  = ['L.1','L.2','L.3','L.4','L.5','L.6','L.7','L.7_Display','L.9','L.8_IN','L.8_OUT','FGA','Rotary','SDB'];
const DAY_SLOTS   = ['08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00'];
const NIGHT_SLOTS = ['20:00','21:00','22:00','23:00','00:00','01:00','02:00','03:00','04:00','05:00','06:00','07:00'];

let ws, records = [], plants = [];
let viewDate = '', viewShift = 'day';

const p2 = n => String(n).padStart(2,'0');
const fmtD = d => `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;

function calcDS(d){
  const h = d.getHours();
  if(h >= 8 && h < 20) return { date: fmtD(d), shift: 'day' };
  if(h >= 20) return { date: fmtD(d), shift: 'night' };
  const y = new Date(d); y.setDate(y.getDate() - 1);
  return { date: fmtD(y), shift: 'night' };
}

function elapsed(){
  const now = new Date();
  const { date, shift } = calcDS(now);
  if(viewDate !== date || viewShift !== shift) return 12;
  const h = now.getHours();
  if(viewShift === 'day'){
    if(h < 8) return 0; if(h >= 20) return 12; return Math.max(1, h - 8 + 1);
  } else {
    if(h >= 20) return Math.max(1, h - 20 + 1);
    if(h < 8)   return Math.max(1, 4 + h + 1);
    return 12;
  }
}

function allSlots(){ return viewShift === 'day' ? DAY_SLOTS : NIGHT_SLOTS; }

function curSlot(){
  const h = new Date().getHours();
  const s = p2(h) + ':00';
  return allSlots().includes(s) ? s : null;
}

function prevSlot(){
  const all = allSlots(); const cur = curSlot();
  if(!cur) return null;
  const idx = all.indexOf(cur);
  return idx > 0 ? all[idx - 1] : null;
}

function sr(){ return records.filter(r => r.prodDate === viewDate && r.shift === viewShift); }

function lineQtySlot(line, slot){
  return sr().filter(r => r.line === line && r.slot === slot).reduce((s, r) => s + (r.qty || 0), 0);
}
function lineQtyTotal(line){
  return allSlots().reduce((s, slot) => s + lineQtySlot(line, slot), 0);
}
function lastModel(line){
  const recs = sr().filter(r => r.line === line && r.modelName);
  if(!recs.length) return '';
  return recs.sort((a, b) => a.slot > b.slot ? 1 : -1).at(-1).modelName;
}

function changeDate(d){
  const dt = new Date(viewDate + 'T12:00:00'); dt.setDate(dt.getDate() + d);
  viewDate = fmtD(dt); document.getElementById('date-lbl').textContent = viewDate; fetchLog();
}
function goToday(){
  const { date, shift } = calcDS(new Date());
  viewDate = date; viewShift = shift;
  document.getElementById('date-lbl').textContent = viewDate;
  renderTabs(); fetchLog();
}
function setShift(s){ viewShift = s; renderTabs(); renderAll(); }
function renderTabs(){
  document.getElementById('td').className = 'stab' + (viewShift === 'day' ? ' d' : '');
  document.getElementById('tn').className = 'stab' + (viewShift === 'night' ? ' n' : '');
}
function fetchLog(){
  fetch(`https://${TUNNEL}/api/production/log?date=${viewDate}`)
    .then(r => r.json()).then(j => { records = j.records || []; renderAll(); });
}

function renderAll(){
  const el = elapsed();
  const total = sr().reduce((s, r) => s + (r.qty || 0), 0);
  const avg   = el > 0 ? Math.round(total / el) : 0;
  const actLines = new Set(sr().map(r => r.line)).size;
  document.getElementById('s-tot').textContent   = total.toLocaleString();
  document.getElementById('s-avg').textContent   = avg.toLocaleString();
  document.getElementById('s-lines').textContent = actLines;
  document.getElementById('s-el').textContent    = el;

  const prev = prevSlot();
  document.getElementById('grid').innerHTML = LINES.map(line => {
    const tot   = lineQtyTotal(line);
    const avgH  = el > 0 ? Math.round(tot / el) : 0;
    const prevQ = prev != null ? lineQtySlot(line, prev) : null;
    const model = lastModel(line);
    const active = tot > 0;
    const prevDisp = prevQ != null ? prevQ.toLocaleString() : '—';
    const prevDim  = !prevQ;
    return `<div class="lcard${active ? ' active' : ''}">
      <div class="lcard-top">
        <span class="lcard-name">${line}</span>
        <span class="lcard-badge ${active ? 'badge-on' : 'badge-off'}">${active ? '가동' : '대기'}</span>
      </div>
      <div class="lcard-model">${model || '—'}</div>
      <div class="lcard-nums">
        <div class="nb">
          <div class="nb-label">직전 수량</div>
          <div class="nb-val${prevDim ? ' dim' : ''}">${prevDisp}</div>
        </div>
        <div class="num-sep"></div>
        <div class="nb2">
          <div class="nb2-val">${avgH.toLocaleString()}</div>
          <div class="nb2-label">/ 1H 평균</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function connect(){
  ws = new WebSocket(`wss://${TUNNEL}/ws/production`);
  ws.onopen = () => {
    document.getElementById('ov').classList.add('h');
    document.getElementById('cdot').className = 'dot dot-on';
    document.getElementById('ctxt').textContent = '연결됨';
  };
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if(msg.type === 'INIT_PLANTS'){ plants = msg.data; }
    else if(msg.type === 'INIT_PRODUCTION'){
      records = msg.data; viewDate = msg.prodDate; viewShift = msg.shift;
      document.getElementById('date-lbl').textContent = viewDate;
      renderTabs(); renderAll();
    }
    else if(msg.type === 'PRODUCTION_ADDED'){
      const i = records.findIndex(r => r.id === msg.record.id);
      if(i > -1) records[i] = msg.record; else records.push(msg.record);
      renderAll(); toast('✓ 생산 기록 추가');
    }
    else if(msg.type === 'PRODUCTION_DELETED'){
      records = records.filter(r => r.id !== msg.id); renderAll();
    }
    else if(msg.type === 'PLANTS_UPDATED'){ plants = msg.data; }
  };
  ws.onclose = () => {
    document.getElementById('ov').classList.remove('h');
    document.getElementById('cdot').className = 'dot dot-off';
    document.getElementById('ctxt').textContent = '연결 끊김';
    setTimeout(connect, 3000);
  };
  ws.onerror = () => ws.close();
}

function toast(m){
  const t = document.getElementById('toast'); t.textContent = m; t.classList.add('s');
  setTimeout(() => t.classList.remove('s'), 2000);
}
function tick(){ document.getElementById('clock').textContent = new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
setInterval(tick, 1000); tick();

const { date, shift } = calcDS(new Date());
viewDate = date; viewShift = shift;
document.getElementById('date-lbl').textContent = viewDate;
renderTabs(); connect();
setInterval(renderAll, 60000);
</script>
</body>
</html>
