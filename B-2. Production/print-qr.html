<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR 인쇄 — Production</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
:root{
  --bg:#F0EBE1;--surface:#FFFFFF;--s2:#F7F3EC;--border:#DDD7CB;
  --text:#1A1610;--muted:#8A8278;--accent:#2558D4;--accent-bg:#EBF0FD;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Pretendard',system-ui,sans-serif;}
body{background:var(--bg);color:var(--text);min-height:100vh;}
header{background:var(--surface);border-bottom:1px solid var(--border);
  padding:10px 16px;display:flex;align-items:center;gap:10px;}
.back{padding:5px 10px;border:1px solid var(--border);border-radius:7px;
  font-size:12px;font-weight:600;color:var(--muted);text-decoration:none;background:var(--s2);}
h1{font-size:16px;font-weight:900;}
.ctrl{padding:16px;display:flex;flex-direction:column;gap:12px;}
.line-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;}
.line-chk{display:flex;align-items:center;gap:8px;background:var(--surface);
  border:1px solid var(--border);border-radius:8px;padding:8px 10px;}
.line-name{font-size:13px;font-weight:800;min-width:60px;}
.proc-group{display:flex;gap:6px;}
.proc-lbl{display:flex;align-items:center;gap:3px;font-size:12px;font-weight:700;cursor:pointer;
  padding:3px 8px;border:1px solid var(--border);border-radius:5px;background:var(--s2);color:var(--muted);}
.proc-lbl:has(input:checked){background:var(--accent-bg);border-color:var(--accent);color:var(--accent);}
.proc-lbl input{accent-color:var(--accent);width:14px;height:14px;cursor:pointer;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;}
.btn{padding:9px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;}
.btn-all{background:var(--s2);border:1px solid var(--border);color:var(--muted);}
.btn-print{background:var(--accent);color:#fff;}
.hint{font-size:11px;color:var(--muted);}

/* ── 인쇄 영역 ── */
#print-area{display:none;}

@media print {
  body > *:not(#print-area){display:none!important;}
  #print-area{display:block!important;}
  @page{size:A4 landscape;margin:8mm;}
  .qr-grid{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    grid-template-rows:repeat(3,1fr);
    gap:2mm;
    width:100%;
    height:192mm;
  }
  .qr-item{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    border:1px solid #ccc;border-radius:0;padding:1.5mm 2mm;
    page-break-inside:avoid;overflow:hidden;box-sizing:border-box;
  }
  .qr-item canvas, .qr-item img{display:block;max-width:100%!important;max-height:48mm!important;width:auto!important;height:auto!important;}
  .qr-label{margin-top:1.5mm;font-size:22pt;font-weight:900;text-align:center;color:#1A1610;letter-spacing:.02em;width:100%;line-height:1;}
  .page-break{page-break-before:always;}
}
</style>
</head>
<body>
<header>
  <a href="table.html" class="back">← 생산 현황</a>
  <h1>QR 인쇄</h1>
</header>
<div class="ctrl">
  <div class="btn-row">
    <button class="btn btn-all" onclick="toggleAll(true)">전체 선택</button>
    <button class="btn btn-all" onclick="toggleAll(false)">전체 해제</button>
    <button class="btn btn-print" onclick="doPrint()">🖨️ 인쇄</button>
    <span class="hint">A4 가로 · 5열×3행 배치</span>
  </div>
  <div class="line-grid" id="line-grid"></div>
</div>

<div id="print-area"></div>

<script>
const LINES=['L.1','L.2','L.3','L.4','L.5','L.6','L.7','L.9','L.8_IN','L.8_OUT'];
const BASE_URL=location.origin+location.pathname.replace('print-qr.html','input.html');

/* 라인 체크박스 렌더 */
const grid=document.getElementById('line-grid');
LINES.forEach(l=>{
  const key=l.replace(/\./g,'_');
  const div=document.createElement('div');
  div.className='line-chk';
  div.innerHTML=`<span class="line-name">${l}</span>
    <div class="proc-group">
      <label class="proc-lbl"><input type="checkbox" data-line="${l}" data-proc="S1" checked>S1</label>
      <label class="proc-lbl"><input type="checkbox" data-line="${l}" data-proc="S2" checked>S2</label>
    </div>`;
  grid.appendChild(div);
});

function toggleAll(v){
  document.querySelectorAll('#line-grid input').forEach(c=>c.checked=v);
}

function doPrint(){
  // 선택된 {line, proc} 목록 수집
  const items=[...document.querySelectorAll('#line-grid input:checked')]
    .map(c=>({line:c.dataset.line, proc:c.dataset.proc}));
  if(!items.length){alert('라인/공정을 선택해주세요.');return;}

  const area=document.getElementById('print-area');
  area.innerHTML='';

  const PER_PAGE=15;
  for(let pi=0;pi<Math.ceil(items.length/PER_PAGE);pi++){
    const page=items.slice(pi*PER_PAGE,(pi+1)*PER_PAGE);
    const wrap=document.createElement('div');
    if(pi>0) wrap.className='page-break';

    const g=document.createElement('div');
    g.className='qr-grid';

    page.forEach(({line,proc})=>{
      const url=`${BASE_URL}?line=${encodeURIComponent(line)}&process=${proc}`;
      const item=document.createElement('div');
      item.className='qr-item';

      const qrDiv=document.createElement('div');
      new QRCode(qrDiv,{text:url,width:148,height:148,correctLevel:QRCode.CorrectLevel.M});

      const lbl=document.createElement('div');
      lbl.className='qr-label';
      lbl.textContent=`${line} · ${proc}`;

      item.appendChild(qrDiv);
      item.appendChild(lbl);
      g.appendChild(item);
    });
    wrap.appendChild(g);
    area.appendChild(wrap);
  }

  setTimeout(()=>window.print(),300);
}
</script>
</body>
</html>
