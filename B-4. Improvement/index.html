<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Improvement — Before/After</title>
<link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
<script src="lang.js"></script>
<style>
:root{
  --bg:#F5F3FF;--surface:#FFFFFF;--s2:#F3F0FC;--s3:#EAE4F9;
  --border:rgba(76,29,149,.10);--border2:rgba(76,29,149,.18);
  --text:#241B3A;--muted:#7C7397;
  --accent:#7C3AED;--accent2:#A78BFA;--accent-bg:rgba(124,58,237,.10);
  --green:#059669;--green-bg:#ECFDF5;--amber:#D97706;--amber-bg:#FFFBEB;
  --sh:0 2px 10px rgba(76,29,149,.08),0 1px 3px rgba(0,0,0,.03);
  --shm:0 8px 28px rgba(76,29,149,.14),0 2px 8px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Pretendard',system-ui,sans-serif;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ── blobs ── */
.blob{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(60px);}
.blob-1{width:380px;height:380px;background:#D8B4FE;opacity:.20;top:-120px;right:-100px;}
.blob-2{width:280px;height:280px;background:#C4B5FD;opacity:.16;bottom:0;left:-100px;}

/* ── header ── */
header{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.85);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);padding:12px 18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.back{padding:6px 12px;border:1px solid var(--border);border-radius:9px;font-size:12px;font-weight:700;color:var(--muted);text-decoration:none;background:var(--s2);}
.h-title{font-size:17px;font-weight:900;cursor:pointer;user-select:none;background:linear-gradient(135deg,#7C3AED,#C026D3);-webkit-background-clip:text;background-clip:text;color:transparent;}
.cpill{display:flex;align-items:center;gap:5px;padding:4px 10px;border:1px solid var(--border);border-radius:999px;font-size:11px;font-weight:700;color:var(--muted);background:var(--s2);}
.dot{width:6px;height:6px;border-radius:50%;background:#DC2626;}
.dot.on{background:var(--green);box-shadow:0 0 5px var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.btn{padding:8px 15px;border-radius:10px;font-size:12.5px;font-weight:800;cursor:pointer;border:none;font-family:inherit;transition:transform .12s,box-shadow .12s;}
.btn:active{transform:scale(.96);}
.btn-primary{background:linear-gradient(135deg,#7C3AED,#9333EA);color:#fff;box-shadow:0 4px 14px rgba(124,58,237,.35);}
.btn-ghost{background:var(--s2);border:1px solid var(--border);color:var(--text);}

/* ── controls ── */
.ctrl-wrap{max-width:1240px;margin:0 auto;padding:16px 18px 0;position:relative;z-index:1;}
.ctrl-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:var(--surface);border:1.5px solid var(--border);
  border-radius:16px;padding:10px 12px;box-shadow:var(--sh);}
.ctrl-bar select,.ctrl-bar input[type=text],.ctrl-bar input[type=search]{
  padding:8px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:12.5px;font-family:inherit;background:var(--s2);color:var(--text);outline:none;}
.ctrl-bar select:focus,.ctrl-bar input:focus{border-color:var(--accent);}
.ftab{padding:7px 13px;border-radius:9px;font-size:12px;font-weight:800;cursor:pointer;background:var(--s2);color:var(--muted);border:1.5px solid transparent;}
.ftab.on{background:var(--accent-bg);color:var(--accent);border-color:var(--accent2);}
#search-inp{flex:1;min-width:140px;}

/* ── summary ── */
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px;}
.sc{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:13px 16px;box-shadow:var(--sh);}
.sc-l{font-size:10.5px;font-weight:800;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px;}
.sc-v{font-size:24px;font-weight:900;letter-spacing:-.02em;color:var(--text);}
.sc.a .sc-v{color:var(--accent);} .sc.b .sc-v{color:var(--amber);} .sc.c .sc-v{color:var(--green);}

/* ── grid ── */
.grid-wrap{max-width:1240px;margin:0 auto;padding:16px 18px 60px;}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;overflow:hidden;box-shadow:var(--shm);
  cursor:pointer;opacity:0;transform:translateY(16px) scale(.98);animation:cardIn .5s cubic-bezier(.2,.8,.3,1) forwards;transition:box-shadow .2s,transform .2s;}
.card:hover{box-shadow:0 14px 38px rgba(76,29,149,.20);transform:translateY(-3px);}
@keyframes cardIn{to{opacity:1;transform:translateY(0) scale(1);}}

/* before/after compare */
.ba-compare{position:relative;width:100%;aspect-ratio:4/3;overflow:hidden;background:var(--s3);user-select:none;}
.ba-compare img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;}
.ba-after-img{z-index:1;}
.ba-before-wrap{position:absolute;inset:0;z-index:2;overflow:hidden;}
.ba-before-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.ba-handle{position:absolute;top:0;bottom:0;width:0;z-index:3;pointer-events:none;}
.ba-handle::before{content:'';position:absolute;top:0;bottom:0;left:-1.5px;width:3px;background:#fff;box-shadow:0 0 8px rgba(0,0,0,.3);}
.ba-handle::after{content:'⟷';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:34px;height:34px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--accent);box-shadow:0 3px 10px rgba(0,0,0,.25);font-weight:900;}
.ba-label{position:absolute;top:9px;font-size:9.5px;font-weight:900;letter-spacing:.06em;padding:3px 8px;border-radius:6px;
  background:rgba(0,0,0,.55);color:#fff;z-index:4;}
.ba-label.before{left:9px;} .ba-label.after{right:9px;}
.single-photo{position:relative;width:100%;aspect-ratio:4/3;overflow:hidden;background:var(--s3);}
.single-photo img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s;}
.card:hover .single-photo img{transform:scale(1.05);}
.progress-badge{position:absolute;top:9px;left:9px;background:var(--amber);color:#fff;font-size:10px;font-weight:900;
  padding:4px 10px;border-radius:999px;display:flex;align-items:center;gap:5px;z-index:5;box-shadow:0 2px 8px rgba(217,119,6,.4);}
.progress-badge .pdot{width:6px;height:6px;border-radius:50%;background:#fff;animation:pulse 1.4s infinite;}
.fav-btn{position:absolute;top:9px;right:9px;width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;
  background:rgba(255,255,255,.85);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;
  font-size:16px;z-index:6;color:#C4C4CE;box-shadow:0 2px 8px rgba(0,0,0,.15);transition:transform .15s,color .15s;}
.fav-btn:hover{transform:scale(1.12);}
.fav-btn.on{color:#F59E0B;}
.fav-btn.detail{position:static;width:30px;height:30px;background:var(--s2);box-shadow:none;border:1px solid var(--border);margin-right:2px;}
.no-photo-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--border2);font-size:34px;}

.card-body{padding:13px 15px 15px;}
.card-cat{display:inline-block;font-size:10px;font-weight:800;color:var(--accent);background:var(--accent-bg);
  padding:3px 9px;border-radius:999px;margin-bottom:7px;}
.card-title{font-size:14.5px;font-weight:800;color:var(--text);line-height:1.3;margin-bottom:5px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-meta{display:flex;align-items:center;justify-content:space-between;font-size:10.5px;color:var(--muted);font-weight:600;}
.card-status{font-weight:800;}
.card-status.done{color:var(--green);} .card-status.pending{color:var(--amber);}

.empty-state{text-align:center;padding:80px 20px;color:var(--muted);}
.empty-state .ic{font-size:44px;margin-bottom:12px;opacity:.4;}
.empty-state p{font-size:13px;font-weight:600;}

/* ── modal shared ── */
.mbg{position:fixed;inset:0;background:rgba(36,27,58,.55);backdrop-filter:blur(2px);z-index:200;display:none;align-items:center;justify-content:center;padding:16px;}
.mbg.on{display:flex;}
.modal{background:var(--surface);border-radius:22px;width:min(640px,96vw);max-height:90vh;display:flex;flex-direction:column;
  overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.3);animation:modalIn .25s cubic-bezier(.2,.9,.3,1);}
@keyframes modalIn{from{opacity:0;transform:scale(.94) translateY(8px);}to{opacity:1;transform:scale(1) translateY(0);}}
.m-hd{display:flex;align-items:center;gap:10px;padding:17px 20px;border-bottom:1px solid var(--border);flex-shrink:0;}
.m-title{font-size:16px;font-weight:900;flex:1;}
.m-x{width:30px;height:30px;border:1px solid var(--border);border-radius:9px;background:var(--s2);cursor:pointer;font-size:16px;color:var(--muted);flex-shrink:0;}
.m-body{overflow-y:auto;padding:18px 20px 22px;}

/* form */
.fld{display:flex;flex-direction:column;gap:5px;margin-bottom:13px;}
.fld label{font-size:11.5px;font-weight:800;color:var(--muted);}
.fld input,.fld select,.fld textarea{padding:10px 12px;border:1.5px solid var(--border);border-radius:11px;font-size:14px;
  font-family:inherit;background:var(--s2);color:var(--text);outline:none;transition:border-color .15s;}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--accent);background:var(--surface);}
.fld textarea{resize:vertical;min-height:64px;}
.fld-row{display:flex;gap:10px;}
.fld-row .fld{flex:1;}

.dropzone{border:2px dashed var(--border2);border-radius:14px;padding:22px 14px;text-align:center;cursor:pointer;
  background:var(--s2);transition:background .15s,border-color .15s;}
.dropzone:hover,.dropzone.drag{background:var(--accent-bg);border-color:var(--accent);}
.dropzone .dz-ic{font-size:26px;margin-bottom:6px;}
.dropzone p{font-size:12px;color:var(--muted);font-weight:600;}
.dropzone .dz-count{font-size:11px;font-weight:800;color:var(--accent);margin-top:4px;}

.thumb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(72px,1fr));gap:8px;margin-top:10px;}
.thumb{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;background:var(--s3);}
.thumb img{width:100%;height:100%;object-fit:cover;}
.thumb .rm{position:absolute;top:3px;right:3px;width:19px;height:19px;border-radius:50%;background:rgba(0,0,0,.6);
  color:#fff;border:none;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.thumb .uploading{position:absolute;inset:0;background:rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--accent);}

.m-foot{display:flex;gap:9px;padding:14px 20px;border-top:1px solid var(--border);flex-shrink:0;}
.m-foot .btn{flex:1;padding:13px;font-size:13.5px;}

/* detail modal */
.detail-hero{position:relative;width:100%;}
.detail-status{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:800;padding:5px 12px;border-radius:999px;margin-bottom:10px;}
.detail-status.done{background:var(--green-bg);color:var(--green);} .detail-status.pending{background:var(--amber-bg);color:var(--amber);}
.detail-cat{display:inline-block;font-size:11px;font-weight:800;color:var(--accent);background:var(--accent-bg);padding:4px 11px;border-radius:999px;margin-bottom:10px;margin-left:6px;}
.detail-desc{font-size:13px;color:var(--text);line-height:1.6;background:var(--s2);border-radius:12px;padding:12px 14px;margin:12px 0;white-space:pre-wrap;}
.detail-dates{display:flex;gap:16px;font-size:11.5px;color:var(--muted);font-weight:600;flex-wrap:wrap;margin-bottom:6px;}
.detail-dates b{color:var(--text);font-weight:800;}
.gal-title{font-size:12px;font-weight:800;color:var(--muted);margin:16px 0 8px;text-transform:uppercase;letter-spacing:.04em;}
.gal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:8px;}
.gal-grid img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:10px;cursor:zoom-in;background:var(--s3);transition:transform .15s;}
.gal-grid img:hover{transform:scale(1.04);}
.detail-actions{display:flex;gap:9px;margin-top:16px;flex-wrap:wrap;}

/* lightbox */
#lightbox{position:fixed;inset:0;background:rgba(10,8,20,.92);z-index:400;display:none;align-items:center;justify-content:center;}
#lightbox.on{display:flex;}
#lightbox img{max-width:92vw;max-height:82vh;border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,.5);}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.12);
  border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.lb-prev{left:16px;} .lb-next{right:16px;}
.lb-close{position:absolute;top:18px;right:18px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.12);
  border:none;color:#fff;font-size:18px;cursor:pointer;}
.lb-count{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:#fff;font-size:12px;font-weight:700;
  background:rgba(255,255,255,.12);padding:4px 12px;border-radius:999px;}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;border-radius:10px;
  padding:10px 20px;font-size:13px;font-weight:700;z-index:500;opacity:0;transition:opacity .25s;pointer-events:none;}
#toast.s{opacity:1;}

/* print report */
#report-print{display:none;}
@media print{
  body>*:not(#report-print){display:none!important;}
  #report-print{display:block!important;padding:16px;}
  .rp-hd{text-align:center;margin-bottom:18px;border-bottom:3px solid #7C3AED;padding-bottom:12px;}
  .rp-hd h1{font-size:20px;font-weight:900;color:#241B3A;}
  .rp-hd .rp-sub{font-size:12px;color:#666;margin-top:4px;}
  .rp-info{display:flex;gap:20px;justify-content:center;font-size:12px;margin-bottom:16px;color:#333;}
  .rp-ba{display:flex;gap:14px;margin-bottom:16px;}
  .rp-ba-col{flex:1;text-align:center;}
  .rp-ba-col h3{font-size:13px;font-weight:900;margin-bottom:8px;padding:5px;border-radius:6px;}
  .rp-ba-col.before h3{background:#FEF3C7;color:#92400E;}
  .rp-ba-col.after h3{background:#D1FAE5;color:#065F46;}
  .rp-ba-col img{width:100%;max-height:220px;object-fit:cover;border-radius:8px;border:1px solid #ddd;margin-bottom:4px;}
  .rp-desc{font-size:12px;line-height:1.7;background:#F8F7FC;border-radius:8px;padding:12px 14px;white-space:pre-wrap;}
  @page{size:A4;margin:14mm;}
}

@media(max-width:640px){
  .summary{grid-template-columns:repeat(2,1fr);}
  .card-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
  .card-body{padding:10px 11px 12px;}
  .card-title{font-size:12.5px;}
}
.lang-sw{display:flex;gap:3px;}
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<header>
  <a href="../index.html" class="back" data-i18n="home">← หน้าหลัก</a>
  <span class="h-title" data-i18n="title" data-lang-trigger onclick="cycleLang()">กิจกรรมปรับปรุง</span>
  <div class="hdr-r">
    <div class="cpill"><span class="dot" id="cdot"></span><span id="ctxt" data-i18n="connecting">กำลังเชื่อมต่อ</span></div>
    <button class="btn btn-primary" onclick="openNewModal()" data-i18n="newActivity">+ กิจกรรมใหม่</button>
  </div>
</header>

<div class="ctrl-wrap">
  <div class="ctrl-bar">
    <div class="ftab on" data-f="all" onclick="setFilter('all')" data-i18n="filterAll">ทั้งหมด</div>
    <div class="ftab" data-f="planned" onclick="setFilter('planned')" data-i18n="filterPlanned">กำลังดำเนินการ</div>
    <div class="ftab" data-f="completed" onclick="setFilter('completed')" data-i18n="filterCompleted">เสร็จแล้ว</div>
    <div class="ftab" data-f="favorite" onclick="setFilter('favorite')" data-i18n="filterFavorites">⭐ รายการโปรด</div>
    <select id="cat-filter" onchange="render()"><option value="" data-i18n-opt="allCategories">ทุกหมวดหมู่</option></select>
    <input type="search" id="search-inp" data-i18n="searchPlaceholder" placeholder="🔍 ค้นหาชื่อกิจกรรม..." oninput="render()">
  </div>
  <div class="summary" id="summary"></div>
</div>

<div class="grid-wrap">
  <div class="card-grid" id="card-grid"></div>
</div>

<!-- 새 활동 등록 모달 -->
<div class="mbg" id="new-mbg" onclick="if(event.target===this)closeNewModal()">
  <div class="modal">
    <div class="m-hd"><span class="m-title" data-i18n="newActivity">กิจกรรมใหม่</span><button class="m-x" onclick="closeNewModal()">✕</button></div>
    <div class="m-body">
      <div class="fld"><label data-i18n="activityTitle">ชื่อกิจกรรม</label><input id="f-title" type="text" placeholder=""></div>
      <div class="fld-row">
        <div class="fld"><label data-i18n="category">หมวดหมู่</label>
          <select id="f-category">
            <option value="" data-i18n-opt="catOther">อื่นๆ</option>
          </select>
        </div>
        <div class="fld"><label data-i18n="activityDate">วันที่กิจกรรม</label><input id="f-date" type="date"></div>
      </div>
      <div class="fld"><label data-i18n="description">รายละเอียด</label><textarea id="f-desc"></textarea></div>
      <div class="fld">
        <label data-i18n="beforePhotos">รูปก่อนปรับปรุง (Before)</label>
        <div class="dropzone" id="dz-before" onclick="document.getElementById('inp-before').click()">
          <div class="dz-ic">📷</div>
          <p data-i18n="dragDropHint">แตะเพื่อเลือกรูป หรือ ลากมาวาง (สูงสุด 30 รูป)</p>
          <div class="dz-count" id="dz-before-count">0/30</div>
        </div>
        <input type="file" id="inp-before" accept="image/*" multiple style="display:none" onchange="handleFiles(this.files,'before')">
        <div class="thumb-grid" id="thumbs-before"></div>
      </div>
    </div>
    <div class="m-foot">
      <button class="btn btn-ghost" onclick="closeNewModal()" data-i18n="cancel">ยกเลิก</button>
      <button class="btn btn-primary" onclick="submitNewActivity()" data-i18n="submit">บันทึกกิจกรรม</button>
    </div>
  </div>
</div>

<!-- 상세 모달 -->
<div class="mbg" id="detail-mbg" onclick="if(event.target===this)closeDetail()">
  <div class="modal">
    <div class="m-hd"><span class="m-title" id="d-title">-</span>
      <button class="fav-btn detail" id="d-fav-btn" onclick="toggleFavorite(curDetailId)">☆</button>
      <button class="m-x" onclick="printReport()" title="print" style="margin-right:2px">🖨️</button>
      <button class="m-x" onclick="deleteActivity()" title="delete" style="color:#DC2626">🗑</button>
      <button class="m-x" onclick="closeDetail()">✕</button>
    </div>
    <div class="m-body" id="d-body"></div>
  </div>
</div>

<!-- After 등록 모달 -->
<div class="mbg" id="after-mbg" onclick="if(event.target===this)closeAfterModal()">
  <div class="modal">
    <div class="m-hd"><span class="m-title" data-i18n="registerAfter">ลงทะเบียนรูป After</span><button class="m-x" onclick="closeAfterModal()">✕</button></div>
    <div class="m-body">
      <div class="fld">
        <label data-i18n="afterPhotos">รูปหลังปรับปรุง (After)</label>
        <div class="dropzone" id="dz-after" onclick="document.getElementById('inp-after').click()">
          <div class="dz-ic">✨</div>
          <p data-i18n="dragDropHint">แตะเพื่อเลือกรูป หรือ ลากมาวาง (สูงสุด 30 รูป)</p>
          <div class="dz-count" id="dz-after-count">0/30</div>
        </div>
        <input type="file" id="inp-after" accept="image/*" multiple style="display:none" onchange="handleFiles(this.files,'after')">
        <div class="thumb-grid" id="thumbs-after"></div>
      </div>
    </div>
    <div class="m-foot">
      <button class="btn btn-ghost" onclick="closeAfterModal()" data-i18n="cancel">ยกเลิก</button>
      <button class="btn btn-primary" onclick="submitAfter()" data-i18n="submit">บันทึก</button>
    </div>
  </div>
</div>

<!-- 라이트박스 -->
<div id="lightbox" onclick="if(event.target===this)closeLightbox()">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <button class="lb-nav lb-prev" onclick="lbMove(-1)">‹</button>
  <img id="lb-img" src="">
  <button class="lb-nav lb-next" onclick="lbMove(1)">›</button>
  <div class="lb-count" id="lb-count"></div>
</div>

<div id="report-print"></div>
<div id="toast"></div>

<script>
const TUNNEL='server.samhwa.cloud';
let ws, activities=[], curFilter='all';
let pendingBefore=[], pendingAfter=[]; // {file, url(local preview), uploadedUrl}
let curDetailId=null;
let lbList=[], lbIdx=0;

const CATS=[
  {v:'safety',k:'catSafety'},{v:'quality',k:'catQuality'},{v:'productivity',k:'catProductivity'},
  {v:'5s',k:'cat5S'},{v:'equipment',k:'catEquipment'},{v:'other',k:'catOther'}
];
function renderCatOptions(){
  const sel=document.getElementById('f-category');
  sel.innerHTML=CATS.map(c=>`<option value="${t(c.k)}">${t(c.k)}</option>`).join('');
  const cf=document.getElementById('cat-filter');
  const cur=cf.value;
  const cats=[...new Set(activities.map(a=>a.category).filter(Boolean))];
  cf.innerHTML=`<option value="">${t('allCategories')}</option>`+cats.map(c=>`<option value="${c}"${c===cur?' selected':''}>${c}</option>`).join('');
}

/* ── 필터 ── */
function setFilter(f){
  curFilter=f;
  document.querySelectorAll('.ftab').forEach(el=>el.classList.toggle('on',el.dataset.f===f));
  render();
}

/* ── 요약 ── */
function renderSummary(){
  const total=activities.length;
  const planned=activities.filter(a=>a.status!=='completed').length;
  const done=activities.filter(a=>a.status==='completed').length;
  const nowM=new Date().toISOString().slice(0,7);
  const thisMonth=activities.filter(a=>(a.activityDate||'').startsWith(nowM)||(a.afterDate||'').startsWith(nowM)).length;
  document.getElementById('summary').innerHTML=`
    <div class="sc"><div class="sc-l">${t('totalCount')}</div><div class="sc-v">${total}</div></div>
    <div class="sc b"><div class="sc-l">${t('inProgressCount')}</div><div class="sc-v">${planned}</div></div>
    <div class="sc c"><div class="sc-l">${t('completedCount')}</div><div class="sc-v">${done}</div></div>
    <div class="sc a"><div class="sc-l">${t('thisMonthCount')}</div><div class="sc-v">${thisMonth}</div></div>`;
}

/* ── 카드 그리드 ── */
function render(){
  renderCatOptions();
  renderSummary();
  const grid=document.getElementById('card-grid');
  const q=(document.getElementById('search-inp').value||'').trim().toLowerCase();
  const catF=document.getElementById('cat-filter').value;
  let list=[...activities];
  if(curFilter==='planned')list=list.filter(a=>a.status!=='completed');
  if(curFilter==='completed')list=list.filter(a=>a.status==='completed');
  if(curFilter==='favorite')list=list.filter(a=>a.favorite);
  if(catF)list=list.filter(a=>a.category===catF);
  if(q)list=list.filter(a=>(a.title||'').toLowerCase().includes(q));
  list.sort((a,b)=>(b.updatedAt||b.createdAt||'').localeCompare(a.updatedAt||a.createdAt||''));

  if(!list.length){
    grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><div class="ic">🛠️</div><p>${t('noActivities')}</p></div>`;
    return;
  }
  grid.innerHTML=list.map((a,i)=>{
    const isDone=a.status==='completed';
    const before=(a.beforePhotos||[])[0];
    const after=(a.afterPhotos||[])[0];
    let media;
    if(isDone && before && after){
      media=`<div class="ba-compare" data-id="${a.id}">
        <img class="ba-after-img" src="${imgUrl(after)}">
        <div class="ba-before-wrap" style="width:50%"><img src="${imgUrl(before)}"></div>
        <div class="ba-handle" style="left:50%"></div>
        <span class="ba-label before">${t('beforeLabel')}</span>
        <span class="ba-label after">${t('afterLabel')}</span>
      </div>`;
    } else if(before){
      media=`<div class="single-photo">${!isDone?`<span class="progress-badge"><span class="pdot"></span>${t('statusPlanned')}</span>`:''}<img src="${imgUrl(before)}"></div>`;
    } else {
      media=`<div class="single-photo"><div class="no-photo-ph">📷</div></div>`;
    }
    return `<div class="card" style="animation-delay:${Math.min(i*.05,.6)}s" onclick="openDetail('${a.id}')">
      <div style="position:relative">
        ${media}
        <button class="fav-btn${a.favorite?' on':''}" onclick="event.stopPropagation();toggleFavorite('${a.id}')" title="${t('toggleFavorite')}">${a.favorite?'★':'☆'}</button>
      </div>
      <div class="card-body">
        <span class="card-cat">${a.category||t('catOther')}</span>
        <div class="card-title">${escapeHtml(a.title||'')}</div>
        <div class="card-meta">
          <span>${isDone?(a.afterDate||''):(a.activityDate||'')}</span>
          <span class="card-status ${isDone?'done':'pending'}">${isDone?t('statusCompleted'):t('statusPlanned')}</span>
        </div>
      </div>
    </div>`;
  }).join('');
  initCompareSliders();
}
function imgUrl(p){ if(!p)return''; return p.startsWith('http')?p:`https://${TUNNEL}${p}`; }
function toggleFavorite(id){
  const a=activities.find(x=>x.id===id); if(!a)return;
  a.favorite=!a.favorite;
  ws.send(JSON.stringify({type:'UPSERT_IMPROVEMENT',activity:a}));
  render();
  if(curDetailId===id)openDetail(id);
}
function escapeHtml(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

/* ── Before/After 슬라이더 ── */
function initCompareSliders(){
  document.querySelectorAll('.ba-compare').forEach(el=>{
    // 마운트 애니메이션: 50%에서 살짝 스윕 후 복귀
    let pos=50;
    setPos(el,30); setTimeout(()=>animPos(el,30,70,700,()=>animPos(el,70,50,500)),150);
    let dragging=false;
    const move=(clientX)=>{
      const r=el.getBoundingClientRect();
      let pct=((clientX-r.left)/r.width)*100;
      pct=Math.max(2,Math.min(98,pct));
      setPos(el,pct);
    };
    el.addEventListener('mousedown',e=>{dragging=true;move(e.clientX);e.preventDefault();});
    window.addEventListener('mousemove',e=>{if(dragging)move(e.clientX);});
    window.addEventListener('mouseup',()=>dragging=false);
    el.addEventListener('touchstart',e=>{dragging=true;move(e.touches[0].clientX);},{passive:true});
    el.addEventListener('touchmove',e=>{if(dragging)move(e.touches[0].clientX);},{passive:true});
    el.addEventListener('touchend',()=>dragging=false);
  });
}
function setPos(el,pct){
  const wrap=el.querySelector('.ba-before-wrap'); const handle=el.querySelector('.ba-handle');
  if(wrap)wrap.style.width=pct+'%'; if(handle)handle.style.left=pct+'%';
}
function animPos(el,from,to,dur,cb){
  const t0=performance.now();
  function step(ts){
    const p=Math.min((ts-t0)/dur,1);
    const eased=1-Math.pow(1-p,3);
    setPos(el,from+(to-from)*eased);
    if(p<1)requestAnimationFrame(step); else if(cb)cb();
  }
  requestAnimationFrame(step);
}

/* ── 새 활동 등록 ── */
function openNewModal(){
  document.getElementById('f-title').value='';
  document.getElementById('f-desc').value='';
  document.getElementById('f-date').value=new Date().toISOString().slice(0,10);
  pendingBefore=[];
  renderThumbs('before');
  document.getElementById('new-mbg').classList.add('on');
}
function closeNewModal(){document.getElementById('new-mbg').classList.remove('on');}

function handleFiles(fileList,phase){
  const arr=phase==='before'?pendingBefore:pendingAfter;
  const files=[...fileList].slice(0,30-arr.length);
  files.forEach(file=>{
    const url=URL.createObjectURL(file);
    arr.push({file,url});
  });
  renderThumbs(phase);
}
function renderThumbs(phase){
  const arr=phase==='before'?pendingBefore:pendingAfter;
  document.getElementById(`dz-${phase}-count`).textContent=`${arr.length}/30`;
  document.getElementById(`thumbs-${phase}`).innerHTML=arr.map((p,i)=>
    `<div class="thumb"><img src="${p.url}"><button class="rm" onclick="event.stopPropagation();removeThumb('${phase}',${i})">✕</button></div>`
  ).join('');
}
function removeThumb(phase,i){
  const arr=phase==='before'?pendingBefore:pendingAfter;
  arr.splice(i,1);
  renderThumbs(phase);
}
// drag & drop
['dz-before','dz-after'].forEach(id=>{
  document.addEventListener('DOMContentLoaded',()=>{
    const el=document.getElementById(id);
    if(!el)return;
    const phase=id.includes('before')?'before':'after';
    el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag');});
    el.addEventListener('dragleave',()=>el.classList.remove('drag'));
    el.addEventListener('drop',e=>{e.preventDefault();el.classList.remove('drag');handleFiles(e.dataTransfer.files,phase);});
  });
});

async function uploadPhotos(fileObjs){
  if(!fileObjs.length)return[];
  const fd=new FormData();
  fileObjs.forEach(p=>fd.append('files',p.file));
  const res=await fetch(`https://${TUNNEL}/api/improvement/upload`,{method:'POST',body:fd});
  const j=await res.json();
  return j.urls||[];
}

async function submitNewActivity(){
  const title=document.getElementById('f-title').value.trim();
  const date=document.getElementById('f-date').value;
  if(!title){toast(t('requireTitle'));return;}
  if(!date){toast(t('requireDate'));return;}
  if(!pendingBefore.length){toast(t('requirePhotoBefore'));return;}
  toast(t('toastUploading'));
  const urls=await uploadPhotos(pendingBefore);
  const activity={
    id:'imp_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6),
    title, category:document.getElementById('f-category').value,
    description:document.getElementById('f-desc').value.trim(),
    activityDate:date, status:'planned',
    beforePhotos:urls, afterPhotos:[], afterDate:null
  };
  ws.send(JSON.stringify({type:'UPSERT_IMPROVEMENT',activity}));
  activities.push(activity);
  closeNewModal();
  render();
  toast(t('toastSaved'));
}

/* ── 상세 ── */
function openDetail(id){
  const a=activities.find(x=>x.id===id); if(!a)return;
  curDetailId=id;
  const isDone=a.status==='completed';
  document.getElementById('d-title').textContent=a.title||'';
  const favBtn=document.getElementById('d-fav-btn');
  favBtn.textContent=a.favorite?'★':'☆';
  favBtn.classList.toggle('on',!!a.favorite);
  const beforeGal=(a.beforePhotos||[]).map((p,i)=>`<img src="${imgUrl(p)}" onclick="openLightbox('${id}','before',${i})">`).join('');
  const afterGal=(a.afterPhotos||[]).map((p,i)=>`<img src="${imgUrl(p)}" onclick="openLightbox('${id}','after',${i})">`).join('');
  document.getElementById('d-body').innerHTML=`
    <div>
      <span class="detail-status ${isDone?'done':'pending'}">${isDone?t('statusCompleted'):t('statusPlanned')}</span>
      <span class="detail-cat">${a.category||t('catOther')}</span>
    </div>
    <div class="detail-dates">
      <span>${t('plannedDate')}: <b>${a.activityDate||'-'}</b></span>
      ${isDone?`<span>${t('completedDate')}: <b>${a.afterDate||'-'}</b></span>`:''}
      <span>${t('createdOn')}: <b>${(a.createdAt||'').slice(0,10)}</b></span>
    </div>
    ${a.description?`<div class="detail-desc">${escapeHtml(a.description)}</div>`:''}
    <div class="gal-title">${t('beforePhotos')} (${(a.beforePhotos||[]).length})</div>
    <div class="gal-grid">${beforeGal||`<span style="font-size:12px;color:var(--muted)">${t('noPhotos')}</span>`}</div>
    ${isDone?`<div class="gal-title">${t('afterPhotos')} (${(a.afterPhotos||[]).length})</div>
      <div class="gal-grid">${afterGal||`<span style="font-size:12px;color:var(--muted)">${t('noPhotos')}</span>`}</div>`:''}
    <div class="detail-actions">
      ${!isDone?`<button class="btn btn-primary" onclick="openAfterModal()">${t('registerAfter')}</button>`:''}
    </div>
  `;
  document.getElementById('detail-mbg').classList.add('on');
}
function closeDetail(){document.getElementById('detail-mbg').classList.remove('on');curDetailId=null;}

function deleteActivity(){
  if(!curDetailId)return;
  if(!confirm(t('confirmDelete')))return;
  ws.send(JSON.stringify({type:'DELETE_IMPROVEMENT',id:curDetailId}));
  activities=activities.filter(a=>a.id!==curDetailId);
  closeDetail();render();toast(t('toastDeleted'));
}

/* ── After 등록 ── */
function openAfterModal(){
  pendingAfter=[];renderThumbs('after');
  document.getElementById('after-mbg').classList.add('on');
}
function closeAfterModal(){document.getElementById('after-mbg').classList.remove('on');}
async function submitAfter(){
  if(!pendingAfter.length){toast(t('requirePhotoBefore'));return;}
  const a=activities.find(x=>x.id===curDetailId); if(!a)return;
  toast(t('toastUploading'));
  const urls=await uploadPhotos(pendingAfter);
  a.afterPhotos=urls;
  a.status='completed';
  a.afterDate=new Date().toISOString().slice(0,10);
  ws.send(JSON.stringify({type:'UPSERT_IMPROVEMENT',activity:a}));
  closeAfterModal();closeDetail();render();toast(t('toastSaved'));
}

/* ── 라이트박스 ── */
function openLightbox(id,phase,idx){
  const a=activities.find(x=>x.id===id); if(!a)return;
  lbList=(phase==='before'?a.beforePhotos:a.afterPhotos)||[];
  lbIdx=idx;
  renderLightbox();
  document.getElementById('lightbox').classList.add('on');
}
function renderLightbox(){
  document.getElementById('lb-img').src=imgUrl(lbList[lbIdx]);
  document.getElementById('lb-count').textContent=`${lbIdx+1} / ${lbList.length}`;
}
function lbMove(d){lbIdx=(lbIdx+d+lbList.length)%lbList.length;renderLightbox();}
function closeLightbox(){document.getElementById('lightbox').classList.remove('on');}
document.addEventListener('keydown',e=>{
  if(!document.getElementById('lightbox').classList.contains('on'))return;
  if(e.key==='Escape')closeLightbox();
  if(e.key==='ArrowLeft')lbMove(-1);
  if(e.key==='ArrowRight')lbMove(1);
});

/* ── 보고서 인쇄 ── */
function printReport(){
  const a=activities.find(x=>x.id===curDetailId); if(!a)return;
  const before=(a.beforePhotos||[])[0], after=(a.afterPhotos||[])[0];
  const isDone=a.status==='completed';
  document.getElementById('report-print').innerHTML=`
    <div class="rp-hd"><h1>${escapeHtml(a.title||'')}</h1><div class="rp-sub">Improvement Activity Report — SAMHWA</div></div>
    <div class="rp-info">
      <span>${t('category')}: <b>${a.category||'-'}</b></span>
      <span>${t('plannedDate')}: <b>${a.activityDate||'-'}</b></span>
      ${isDone?`<span>${t('completedDate')}: <b>${a.afterDate||'-'}</b></span>`:''}
    </div>
    <div class="rp-ba">
      <div class="rp-ba-col before"><h3>BEFORE</h3>${before?`<img src="${imgUrl(before)}">`:''}</div>
      ${isDone?`<div class="rp-ba-col after"><h3>AFTER</h3>${after?`<img src="${imgUrl(after)}">`:''}</div>`:''}
    </div>
    ${a.description?`<div class="rp-desc">${escapeHtml(a.description)}</div>`:''}
  `;
  setTimeout(()=>window.print(),200);
}

/* ── WS ── */
function connect(){
  ws=new WebSocket(`wss://${TUNNEL}/ws/improvement`);
  ws.onopen=()=>{document.getElementById('cdot').className='dot on';document.getElementById('ctxt').textContent=t('connected');};
  ws.onmessage=e=>{
    const m=JSON.parse(e.data);
    if(m.type==='INIT_IMPROVEMENTS'){activities=m.data||[];render();}
    else if(m.type==='IMPROVEMENT_UPDATED'){
      const i=activities.findIndex(a=>a.id===m.activity.id);
      if(i>-1)activities[i]=m.activity; else activities.push(m.activity);
      render();
    }
    else if(m.type==='IMPROVEMENT_DELETED'){activities=activities.filter(a=>a.id!==m.id);render();}
  };
  ws.onclose=()=>{document.getElementById('cdot').className='dot';document.getElementById('ctxt').textContent=t('disconnected');setTimeout(connect,3000);};
  ws.onerror=()=>ws.close();
}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('s');setTimeout(()=>el.classList.remove('s'),2000);}
window.onLangChange=()=>render();
connect();
</script>
</body>
